<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup | Auwal MD Tech</title>
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 320px; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #00AEEF; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #msg { font-size: 11px; text-align: center; margin-top: 8px; }
    </style>
</head>
<body>

<div class="card">
    <h3 style="text-align:center">Create Account</h3>
    <div id="msg"></div>
    <input type="text" id="name" placeholder="Full Name">
    <input type="email" id="email" placeholder="Email Address">
    <input type="password" id="pass" placeholder="Password (Min 6 chars)">
    <button id="btn">Sign Up</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA6Ce7cEDzcxOoEyh5Swl3wFx7ju-Up00k",
        authDomain: "auwalmdtech.firebaseapp.com",
        projectId: "auwalmdtech",
        storageBucket: "auwalmdtech.firebasestorage.app",
        messagingSenderId: "202329584080",
        appId: "1:202329584080:web:e989d7df53d3c3024609d5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    document.getElementById("btn").onclick = async () => {
        const name = document.getElementById("name").value;
        const email = document.getElementById("email").value.trim().toLowerCase();
        const pass = document.getElementById("pass").value;
        const msg = document.getElementById("msg");

        if(!name || !email || pass.length < 6) {
            msg.innerHTML = "<span style='color:red'>Please fill all fields!</span>";
            return;
        }

        msg.style.color = "blue";
        msg.innerText = "Creating account...";

        try {
            // 1. Create User
            const res = await createUserWithEmailAndPassword(auth, email, pass);
            
            // 2. Create Firestore Data
            await setDoc(doc(db, "auwalmdtech", email), {
                fullName: name,
                balance: 0,
                role: "user",
                email: email
            });

            msg.style.color = "green";
            msg.innerText = "Success! Opening dashboard...";
            setTimeout(() => { window.location.href = "dashboard.html"; }, 1500);

        } catch (e) {
            msg.style.color = "red";
            msg.innerText = e.message;
        }
    };
</script>
</body>
</html>
