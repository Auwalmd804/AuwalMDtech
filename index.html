<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auwal MD Chat</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f5f7fb;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:40px;
width:350px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
text-align:center;
}

.logo{
width:90px;
margin-bottom:10px;
}

h2{
margin:5px;
}

p{
color:gray;
font-size:14px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ddd;
font-size:14px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.switch{
margin-top:10px;
font-size:14px;
cursor:pointer;
color:#2563eb;
}

#loading{
display:none;
margin:10px auto;
border:4px solid #eee;
border-top:4px solid #2563eb;
border-radius:50%;
width:25px;
height:25px;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

footer{
position:absolute;
bottom:10px;
font-size:13px;
color:gray;
}

</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h2>Welcome to Auwal MD Chat</h2>
<p>Login to continue</p>

<div id="loading"></div>

<div id="loginBox">

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<div class="switch" onclick="showRegister()">Create account</div>

</div>

<div id="registerBox" style="display:none">

<input type="email" id="regEmail" placeholder="Email">

<input type="password" id="regPassword" placeholder="Password">

<button onclick="register()">Register</button>

<div class="switch" onclick="showLogin()">Already have account?</div>

</div>

</div>

<footer>
© 2026 Auwal MD. All rights reserved
</footer>

<script type="module" src="app.js"></script>

</body>
</html>
