<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auwal MD Chat - Premium Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        /* Animated Background */
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #0084ff);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Card */
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
        }

        .logo-box img {
            width: 150px;
            filter: drop-shadow(0 0 10px rgba(0,132,255,0.5));
            margin-bottom: 10px;
        }

        .welcome-txt {
            color: #fff;
            font-size: 20px;
            font-weight: 300;
            letter-spacing: 1px;
            margin-bottom: 25px;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            border-radius: 15px;
            padding: 12px 20px;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .form-control::placeholder { color: rgba(255,255,255,0.5); }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: #0084ff;
            box-shadow: 0 0 15px rgba(0,132,255,0.3);
            color: #fff;
        }

        .btn-main {
            background: #0084ff;
            background: linear-gradient(90deg, #0084ff, #00c6ff);
            border: none;
            padding: 14px;
            border-radius: 15px;
            font-weight: 600;
            width: 100%;
            color: #fff;
            letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(0,132,255,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* Loading Spinner */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .toggle-link { color: #00c6ff; cursor: pointer; text-decoration: none; font-weight: 500; }
        .footer-txt { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 25px; }

        /* Floating WhatsApp Button */
        .wa-float {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #25d366;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 28px;
            box-shadow: 0 10px 25px rgba(37,211,102,0.4);
            transition: 0.3s;
            z-index: 100;
        }
        .wa-float:hover { transform: scale(1.1); color: #fff; }
    </style>
</head>
<body>

<div class="login-card animate__animated animate__zoomIn">
    <div class="logo-box">
        <img src="logo.jpg" alt="Logo">
        <div class="welcome-txt">Welcome to Auwal MD Chat</div>
    </div>

    <div id="authContent">
        <div id="signupOnly">
            <input type="text" id="fname" class="form-control" placeholder="First Name">
            <input type="text" id="lname" class="form-control" placeholder="Last Name">
        </div>
        <input type="number" id="phone" class="form-control" placeholder="Phone Number">
        <input type="password" id="pass" class="form-control" placeholder="Password">
        
        <button onclick="handleAuth()" class="btn-main mt-2">
            <span id="btnText">CREATE ACCOUNT</span>
            <div class="spinner" id="btnLoader"></div>
        </button>
    </div>

    <div class="mt-4 small text-white-50">
        <span id="switchText">Already have an account?</span> 
        <span class="toggle-link" id="switchBtn" onclick="toggleMode()">Login</span>
    </div>

    <div class="footer-txt">© 2026 Auwal MD Chat • All Rights Reserved</div>
</div>

<a href="https://wa.me/2349137904300" target="_blank" class="wa-float">
    <i class="fab fa-whatsapp"></i>
</a>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA6Ce7cEDzcxOoEyh5Swl3wFx7ju-Up00k",
        authDomain: "auwalmdtech.firebaseapp.com",
        projectId: "auwalmdtech",
        storageBucket: "auwalmdtech.firebasestorage.app",
        messagingSenderId: "202329584080",
        appId: "1:202329584080:web:e989d7df53d3c3024609d5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let isLoginMode = false;

    window.toggleMode = function() {
        isLoginMode = !isLoginMode;
        document.getElementById('signupOnly').style.display = isLoginMode ? 'none' : 'block';
        document.getElementById('btnText').innerText = isLoginMode ? 'LOGIN' : 'CREATE ACCOUNT';
        document.getElementById('switchBtn').innerText = isLoginMode ? 'Sign Up' : 'Login';
        document.getElementById('switchText').innerText = isLoginMode ? "Don't have an account?" : "Already have an account?";
    }

    window.handleAuth = async function() {
        const phone = document.getElementById('phone').value;
        const pass = document.getElementById('pass').value;
        const loader = document.getElementById('btnLoader');
        const btnTxt = document.getElementById('btnText');

        if(!phone || !pass) return alert("Fill all fields!");

        loader.style.display = 'block';
        btnTxt.style.opacity = '0.5';

        try {
            const userRef = doc(db, "users", phone);
            const userSnap = await getDoc(userRef);

            if(isLoginMode) {
                if(userSnap.exists() && userSnap.data().password === pass) {
                    localStorage.setItem('amd_user', JSON.stringify(userSnap.data()));
                    window.location.href = "dashboard.html";
                } else {
                    alert("❌ Incorrect details!");
                }
            } else {
                if(userSnap.exists()) {
                    alert("User already exists!");
                } else {
                    const userData = {
                        name: document.getElementById('fname').value + " " + document.getElementById('lname').value,
                        phone: phone,
                        password: pass,
                        photo: "https://via.placeholder.com/150"
                    };
                    await setDoc(userRef, userData);
                    localStorage.setItem('amd_user', JSON.stringify(userData));
                    window.location.href = "dashboard.html";
                }
            }
        } catch (e) {
            alert("System Error!");
        } finally {
            loader.style.display = 'none';
            btnTxt.style.opacity = '1';
        }
    }
</script>
</body>
</html>
