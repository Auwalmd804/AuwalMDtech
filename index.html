<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RetayaX - Smart Data Solutions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body {
            margin: 0; 
            padding: 20px; /* Padding don kada card ya makale a gefe */
            min-height: 100vh; /* Ya fi 100vh domin ya miqe idan keyboard ya fito */
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        }
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        .logo-box img {
            width: 100px; height: 100px;
            border-radius: 50%;
            border: 3px solid #25d366;
            margin-bottom: 15px;
            box-shadow: 0 0 15px rgba(37, 211, 102, 0.4);
        }
        .welcome-txt { color: #fff; font-size: 18px; font-weight: 600; margin-bottom: 20px; }
        .form-control {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff; border-radius: 12px; padding: 12px; margin-bottom: 15px;
        }
        .form-control::placeholder { color: rgba(255,255,255,0.5); }
        .btn-main {
            background: #25d366; border: none; padding: 12px;
            border-radius: 12px; font-weight: 700; width: 100%;
            color: #000; transition: 0.3s;
        }
        .btn-main:hover { background: #20b85a; transform: translateY(-2px); }
        .toggle-link { color: #25d366; cursor: pointer; font-weight: 600; }
        .spinner { 
            display: none; width: 20px; height: 20px; 
            border: 3px solid rgba(0,0,0,0.2); border-top: 3px solid #000; 
            border-radius: 50%; animation: spin 0.8s linear infinite; margin-left: 10px; 
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="login-card animate__animated animate__fadeInUp">
    <div class="logo-box">
        <img src="logo.png" alt="RetayaX Logo">
        <div class="welcome-txt">Welcome to RetayaX</div>
    </div>

    <div id="authContent">
        <div id="signupOnly" style="display:none;">
            <input type="text" id="fullname" class="form-control" placeholder="Full Name">
        </div>
        <input type="number" id="phone" class="form-control" placeholder="Phone Number">
        <input type="password" id="pass" class="form-control" placeholder="Password">
        
        <button onclick="handleAuth()" class="btn-main d-flex align-items-center justify-content-center">
            <span id="btnText">Login</span>
            <div class="spinner" id="btnLoader"></div>
        </button>
    </div>

    <div class="mt-4 small text-white">
        <span id="switchText">Don't have an account?</span> 
        <span class="toggle-link" id="switchBtn" onclick="toggleMode()">Sign Up</span>
    </div>

    <div class="mt-4" style="font-size: 11px; color: rgba(255,255,255,0.4);">© 2026 RetayaX • All Rights Reserved</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA6Ce7cEDzcxOoEyh5Swl3wFx7ju-Up00k",
        authDomain: "auwalmdtech.firebaseapp.com",
        projectId: "auwalmdtech",
        storageBucket: "auwalmdtech.firebasestorage.app",
        messagingSenderId: "202329584080",
        appId: "1:202329584080:web:e989d7df53d3c3024609d5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let isLoginMode = true;

    window.toggleMode = function() {
        isLoginMode = !isLoginMode;
        document.getElementById('signupOnly').style.display = isLoginMode ? 'none' : 'block';
        document.getElementById('btnText').innerText = isLoginMode ? 'Login' : 'Create Account';
        document.getElementById('switchBtn').innerText = isLoginMode ? 'Sign Up' : 'Login';
        document.getElementById('switchText').innerText = isLoginMode ? "Don't have an account?" : "Already have an account?";
    }

    window.handleAuth = async function() {
        const phone = document.getElementById('phone').value;
        const pass = document.getElementById('pass').value;
        const loader = document.getElementById('btnLoader');
        const btnTxt = document.getElementById('btnText');

        if(!phone || !pass) return alert("Please fill all fields!");

        loader.style.display = 'inline-block';
        btnTxt.style.opacity = '0.7';

        try {
            const userRef = doc(db, "users", phone);
            const userSnap = await getDoc(userRef);

            if(isLoginMode) {
                if(userSnap.exists() && userSnap.data().password === pass) {
                    localStorage.setItem('amd_user', JSON.stringify(userSnap.data()));
                    window.location.href = "dashboard.html";
                } else {
                    alert("❌ Invalid Details!");
                }
            } else {
                if(userSnap.exists()) {
                    alert("User already exists!");
                } else {
                    const userData = { name: document.getElementById('fullname').value, phone, password: pass, balance: 0, role: "user" };
                    await setDoc(userRef, userData);
                    localStorage.setItem('amd_user', JSON.stringify(userData));
                    window.location.href = "dashboard.html";
                }
            }
        } catch (e) {
            alert("Error: " + e.message);
        } finally {
            loader.style.display = 'none';
            btnTxt.style.opacity = '1';
        }
    }
</script>
</body>
</html>
