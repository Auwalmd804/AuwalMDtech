<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMD Chat - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #075e54; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
        .reg-card { background: white; padding: 30px; border-radius: 20px; width: 100%; max-width: 350px; text-align: center; }
        .form-control { border-radius: 10px; margin-bottom: 15px; }
        .btn-reg { background: #25d366; color: white; width: 100%; border-radius: 10px; font-weight: bold; border: none; padding: 10px; }
    </style>
</head>
<body>

<div class="reg-card mx-3">
    <h3 class="fw-bold mb-4">Create Profile</h3>
    <input type="text" id="username" class="form-control" placeholder="Your Name (e.g. Auwal MD)">
    <input type="text" id="pfp" class="form-control" placeholder="Profile Picture Link (URL)">
    <small class="text-muted d-block mb-3">Later we will add direct image upload</small>
    <button onclick="saveProfile()" class="btn-reg">START CHATTING</button>
</div>

<script>
    function saveProfile() {
        let name = document.getElementById('username').value;
        let photo = document.getElementById('pfp').value;

        if(name === "") { alert("Please enter your name!"); return; }
        if(photo === "") { photo = "https://via.placeholder.com/150"; } // Default photo

        // Ajiye bayanan a wayar mutum (LocalStorage)
        localStorage.setItem('amd_name', name);
        localStorage.setItem('amd_photo', photo);

        window.location.href = "dashboard.html";
    }
</script>

</body>
</html>
