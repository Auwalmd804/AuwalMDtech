<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Auwal MD Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #000; color: white; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
        .setup-card { background: #111; padding: 30px; border-radius: 25px; width: 100%; max-width: 380px; text-align: center; border: 1px solid #333; }
        .logo-img { width: 180px; margin-bottom: 20px; }
        .pfp-area { width: 110px; height: 110px; border-radius: 50%; background: #222; margin: 0 auto 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; border: 2px dashed #444; overflow: hidden; }
        .pfp-area img { width: 100%; height: 100%; object-fit: cover; }
        .form-control { background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 12px; padding: 12px; margin-bottom: 15px; }
        .btn-start { background: #0084ff; border: none; color: white; padding: 12px; border-radius: 12px; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

<div class="setup-card shadow-lg">
    <img src="logo.jpg" class="logo-img">
    <div class="pfp-area" onclick="document.getElementById('pfpInput').click()">
        <span id="plusIcon" style="font-size: 30px; color: #555;">+</span>
        <img id="preview" style="display:none;">
    </div>
    <input type="file" id="pfpInput" hidden accept="image/*" onchange="previewImg()">

    <input type="text" id="fname" class="form-control" placeholder="First Name">
    <input type="text" id="lname" class="form-control" placeholder="Last Name">
    
    <button onclick="uploadAndStart()" id="startBtn" class="btn-start">CREATE ACCOUNT</button>
</div>

<script>
    const CLOUD_NAME = "dpxn8b7ao"; 
    const UPLOAD_PRESET = "ml_default"; // Tabbatar ka bude 'Unsigned' preset a Cloudinary Settings

    function previewImg() {
        const file = document.getElementById('pfpInput').files[0];
        if (file) {
            document.getElementById('preview').src = URL.createObjectURL(file);
            document.getElementById('preview').style.display = 'block';
            document.getElementById('plusIcon').style.display = 'none';
        }
    }

    async function uploadAndStart() {
        const fn = document.getElementById('fname').value;
        const ln = document.getElementById('lname').value;
        const file = document.getElementById('pfpInput').files[0];
        const btn = document.getElementById('startBtn');

        if(!fn || !ln) return alert("Please enter your names");

        btn.disabled = true;
        btn.innerText = "Setting up...";

        let finalPhoto = "https://via.placeholder.com/150";

        if(file) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', UPLOAD_PRESET);

            try {
                const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                finalPhoto = data.secure_url;
            } catch (e) { console.error("Upload failed"); }
        }

        localStorage.setItem('amd_user', JSON.stringify({ name: fn + " " + ln, photo: finalPhoto }));
        window.location.href = "dashboard.html";
    }
</script>
</body>
</html>
