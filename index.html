<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetayaX - Sign In & Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body {
            background-color: #0f2027;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .main-container {
            max-width: 450px;
            margin: 30px auto;
            padding: 25px;
            background: #162b36;
            border-radius: 16px;
            border: 1px solid #2c5364;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }
        .logo-area {
            text-align: center;
            margin-bottom: 25px;
        }
        .logo-area img {
            width: 75px;
            height: auto;
            border-radius: 50%;
        }
        .logo-area h3 {
            color: #25d366;
            font-weight: 700;
            margin-top: 12px;
        }
        .form-label {
            font-size: 0.85rem;
            color: #a0aab0;
            margin-bottom: 4px;
        }
        .form-control {
            background-color: #1a2a34;
            border: 1px solid #2c5364;
            color: #ffffff;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 15px;
        }
        .form-control:focus {
            background-color: #1a2a34;
            border-color: #25d366;
            color: #ffffff;
            box-shadow: none;
        }
        .btn-green {
            background-color: #25d366;
            color: #000000;
            font-weight: 600;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            transition: 0.2s;
        }
        .btn-green:hover {
            background-color: #128C7E;
            color: #ffffff;
        }
        .btn-outline-green {
            border: 1.5px solid #25d366;
            color: #25d366;
            font-weight: 600;
            width: 100%;
            padding: 11px;
            border-radius: 8px;
            background: transparent;
            transition: 0.2s;
            margin-top: 10px;
        }
        .btn-outline-green:hover {
            background-color: #25d366;
            color: #000000;
        }
        .footer-text {
            text-align: center;
            font-size: 0.75rem;
            color: #7b8890;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="main-container mt-5">
        <div class="logo-area">
            <img src="logo.png" alt="RetayaX Logo">
            <h3>RetayaX</h3>
            <p class="text-muted small">Sign In or Create Account</p>
        </div>

        <form id="authForm">
            <div class="mb-2">
                <label for="phoneOrEmail" class="form-label">* Phone Number or Email</label>
                <input type="text" class="form-control" id="phoneOrEmail" placeholder="Enter phone or email" required>
            </div>
            
            <div class="mb-3">
                <label for="password" class="form-label">* Password</label>
                <input type="password" class="form-control" id="password" placeholder="At least 8 characters" required>
                <div class="text-end">
                    <a href="forgot.html" class="text-success small text-decoration-none">Forgot Password?</a>
                </div>
            </div>

            <button type="submit" class="btn btn-green">Sign In</button>
        </form>

        <button class="btn btn-outline-green" onclick="location.href='create-account.html'">Create Account</button>

        <div class="footer-text">
            &copy; 2026 RetayaX - All Rights Reserved
        </div>
    </div>

</body>
</html>
