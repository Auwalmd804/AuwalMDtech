<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auwal MD Data - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body {
            margin: 0; padding: 0; width: 100%; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #0084ff);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
        }

        .logo-box img {
            width: 120px;
            filter: drop-shadow(0 0 10px rgba(0,132,255,0.5));
            margin-bottom: 10px;
            border-radius: 50%;
        }

        .welcome-txt {
            color: #fff;
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 20px;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 15px;
        }

        .form-control::placeholder { color: rgba(255,255,255,0.5); }

        .btn-main {
            background: linear-gradient(90deg, #0084ff, #00c6ff);
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            width: 100%;
            color: #fff;
            box-shadow: 0 10px 20px rgba(0,132,255,0.3);
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .toggle-link { color: #00c6ff; cursor: pointer; font-weight: 500; }
        .footer-txt { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 20px; }
        
        .spinner { display: none; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid #fff; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="login-card animate__animated animate__zoomIn">
    <div class="logo-box">
        <img src="Image_1.png" alt="Auwal MD Logo">
        <div class="welcome-txt">Sannu da zuwa Auwal MD Data & Services</div>
    </div>

    <div id="authContent">
        <div id="signupOnly">
            <input type="text" id="fullname" class="form-control" placeholder="Cikakken Suna (Full Name)">
        </div>
        <input type="number" id="phone" class="form-control" placeholder="Lambar Waya (Phone)">
        <input type="password" id="pass" class="form-control" placeholder="Kalmar Sirri (Password)">
        
        <button onclick="handleAuth()" class="btn-main mt-2">
            <span id="btnText">BUƊE ASUSU (SIGNUP)</span>
            <div class="spinner" id="btnLoader"></div>
        </button>
    </div>

    <div class="mt-4 small text-white-50">
        <span id="switchText">Kuna da asusu riga?</span> 
        <span class="toggle-link" id="switchBtn" onclick="toggleMode()">Login</span>
    </div>

    <div class="footer-txt">© 2026 Auwal MD Data • Amintaccen Shafin VTU</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA6Ce7cEDzcxOoEyh5Swl3wFx7ju-Up00k",
        authDomain: "auwalmdtech.firebaseapp.com",
        projectId: "auwalmdtech",
        storageBucket: "auwalmdtech.firebasestorage.app",
        messagingSenderId: "202329584080",
        appId: "1:202329584080:web:e989d7df53d3c3024609d5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let isLoginMode = false;

    window.toggleMode = function() {
        isLoginMode = !isLoginMode;
        document.getElementById('signupOnly').style.display = isLoginMode ? 'none' : 'block';
        document.getElementById('btnText').innerText = isLoginMode ? 'SHIGA (LOGIN)' : 'BUƊE ASUSU (SIGNUP)';
        document.getElementById('switchBtn').innerText = isLoginMode ? 'Sign Up' : 'Login';
        document.getElementById('switchText').innerText = isLoginMode ? "Ba ku da asusu?" : "Kuna da asusu?";
    }

    window.handleAuth = async function() {
        const phone = document.getElementById('phone').value;
        const pass = document.getElementById('pass').value;
        const loader = document.getElementById('btnLoader');
        const btnTxt = document.getElementById('btnText');

        if(!phone || !pass) return alert("Don Allah cika dukkan gurbi!");

        loader.style.display = 'block';
        btnTxt.style.opacity = '0.5';

        try {
            const userRef = doc(db, "users", phone);
            const userSnap = await getDoc(userRef);

            if(isLoginMode) {
                if(userSnap.exists() && userSnap.data().password === pass) {
                    localStorage.setItem('amd_user', JSON.stringify(userSnap.data()));
                    window.location.href = "dashboard.html";
                } else {
                    alert("❌ Lambar waya ko password ba su yi daidai ba!");
                }
            } else {
                if(userSnap.exists()) {
                    alert("Wannan lambar wayar tana da asusu riga!");
                } else {
                    const userData = {
                        name: document.getElementById('fullname').value,
                        phone: phone,
                        password: pass,
                        balance: 0, // Wallet balance na farko
                        role: "user"
                    };
                    await setDoc(userRef, userData);
                    localStorage.setItem('amd_user', JSON.stringify(userData));
                    window.location.href = "dashboard.html";
                }
            }
        } catch (e) {
            alert("Error: " + e.message);
        } finally {
            loader.style.display = 'none';
            btnTxt.style.opacity = '1';
        }
    }
</script>
</body>
</html>
