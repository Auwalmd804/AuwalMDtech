<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auwal MD Tech | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00AEEF; /* Blue daga logo dinka */
            --secondary: #adb5bd; /* Silver/Grey daga logo */
            --bg-gradient: linear-gradient(135deg, #0f172a, #1e293b);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-gradient);
            padding: 20px;
        }

        .container {
            background: #fff;
            padding: 30px; /* Na rage girman nan */
            border-radius: 20px;
            width: 100%;
            max-width: 360px; /* Na rage fadin container din */
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        /* Logo Style */
        .logo-img {
            width: 120px; /* Girman logo */
            margin-bottom: 15px;
        }

        h2 {
            font-weight: 600;
            color: #1e293b;
            font-size: 20px;
            margin-bottom: 5px;
        }

        p.subtitle {
            color: #64748b;
            font-size: 13px;
            margin-bottom: 20px;
        }

        .input-group { margin-bottom: 12px; text-align: left; }

        input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
            background: #f8fafc;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0, 174, 239, 0.1); }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: var(--primary);
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover { opacity: 0.9; transform: translateY(-1px); }

        .switch { margin-top: 15px; font-size: 13px; color: #64748b; }
        .switch span { color: var(--primary); cursor: pointer; font-weight: 600; }

        .contact { margin-top: 20px; display: flex; justify-content: center; gap: 15px; border-top: 1px solid #eee; padding-top: 15px; }
        .contact a img { width: 25px; opacity: 0.7; }

        footer { position: fixed; bottom: 15px; color: #94a3b8; font-size: 11px; }

        .spinner { display: none; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top: 2px solid #fff; border-radius: 50%; animation: spin 0.8s linear infinite; margin-left: 8px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="Auwal MD Tech" class="logo-img">
        
        <h2>Welcome Back</h2>
        <p class="subtitle">Please enter your details</p>

        <div id="loginForm">
            <div class="input-group">
                <input type="email" id="email" placeholder="Email Address">
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Password">
            </div>
            <button onclick="login()">Sign In <span class="spinner" id="spinner1"></span></button>
            <div class="switch">Don't have an account? <span onclick="showSignup()">Sign Up</span></div>
        </div>

        <div id="signupForm" style="display:none;">
            <div class="input-group">
                <input type="email" id="regEmail" placeholder="Email Address">
            </div>
            <div class="input-group">
                <input type="password" id="regPassword" placeholder="Password">
            </div>
            <div class="input-group">
                <input type="password" id="regConfirm" placeholder="Confirm Password">
            </div>
            <button onclick="register()">Create Account <span class="spinner" id="spinner2"></span></button>
            <div class="switch">Already have an account? <span onclick="showLogin()">Sign In</span></div>
        </div>

        <div class="contact">
            <a href="https://wa.me/2349137904300"><img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp"></a>
            <a href="mailto:yau789452@gmail.com"><img src="https://cdn-icons-png.flaticon.com/512/732/732200.png" alt="Gmail"></a>
        </div>
    </div>

    <footer>© 2026 Auwal MD Technology Company</footer>

    <script type="module">
        // ... (Nan zaka sa ragowar script din Firebase dinka yadda yake) ...
    </script>
</body>
</html>
