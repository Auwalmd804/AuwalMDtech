<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Notifications - AMD Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: white; }
        .notif-item { background: rgba(255,255,255,0.05); margin-bottom: 10px; border-radius: 10px; padding: 15px; }
    </style>
</head>
<body>
    <div class="container py-4">
        <h4>Notifications</h4>
        <div id="notifList">Loading...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { /* Manna Config dinka anan */ };
        const db = getFirestore(initializeApp(firebaseConfig));
        const currentUser = JSON.parse(localStorage.getItem('amd_user'));

        const q = query(collection(db, "notifications"), where("toPhone", "==", currentUser.phone), orderBy("createdAt", "desc"));

        onSnapshot(q, (snapshot) => {
            const list = document.getElementById('notifList');
            list.innerHTML = snapshot.empty ? "No new notifications" : "";
            snapshot.forEach(doc => {
                const n = doc.data();
                list.innerHTML += `<div class="notif-item"><b>${n.fromName}</b> ${n.type}.</div>`;
            });
        });
    </script>
</body>
</html>
