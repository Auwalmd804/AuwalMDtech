<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Post - Auwal MD Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: white; font-family: 'Poppins', sans-serif; padding: 20px; }
        .upload-card { background: #111; border-radius: 20px; padding: 20px; border: 1px solid #222; }
        .preview-box { 
            width: 100%; 
            height: 300px; 
            background: #1a1a1a; 
            border-radius: 15px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin-bottom: 20px; 
            overflow: hidden;
            border: 2px dashed #333;
        }
        .preview-box img, .preview-box video { width: 100%; height: 100%; object-fit: contain; }
        .form-control { background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 12px; }
        .btn-post { 
            background: linear-gradient(90deg, #0084ff, #00c6ff); 
            border: none; 
            padding: 12px; 
            border-radius: 12px; 
            font-weight: bold; 
            width: 100%; 
            margin-top: 20px;
        }
        .loading-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 10000; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

<div class="loading-overlay" id="loader">
    <div class="spinner-border text-primary mb-3"></div>
    <p>Uploading to Auwal MD Cloud...</p>
</div>

<div class="d-flex align-items-center mb-4">
    <i class="fas fa-arrow-left me-3 fs-4" onclick="history.back()"></i>
    <h4 class="m-0 fw-bold">Create New Post</h4>
</div>

<div class="upload-card">
    <div class="preview-box" id="dropZone" onclick="document.getElementById('fileInp').click()">
        <div id="placeholder">
            <i class="fas fa-cloud-upload-alt fs-1 mb-2 d-block text-center"></i>
            <span>Tap to select Photo or Video</span>
        </div>
        <img id="imgPrev" style="display:none;">
        <video id="vidPrev" style="display:none;" controls></video>
    </div>

    <input type="file" id="fileInp" hidden accept="image/*,video/*" onchange="handlePreview()">
    
    <label class="small text-muted mb-2">Caption</label>
    <textarea id="caption" class="form-control" rows="3" placeholder="What's on your mind?"></textarea>

    <button onclick="startUpload()" class="btn-post" id="postBtn">POST NOW</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA6Ce7cEDzcxOoEyh5Swl3wFx7ju-Up00k",
        authDomain: "auwalmdtech.firebaseapp.com",
        projectId: "auwalmdtech",
        storageBucket: "auwalmdtech.firebasestorage.app",
        messagingSenderId: "202329584080",
        appId: "1:202329584080:web:e989d7df53d3c3024609d5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const CLOUD_NAME = "dpxn8b7ao";
    const PRESET = "ml_default";

    window.handlePreview = function() {
        const file = document.getElementById('fileInp').files[0];
        const imgP = document.getElementById('imgPrev');
        const vidP = document.getElementById('vidPrev');
        const holder = document.getElementById('placeholder');

        if (!file) return;

        holder.style.display = 'none';
        if (file.type.startsWith('video/')) {
            vidP.src = URL.createObjectURL(file);
            vidP.style.display = 'block';
            imgP.style.display = 'none';
        } else {
            imgP.src = URL.createObjectURL(file);
            imgP.style.display = 'block';
            vidP.style.display = 'none';
        }
    }

    window.startUpload = async function() {
        const file = document.getElementById('fileInp').files[0];
        const text = document.getElementById('caption').value;
        const loader = document.getElementById('loader');
        const me = JSON.parse(localStorage.getItem('amd_user'));

        if(!file) return alert("Please select a file!");
        if(!me) return window.location.href="index.html";

        loader.style.display = 'flex';

        try {
            // 1. Upload to Cloudinary
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', PRESET);

            const resourceType = file.type.startsWith('video/') ? 'video' : 'image';
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/${resourceType}/upload`, {
                method: 'POST',
                body: formData
            });
            const data = await res.json();

            // 2. Save to Firebase
            await addDoc(collection(db, "posts"), {
                media: data.secure_url,
                type: resourceType,
                text: text,
                userName: me.name,
                userPhoto: me.photo,
                userPhone: me.phone,
                likes: 0,
                comments: 0,
                timestamp: serverTimestamp()
            });

            window.location.href = "dashboard.html";
        } catch (e) {
            alert("Upload Failed!");
            loader.style.display = 'none';
        }
    }
</script>
</body>
</html>
