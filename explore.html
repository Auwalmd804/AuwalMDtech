<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore - Auwal MD Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0084ff; --bg: #020617; --card: #0f172a; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; padding-bottom: 80px; }
        
        .search-header { background: var(--card); padding: 20px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #1e293b; }
        .search-input-group { background: #1e293b; border-radius: 12px; display: flex; align-items: center; padding: 10px 15px; }
        .search-input-group input { background: none; border: none; color: white; width: 100%; outline: none; margin-left: 10px; }
        
        .user-card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #1e293b; transition: 0.3s; }
        .user-card:hover { border-color: var(--primary); }
        .user-info { display: flex; align-items: center; }
        .user-pfp { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); }
        
        .btn-view { background: var(--primary); color: white; border: none; padding: 6px 15px; border-radius: 8px; font-size: 13px; font-weight: 600; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #1e293b; }
        .nav-link { color: #64748b; font-size: 22px; text-decoration: none; }
        .nav-link.active { color: var(--primary); }
        
        #results-area { padding: 15px; }
        .empty-state { text-align: center; margin-top: 50px; color: #64748b; }
    </style>
</head>
<body>

<div class="search-header">
    <h5 class="fw-bold mb-3">Explore Users</h5>
    <div class="search-input-group">
        <i class="fas fa-search text-muted"></i>
        <input type="text" id="searchInput" placeholder="Search by name or phone..." oninput="searchUsers()">
    </div>
</div>

<div id="results-area">
    <div class="empty-state" id="loader">
        <i class="fas fa-users fs-1 mb-3"></i>
        <p>Start typing to discover people...</p>
    </div>
</div>

<div class="bottom-nav">
    <a href="dashboard.html" class="nav-link"><i class="fas fa-home"></i></a>
    <a href="chats.html" class="nav-link"><i class="fas fa-comment"></i></a>
    <a href="create-post.html" class="nav-link"><i class="fas fa-plus-square"></i></a>
    <a href="explore.html" class="nav-link active"><i class="fas fa-compass"></i></a>
    <a href="profile.html" class="nav-link"><i class="fas fa-user"></i></a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA6Ce7cEDzcxOoEyh5Swl3wFx7ju-Up00k",
        authDomain: "auwalmdtech.firebaseapp.com",
        projectId: "auwalmdtech",
        storageBucket: "auwalmdtech.firebasestorage.app",
        messagingSenderId: "202329584080",
        appId: "1:202329584080:web:e989d7df53d3c3024609d5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let allUsers = [];

    // 1. Pre-fetch users (Limit to 50 for speed)
    async function loadInitialUsers() {
        const q = query(collection(db, "users"), limit(50));
        const snap = await getDocs(q);
        allUsers = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderUsers(allUsers);
    }

    // 2. Search Filter Logic
    window.searchUsers = function() {
        const keyword = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allUsers.filter(u => 
            u.name.toLowerCase().includes(keyword) || 
            u.phone.includes(keyword)
        );
        renderUsers(filtered);
    }

    // 3. Render function
    function renderUsers(usersList) {
        const area = document.getElementById('results-area');
        area.innerHTML = "";

        if(usersList.length === 0) {
            area.innerHTML = `<div class="empty-state"><p>No users found with that name.</p></div>`;
            return;
        }

        usersList.forEach(u => {
            const pfp = u.photo || `https://ui-avatars.com/api/?name=${u.name}&background=0084ff&color=fff`;
            area.innerHTML += `
                <div class="user-card">
                    <div class="user-info">
                        <img src="${pfp}" class="user-pfp">
                        <div class="ms-3">
                            <h6 class="m-0 fw-bold">${u.name}</h6>
                            <small class="text-muted">${u.phone}</small>
                        </div>
                    </div>
                    <button class="btn-view" onclick="viewUserProfile('${u.phone}')">View</button>
                </div>
            `;
        });
    }

    window.viewUserProfile = (phone) => {
        // We will store the target user in sessionStorage and redirect
        sessionStorage.setItem('target_user_phone', phone);
        window.location.href = "user-profile.html"; 
    };

    loadInitialUsers();
</script>
</body>
</html>
