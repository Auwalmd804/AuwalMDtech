<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore - Auwal MD Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #020617; color: white; font-family: 'Poppins', sans-serif; margin-bottom: 70px; }
        .explore-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; }
        .grid-item { aspect-ratio: 1/1; background: #1e293b; overflow: hidden; position: relative; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }
        .video-icon { position: absolute; top: 10px; right: 10px; font-size: 12px; text-shadow: 0 0 5px rgba(0,0,0,0.5); }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #0f172a; display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid rgba(255,255,255,0.1); }
        .nav-link { color: #64748b; text-decoration: none; font-size: 18px; text-align: center; }
        .nav-link.active { color: #0084ff; }
    </style>
</head>
<body>

<div class="p-3">
    <h4 class="fw-bold">Explore</h4>
    <div class="search-box mb-3" style="background: #1e293b; border-radius: 10px; padding: 8px 15px; display: flex; align-items: center;">
        <i class="fas fa-search text-muted"></i>
        <input type="text" placeholder="Search content..." style="background: transparent; border: none; color: white; margin-left: 10px; outline: none; width: 100%;">
    </div>
</div>

<div class="explore-grid">
    <div class="grid-item"><img src="https://picsum.photos/200/200?random=1"><i class="fas fa-play video-icon"></i></div>
    <div class="grid-item"><img src="https://picsum.photos/200/200?random=2"></div>
    <div class="grid-item"><img src="https://picsum.photos/200/200?random=3"><i class="fas fa-play video-icon"></i></div>
    <div class="grid-item"><img src="https://picsum.photos/200/200?random=4"></div>
    <div class="grid-item"><img src="https://picsum.photos/200/200?random=5"></div>
    <div class="grid-item"><img src="https://picsum.photos/200/200?random=6"><i class="fas fa-play video-icon"></i></div>
</div>

<div class="bottom-nav">
    <a href="dashboard.html" class="nav-link"><i class="fas fa-home"></i></a>
    <a href="chats.html" class="nav-link"><i class="fas fa-comment-dots"></i></a>
    <a href="explore.html" class="nav-link active"><i class="fas fa-compass"></i></a>
    <a href="profile.html" class="nav-link"><i class="fas fa-user"></i></a>
</div>

</body>
</html>
