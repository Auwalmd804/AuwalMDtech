<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Auwal MD Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0084ff; --bg: #020617; }
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; padding-bottom: 80px; }
        
        /* Header */
        .profile-header { padding: 20px; background: #0f172a; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .pfp-container { width: 100px; height: 100px; margin: 0 auto; position: relative; }
        .pfp-main { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary); }
        
        /* Real Stats */
        .stats-bar { display: flex; justify-content: center; gap: 40px; margin: 20px 0; }
        .stat-box { text-align: center; }
        .stat-num { display: block; font-size: 20px; font-weight: 700; color: white; }
        .stat-label { font-size: 13px; color: #64748b; }

        /* Action Buttons */
        .action-area { padding: 0 20px; display: flex; gap: 10px; }
        .btn-main { flex: 1; background: #1e293b; border: none; color: white; padding: 10px; border-radius: 8px; font-weight: 600; transition: 0.3s; }
        .btn-main:hover { background: #334155; }
        .btn-logout { width: 50px; background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid #ef4444; border-radius: 8px; }

        /* Media Grid */
        .content-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 20px; }
        .grid-square { aspect-ratio: 1/1; background: #0f172a; position: relative; overflow: hidden; }
        .grid-square img, .grid-square video { width: 100%; height: 100%; object-fit: cover; }
        .video-tag { position: absolute; top: 8px; right: 8px; font-size: 12px; color: white; }

        /* Bottom Nav */
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: #0f172a; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid rgba(255,255,255,0.1); z-index: 1000; }
        .nav-item { color: #64748b; text-decoration: none; font-size: 22px; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

<div class="profile-header text-center">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <i class="fas fa-chevron-left fs-5" onclick="location.href='dashboard.html'"></i>
        <span class="fw-bold" id="username_top">Profile</span>
        <i class="fas fa-ellipsis-v fs-5"></i>
    </div>

    <div class="pfp-container">
        <img id="display_pfp" src="https://ui-avatars.com/api/?name=User" class="pfp-main">
    </div>
    
    <h5 class="mt-3 fw-bold mb-0" id="display_name">Loading...</h5>
    <p class="text-muted small">Auwal MD Network User</p>

    <div class="stats-bar">
        <div class="stat-box">
            <span class="stat-num" id="real_post_count">0</span>
            <span class="stat-label">Posts</span>
        </div>
        <div class="stat-box">
            <span class="stat-num">0</span>
            <span class="stat-label">Followers</span>
        </div>
        <div class="stat-box">
            <span class="stat-num">0</span>
            <span class="stat-label">Following</span>
        </div>
    </div>
</div>

<div class="action-area">
    <button class="btn-main" onclick="alert('Edit Profile coming soon')">Edit Profile</button>
    <button class="btn-logout" onclick="userLogout()"><i class="fas fa-sign-out-alt"></i></button>
</div>

<div class="content-grid" id="post_grid">
    </div>

<div class="nav-bottom">
    <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i></a>
    <a href="chats.html" class="nav-item"><i class="fas fa-comment"></i></a>
    <a href="create-post.html" class="nav-item"><i class="fas fa-plus-square"></i></a>
    <a href="profile.html" class="nav-item active"><i class="fas fa-user"></i></a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA6Ce7cEDzcxOoEyh5Swl3wFx7ju-Up00k",
        authDomain: "auwalmdtech.firebaseapp.com",
        projectId: "auwalmdtech",
        storageBucket: "auwalmdtech.firebasestorage.app",
        messagingSenderId: "202329584080",
        appId: "1:202329584080:web:e989d7df53d3c3024609d5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const currentUser = JSON.parse(localStorage.getItem('amd_user'));

    if(!currentUser) {
        window.location.href = "login.html";
    } else {
        document.getElementById('display_name').innerText = currentUser.name;
        document.getElementById('username_top').innerText = currentUser.name;
        document.getElementById('display_pfp').src = currentUser.photo || `https://ui-avatars.com/api/?name=${currentUser.name}&background=0084ff&color=fff`;
        fetchUserContent();
    }

    async function fetchUserContent() {
        const grid = document.getElementById('post_grid');
        // Fetch posts where userId matches the logged in user's phone number
        const q = query(collection(db, "posts"), where("userId", "==", currentUser.phone), orderBy("createdAt", "desc"));
        
        try {
            const snapshot = await getDocs(q);
            document.getElementById('real_post_count').innerText = snapshot.size;
            grid.innerHTML = "";

            if (snapshot.empty) {
                grid.innerHTML = `<div class="text-center w-100 p-5 text-muted">No posts found</div>`;
                return;
            }

            snapshot.forEach((doc) => {
                const post = doc.data();
                let html = "";
                if(post.type === 'video') {
                    html = `<div class="grid-square"><i class="fas fa-video video-tag"></i><video src="${post.fileUrl}#t=0.1"></video></div>`;
                } else if(post.type === 'image') {
                    html = `<div class="grid-square"><img src="${post.fileUrl}"></div>`;
                } else {
                    html = `<div class="grid-square d-flex align-items-center p-2 small" style="background:#1e293b">${post.caption}</div>`;
                }
                grid.innerHTML += html;
            });
        } catch (err) {
            console.error(err);
        }
    }

    window.userLogout = function() {
        if(confirm("Are you sure you want to log out?")) {
            localStorage.removeItem('amd_user');
            window.location.href = "login.html";
        }
    }
</script>
</body>
</html>
