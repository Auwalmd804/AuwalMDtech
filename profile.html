<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RetayaX - Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body { 
            background: #0f2027; 
            color: white; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .main-container {
            max-width: 420px;
            margin: auto;
            padding: 25px;
            background: #162b36;
            border-radius: 16px;
            border: 1px solid #2c5364;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            width: 90%;
            margin-top: 20px;
            margin-bottom: 20px;
        }
        .logo-area {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo-area img {
            width: 60px;
            height: auto;
            border-radius: 50%;
        }
        .logo-area h4 {
            color: #25d366;
            font-weight: 700;
            margin-top: 8px;
        }
        .form-label {
            font-size: 0.82rem;
            color: #a0aab0;
            margin-bottom: 4px;
        }
        .form-control {
            background-color: #1a2a34;
            border: 1px solid #2c5364;
            color: #ffffff;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 12px;
            font-size: 0.9rem;
        }
        .form-control:focus {
            background-color: #1a2a34;
            border-color: #25d366;
            color: #ffffff;
            box-shadow: none;
        }
        .form-control:read-only {
            background-color: #1a2a34;
            color: #b0c4de;
            border: 1px solid #2c5364;
        }
        .btn-green {
            background-color: #25d366;
            color: #000000;
            font-weight: 600;
            width: 100%;
            padding: 11px;
            border-radius: 8px;
            border: none;
            transition: 0.2s;
            margin-bottom: 8px;
        }
        .btn-green:hover {
            background-color: #128C7E;
            color: #ffffff;
        }
        .btn-secondary-custom {
            background-color: #2c5364;
            color: #ffffff;
            width: 100%;
            padding: 11px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
        }
        .btn-secondary-custom:hover {
            background-color: #1a2a34;
        }
        #loadingOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 32, 39, 0.95);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #25d366;
        }
        .alert-box {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10000;
            width: 90%;
            max-width: 400px;
            border-radius: 10px;
            text-align: center;
            padding: 12px;
            font-weight: 600;
            display: none;
        }
        .divider {
            border-top: 1px solid #2c5364;
            margin: 15px 0;
        }
    </style>
</head>
<body>

    <div id="alertBox" class="alert-box"></div>

    <div id="loadingOverlay" style="display: none;">
        <div class="spinner-border text-success mb-3" role="status"></div>
        <h5>Processing, please wait...</h5>
    </div>

    <div class="main-container">
        <div class="logo-area">
            <img src="logo.png" alt="RetayaX Logo">
            <h4>Profile Settings</h4>
            <p class="text-muted small">Update your account information</p>
        </div>

        <form id="profileForm">
            <div class="mb-2">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" id="profileName" placeholder="Enter full name" readonly required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email Address / Phone</label>
                <input type="text" class="form-control" id="profileEmail" readonly>
            </div>

            <div class="divider"></div>

            <h6 class="text-success mb-3"><i class="fas fa-lock me-2"></i>Change Password</h6>

            <div class="mb-2">
                <label class="form-label">Enter Old Password</label>
                <input type="password" class="form-control" id="oldPassword" placeholder="Enter current password">
            </div>

            <div class="mb-2">
                <label class="form-label">Enter New Password</label>
                <input type="password" class="form-control" id="newPassword" placeholder="Enter new password">
            </div>

            <div class="mb-3">
                <label class="form-label">Confirm New Password</label>
                <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm new password">
            </div>

            <button type="submit" class="btn btn-green">Save Changes</button>
            <button type="button" class="btn btn-secondary-custom mt-2" onclick="location.href='dashboard.html'">Back to Dashboard</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, updatePassword, EmailAuthProvider, reauthenticateWithCredential } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA6Ce7cEDzcxOoEyh5Swl3wFx7ju-Up00k",
            authDomain: "auwalmdtech.firebaseapp.com",
            projectId: "auwalmdtech",
            storageBucket: "auwalmdtech.firebasestorage.app",
            messagingSenderId: "202329584080",
            appId: "1:202329584080:web:e989d7df53d3c3024609d5",
            measurementId: "G-8SZ1MQRMC9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        function showMessage(type, text) {
            const box = document.getElementById('alertBox');
            box.innerText = text;
            if (type === 'success') {
                box.className = 'alert-box bg-success text-black shadow';
            } else {
                box.className = 'alert-box bg-danger text-white shadow';
            }
            box.style.display = 'block';
            setTimeout(() => { box.style.display = 'none'; }, 4500);
        }

        // Tabbatar da an nuna sunan mai amfani da email/lamba
        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('profileName').value = user.displayName || '';
                document.getElementById('profileEmail').value = user.email || '';
            } else {
                location.replace("index.html");
            }
        });

        // Aikin canza kalmar sirri
        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const overlay = document.getElementById('loadingOverlay');
            
            const oldPass = document.getElementById('oldPassword').value;
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;

            if (!oldPass || !newPass || !confirmPass) {
                showMessage('error', 'Please fill in all password fields.');
                return;
            }

            if (newPass !== confirmPass) {
                showMessage('error', 'New passwords do not match.');
                return;
            }

            if (newPass.length < 6) {
                showMessage('error', 'Password must be at least 6 characters.');
                return;
            }

            overlay.style.display = 'flex';

            try {
                const user = auth.currentUser;
                const credential = EmailAuthProvider.credential(user.email, oldPass);

                // Re-authenticate user
                await reauthenticateWithCredential(user, credential);

                // Update to the new password
                await updatePassword(user, newPass);

                overlay.style.display = 'none';
                showMessage('success', 'Password changed successfully!');
                
                // Sake saita form din
                document.getElementById('oldPassword').value = '';
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmPassword').value = '';

                setTimeout(() => {
                    location.replace("dashboard.html");
                }, 2000);

            } catch (error) {
                overlay.style.display = 'none';
                // Sakon da zai fito
                if (error.code === 'auth/wrong-password') {
                    showMessage('error', 'Incorrect old password provided.');
                } else {
                    showMessage('error', 'Error: ' + error.message);
                }
            }
        });
    </script>
</body>
</html>
