<style>
    .profile-container { text-align: center; padding: 40px 20px; }
    .pfp-main { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #0084ff; object-fit: cover; }
    .edit-btn { background: #1f1f1f; color: #0084ff; border: 1px solid #333; border-radius: 10px; padding: 5px 15px; margin-top: 10px; }
</style>

<div class="profile-container animate__animated animate__fadeIn">
    <div class="position-relative d-inline-block">
        <img id="myBigPfp" src="logo.jpg" class="pfp-main">
        <input type="file" id="changePfp" hidden accept="image/*" onchange="updateProfilePhoto()">
        <button class="edit-btn d-block mx-auto" onclick="document.getElementById('changePfp').click()">Change Photo</button>
    </div>
    <h3 id="profileName" class="mt-3 fw-bold"></h3>
    <p id="profilePhone" class="text-muted"></p>
    <hr style="border-color: #333;">
    <div class="d-flex justify-content-around">
        <div><b id="followerCount">0</b><br><small>Followers</small></div>
        <div><b id="followingCount">0</b><br><small>Following</small></div>
    </div>
</div>

<script>
    async function updateProfilePhoto() {
        const file = document.getElementById('changePfp').files[0];
        const cloudName = "dpxn8b7ao";
        const preset = "ml_default";
        
        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', preset);

        const res = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
            method: 'POST',
            body: formData
        });
        const data = await res.json();
        
        // Update Firebase & LocalStorage
        const user = JSON.parse(localStorage.getItem('amd_user'));
        user.photo = data.secure_url;
        localStorage.setItem('amd_user', JSON.stringify(user));
        document.getElementById('myBigPfp').src = data.secure_url;
        alert("Photo Updated!");
    }
</script>
