<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Auwal MD Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            background: linear-gradient(180deg, #0f0c29 0%, #000000 100%); 
            color: white; 
            font-family: 'Poppins', sans-serif; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .profile-card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(15px);
            border-radius: 30px; 
            padding: 40px 25px; 
            width: 90%;
            max-width: 380px;
            text-align: center; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .pfp-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 15px;
        }

        .pfp-circle { 
            width: 100%; height: 100%; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 3px solid #0084ff; 
            box-shadow: 0 0 15px rgba(0, 132, 255, 0.5);
        }

        .btn-update { 
            background: #0084ff; color: white; border: none; 
            padding: 10px; border-radius: 12px; font-weight: 600; font-size: 13px;
        }

        .stats-box { 
            display: flex; justify-content: space-around; 
            margin-top: 25px; padding-top: 20px; 
            border-top: 1px solid rgba(255,255,255,0.1); 
        }

        .stat-item b { font-size: 18px; display: block; }
        .stat-item small { color: #888; font-size: 11px; text-transform: uppercase; }

        .back-nav { position: absolute; top: 25px; left: 25px; color: white; cursor: pointer; }
    </style>
</head>
<body>

<i class="fas fa-arrow-left back-nav fs-4" onclick="history.back()"></i>

<div class="profile-card">
    <div class="pfp-container">
        <img id="myBigPfp" src="" class="pfp-circle">
        <input type="file" id="changePfp" hidden accept="image/*" onchange="updateProfilePhoto()">
    </div>
    
    <h3 id="profileName" class="fw-bold m-0">Loading...</h3>
    <p id="profilePhone" class="text-muted small mb-3"></p>
    
    <button class="btn-update w-100 mb-3" onclick="document.getElementById('changePfp').click()">
        <i class="fas fa-camera me-2"></i> UPDATE PHOTO
    </button>

    <button class="btn btn-outline-danger w-100 rounded-pill fw-bold btn-sm py-2" onclick="logoutUser()">
        <i class="fas fa-sign-out-alt me-2"></i> LOGOUT ACCOUNT
    </button>

    <div class="stats-box">
        <div class="stat-item">
            <b id="followerCount">0</b>
            <small>Followers</small>
        </div>
        <div class="stat-item">
            <b id="followingCount">0</b>
            <small>Following</small>
        </div>
    </div>
</div>

<script>
    // Karanto bayanan mutum
    const user = JSON.parse(localStorage.getItem('amd_user'));

    if(user) {
        document.getElementById('profileName').innerText = user.name;
        document.getElementById('profilePhone').innerText = "+234 " + user.phone;
        
        // Duba hoto
        const userImg = user.photo && user.photo.includes("http") 
            ? user.photo 
            : `https://ui-avatars.com/api/?name=${user.name}&background=0084ff&color=fff&size=128&bold=true`;
        
        document.getElementById('myBigPfp').src = userImg;
    } else {
        window.location.href = "index.html"; 
    }

    // Aikin Logout
    function logoutUser() {
        if(confirm("Are you sure you want to log out of Auwal MD Chat?")) {
            localStorage.removeItem('amd_user');
            window.location.href = "index.html"; 
        }
    }

    function updateProfilePhoto() {
        alert("Redirecting to upload system...");
        // Zaka iya kiran shafin upload anan
    }
</script>

</body>
</html>
