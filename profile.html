<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Auwal MD Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0084ff; --bg: #020617; }
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; padding-bottom: 80px; }
        .profile-card { padding: 20px; text-align: center; background: #0f172a; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .pfp-img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary); }
        .stat-val { font-weight: bold; font-size: 1.2rem; display: block; }
        .stat-lab { font-size: 0.8rem; color: #64748b; }
        .grid-post { aspect-ratio: 1/1; background: #1e293b; overflow: hidden; border: 1px solid #020617; }
        .grid-post img, .grid-post video { width: 100%; height: 100%; object-fit: cover; }
        .nav-bot { position: fixed; bottom: 0; width: 100%; background: #0f172a; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<div class="profile-card">
    <div class="d-flex justify-content-between mb-3">
        <i class="fas fa-arrow-left" onclick="window.location.href='dashboard.html'"></i>
        <h6 class="m-0 fw-bold">My Profile</h6>
        <i class="fas fa-cog"></i>
    </div>
    <img id="userPfp" src="https://ui-avatars.com/api/?name=User" class="pfp-img">
    <h5 class="mt-3 fw-bold" id="userName">Loading...</h5>
    
    <div class="d-flex justify-content-center gap-4 mt-3">
        <div class="text-center"><span class="stat-val" id="postCount">0</span><span class="stat-lab">Posts</span></div>
        <div class="text-center"><span class="stat-val">0</span><span class="stat-lab">Followers</span></div>
        <div class="text-center"><span class="stat-val">0</span><span class="stat-lab">Following</span></div>
    </div>
</div>

<div class="row g-1 m-0" id="postGrid">
    </div>

<div class="nav-bot">
    <a href="dashboard.html" class="text-muted"><i class="fas fa-home"></i></a>
    <a href="chats.html" class="text-muted"><i class="fas fa-comment"></i></a>
    <a href="create-post.html" class="text-muted"><i class="fas fa-plus-square"></i></a>
    <a href="profile.html" class="text-primary"><i class="fas fa-user"></i></a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA6Ce7cEDzcxOoEyh5Swl3wFx7ju-Up00k",
        authDomain: "auwalmdtech.firebaseapp.com",
        projectId: "auwalmdtech",
        storageBucket: "auwalmdtech.firebasestorage.app",
        messagingSenderId: "202329584080",
        appId: "1:202329584080:web:e989d7df53d3c3024609d5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const user = JSON.parse(localStorage.getItem('amd_user'));

    if(!user) {
        window.location.href = "login.html";
    } else {
        document.getElementById('userName').innerText = user.name;
        document.getElementById('userPfp').src = user.photo || `https://ui-avatars.com/api/?name=${user.name}`;
        loadMyPosts();
    }

    async function loadMyPosts() {
        const grid = document.getElementById('postGrid');
        // Neman ainihin posts din daka tura a Database
        const q = query(collection(db, "posts"), where("userId", "==", user.phone), orderBy("createdAt", "desc"));
        
        try {
            const snap = await getDocs(q);
            document.getElementById('postCount').innerText = snap.size;
            grid.innerHTML = "";

            if(snap.empty) {
                grid.innerHTML = "<p class='text-center w-100 mt-5 text-muted'>No posts yet.</p>";
                return;
            }

            snap.forEach(doc => {
                const post = doc.data();
                let media = "";
                if(post.type === 'image') media = `<img src="${post.fileUrl}">`;
                else if(post.type === 'video') media = `<video src="${post.fileUrl}"></video>`;
                else media = `<div class="p-2 small d-flex align-items-center h-100">${post.caption}</div>`;

                grid.innerHTML += `<div class="col-4 grid-post">${media}</div>`;
            });
        } catch(e) { console.log(e); }
    }
</script>
</body>
</html>
