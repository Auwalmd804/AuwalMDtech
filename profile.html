<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Auwal MD Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0084ff; --dark-bg: #020617; --card-bg: #0f172a; }
        body { background: var(--dark-bg); color: #ffffff; font-family: 'Inter', sans-serif; padding-bottom: 80px; }
        
        .header-nav { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        
        .profile-info { text-align: center; padding: 20px; }
        .pfp-container { position: relative; width: 120px; height: 120px; margin: 0 auto; }
        .profile-img { width: 100%; height: 100%; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover; box-shadow: 0 0 15px rgba(0, 132, 255, 0.3); }
        .camera-overlay { position: absolute; bottom: 5px; right: 5px; background: var(--primary); width: 35px; height: 35px; border-radius: 50%; border: 3px solid var(--card-bg); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .camera-overlay:hover { transform: scale(1.1); }

        .user-stats { display: flex; justify-content: center; gap: 35px; margin: 25px 0; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; }
        .stat-box { text-align: center; }
        .stat-count { display: block; font-weight: 800; font-size: 1.2rem; color: #fff; }
        .stat-label { font-size: 0.7rem; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }

        .action-area { padding: 0 20px; margin-bottom: 25px; }
        .btn-edit-profile { width: 100%; background: linear-gradient(135deg, var(--primary), #00c6ff); border: none; color: white; padding: 12px; border-radius: 10px; font-size: 14px; font-weight: 600; box-shadow: 0 4px 15px rgba(0, 132, 255, 0.2); }

        .media-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; }
        .media-item { aspect-ratio: 1/1; background: var(--card-bg); overflow: hidden; position: relative; }
        .media-item img, .media-item video { width: 100%; height: 100%; object-fit: cover; }
        .media-item i { position: absolute; top: 8px; right: 8px; color: white; text-shadow: 0 0 5px rgba(0,0,0,0.5); }

        .bottom-bar { position: fixed; bottom: 0; width: 100%; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid rgba(255,255,255,0.1); z-index: 1000; }
        .bar-link { color: #64748b; font-size: 20px; text-decoration: none; transition: 0.3s; }
        .bar-link.active { color: var(--primary); transform: translateY(-5px); }
        
        #uploading-status { display: none; text-align: center; font-size: 12px; color: var(--primary); margin-top: 10px; }
    </style>
</head>
<body>

<div class="header-nav">
    <i class="fas fa-arrow-left fs-5" onclick="location.href='dashboard.html'"></i>
    <span class="fw-bold fs-5" id="top-title">My Profile</span>
    <i class="fas fa-ellipsis-v text-muted"></i>
</div>

<div class="profile-info">
    <div class="pfp-container">
        <img id="user-avatar" src="" class="profile-img">
        <label for="img-upload" class="camera-overlay">
            <i class="fas fa-camera text-white"></i>
        </label>
        <input type="file" id="img-upload" hidden accept="image/*">
    </div>
    <div id="uploading-status"><i class="fas fa-spinner fa-spin me-2"></i>Updating Profile...</div>

    <h5 class="mt-3 fw-bold mb-0" id="display-name">---</h5>
    <p class="text-muted small mb-0" id="display-phone">@username</p>
    <p class="small text-primary mt-1">Auwal MD Network User</p>

    <div class="user-stats">
        <div class="stat-box"><span class="stat-count" id="post-total">0</span><span class="stat-label">Posts</span></div>
        <div class="stat-box"><span class="stat-count" id="follower-total">0</span><span class="stat-label">Followers</span></div>
        <div class="stat-box"><span class="stat-count" id="following-total">0</span><span class="stat-label">Following</span></div>
    </div>
</div>

<div class="action-area">
    <button class="btn-edit-profile" onclick="location.href='edit-profile.html'">Edit Profile</button>
</div>

<div class="media-grid" id="user-gallery">
    </div>

<div class="bottom-bar">
    <a href="dashboard.html" class="bar-link"><i class="fas fa-home"></i></a>
    <a href="chats.html" class="bar-link"><i class="fas fa-comment-dots"></i></a>
    <a href="create-post.html" class="bar-link"><i class="fas fa-plus-circle"></i></a>
    <a href="explore.html" class="bar-link"><i class="fas fa-compass"></i></a>
    <a href="profile.html" class="bar-link active"><i class="fas fa-user"></i></a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, orderBy, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA6Ce7cEDzcxOoEyh5Swl3wFx7ju-Up00k",
        authDomain: "auwalmdtech.firebaseapp.com",
        projectId: "auwalmdtech",
        storageBucket: "auwalmdtech.firebasestorage.app",
        messagingSenderId: "202329584080",
        appId: "1:202329584080:web:e989d7df53d3c3024609d5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const authUser = JSON.parse(localStorage.getItem('amd_user'));

    if(!authUser) { window.location.href = "index.html"; }

    // Cloudinary Setup
    const CLOUD_NAME = "dpxn8b7ao"; 
    const UPLOAD_PRESET = "ml_default"; 

    // UI Initial Load
    document.getElementById('display-name').innerText = authUser.name;
    document.getElementById('display-phone').innerText = "@" + authUser.phone;
    document.getElementById('user-avatar').src = authUser.photo || `https://ui-avatars.com/api/?name=${authUser.name}&background=0084ff&color=fff`;

    // 1. UPLOAD PHOTO LOGIC
    document.getElementById('img-upload').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if(!file) return;

        document.getElementById('uploading-status').style.display = "block";

        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', UPLOAD_PRESET);

        try {
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                method: 'POST',
                body: formData
            });
            const data = await res.json();
            
            if(data.secure_url) {
                // Update LocalStorage
                authUser.photo = data.secure_url;
                localStorage.setItem('amd_user', JSON.stringify(authUser));
                
                // Update UI
                document.getElementById('user-avatar').src = data.secure_url;
                alert("Profile picture updated successfully!");
            }
        } catch (err) {
            console.error(err);
            alert("Update failed. Check your internet.");
        }
        document.getElementById('uploading-status').style.display = "none";
    });

    // 2. FETCH REAL-TIME DATA (Posts, Followers, Following)
    function syncProfileData() {
        const gallery = document.getElementById('user-gallery');

        // A. Load Posts & Count
        const qPosts = query(collection(db, "posts"), where("phone", "==", authUser.phone), orderBy("createdAt", "desc"));
        onSnapshot(qPosts, (snap) => {
            document.getElementById('post-total').innerText = snap.size;
            gallery.innerHTML = "";
            snap.forEach(doc => {
                const p = doc.data();
                const isVideo = p.type === 'video';
                const content = isVideo 
                    ? `<video src="${p.fileUrl}#t=0.1"></video><i class="fas fa-play"></i>` 
                    : `<img src="${p.fileUrl}">`;
                
                gallery.innerHTML += `<div class="media-item">${content}</div>`;
            });
        });

        // B. Count Followers
        const qFollowers = query(collection(db, "follows"), where("following", "==", authUser.phone));
        onSnapshot(qFollowers, (snap) => {
            document.getElementById('follower-total').innerText = snap.size;
        });

        // C. Count Following
        const qFollowing = query(collection(db, "follows"), where("follower", "==", authUser.phone));
        onSnapshot(qFollowing, (snap) => {
            document.getElementById('following-total').innerText = snap.size;
        });
    }

    syncProfileData();
</script>

</body>
</html>
