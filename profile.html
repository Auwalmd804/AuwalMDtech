<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Auwal MD Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0084ff; --bg: #020617; }
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; padding-bottom: 80px; }
        
        /* Profile Header */
        .profile-top { padding: 20px; text-align: center; background: #0f172a; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .pfp-main { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary); padding: 3px; }
        
        .stats-row { display: flex; justify-content: center; gap: 30px; margin-top: 15px; }
        .stat-item { text-align: center; }
        .stat-num { display: block; font-weight: bold; font-size: 18px; }
        .stat-label { font-size: 12px; color: #64748b; }

        /* Action Buttons */
        .profile-actions { display: flex; gap: 10px; padding: 15px; }
        .btn-edit { flex: 1; background: #1e293b; color: white; border: none; padding: 8px; border-radius: 8px; font-size: 14px; font-weight: 500; }
        .btn-logout { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid #ef4444; padding: 8px 15px; border-radius: 8px; }

        /* Posts Grid */
        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 10px; }
        .grid-item { aspect-ratio: 1/1; background: #0f172a; overflow: hidden; position: relative; cursor: pointer; }
        .grid-item img, .grid-item video { width: 100%; height: 100%; object-fit: cover; }
        .grid-item .video-icon { position: absolute; top: 5px; right: 5px; color: white; font-size: 12px; text-shadow: 0 0 3px black; }
        .grid-item .text-preview { font-size: 10px; padding: 5px; color: #64748b; text-align: center; display: flex; align-items: center; height: 100%; background: #1e293b; }

        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: #0f172a; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid rgba(255,255,255,0.1); }
        .nav-link { color: #64748b; text-decoration: none; font-size: 20px; }
        .nav-link.active { color: var(--primary); }
    </style>
</head>
<body>

<div class="profile-top">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <i class="fas fa-arrow-left fs-5" onclick="window.location.href='dashboard.html'"></i>
        <h6 class="m-0 fw-bold" id="topName">Profile</h6>
        <i class="fas fa-cog fs-5 text-muted"></i>
    </div>
    
    <img id="mainPfp" src="https://ui-avatars.com/api/?name=User" class="pfp-main">
    <h5 class="mt-3 mb-0 fw-bold" id="profileName">Loading...</h5>
    <p class="text-muted small" id="profileBio">Auwal MD Tech User</p>

    <div class="stats-row">
        <div class="stat-item"><span class="stat-num" id="postCount">0</span><span class="stat-label">Posts</span></div>
        <div class="stat-item"><span class="stat-num" id="followerCount">0</span><span class="stat-label">Followers</span></div>
        <div class="stat-item"><span class="stat-num" id="followingCount">0</span><span class="stat-label">Following</span></div>
    </div>
</div>

<div class="profile-actions">
    <button class="btn-edit" onclick="alert('Za a kawo gyaran profile nan ba da dadewa ba!')">Edit Profile</button>
    <button class="btn-logout" onclick="logoutUser()"><i class="fas fa-sign-out-alt"></i></button>
</div>

<div class="grid-container" id="userPostsGrid">
    <div class="text-center w-100 p-5">
        <div class="spinner-border spinner-border-sm text-primary"></div>
    </div>
</div>

<div class="nav-bottom">
    <a href="dashboard.html" class="nav-link"><i class="fas fa-home"></i></a>
    <a href="chats.html" class="nav-link"><i class="fas fa-comment"></i></a>
    <a href="create-post.html" class="nav-link"><i class="fas fa-plus-square"></i></a>
    <a href="profile.html" class="nav-link active"><i class="fas fa-user"></i></a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA6Ce7cEDzcxOoEyh5Swl3wFx7ju-Up00k",
        authDomain: "auwalmdtech.firebaseapp.com",
        projectId: "auwalmdtech",
        storageBucket: "auwalmdtech.firebasestorage.app",
        messagingSenderId: "202329584080",
        appId: "1:202329584080:web:e989d7df53d3c3024609d5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const user = JSON.parse(localStorage.getItem('amd_user'));
    
    if(!user) {
        window.location.href = "login.html";
    } else {
        document.getElementById('profileName').innerText = user.name;
        document.getElementById('topName').innerText = user.name;
        document.getElementById('mainPfp').src = user.photo || `https://ui-avatars.com/api/?name=${user.name}&background=0084ff&color=fff`;
        
        loadUserPosts();
    }

    async function loadUserPosts() {
        const grid = document.getElementById('userPostsGrid');
        // Muna neman posts inda userId yayi daidai da lambar wayar wannan user din
        const q = query(collection(db, "posts"), where("userId", "==", user.phone), orderBy("createdAt", "desc"));
        
        try {
            const querySnapshot = await getDocs(q);
            document.getElementById('postCount').innerText = querySnapshot.size;
            grid.innerHTML = "";

            if (querySnapshot.empty) {
                grid.innerHTML = `
                    <div class="text-center w-100 mt-5 text-muted">
                        <i class="fas fa-camera fs-1 mb-2"></i>
                        <p>Baka daura komai ba tukunna.</p>
                    </div>`;
                return;
            }

            querySnapshot.forEach((doc) => {
                const post = doc.data();
                let itemHtml = "";

                if (post.type === 'image') {
                    itemHtml = `<div class="grid-item" onclick="window.location.href='dashboard.html'"><img src="${post.fileUrl}"></div>`;
                } else if (post.type === 'video') {
                    itemHtml = `<div class="grid-item" onclick="window.location.href='dashboard.html'"><i class="fas fa-play video-icon"></i><video src="${post.fileUrl}#t=0.1"></video></div>`;
                } else {
                    // Idan rubutu ne (Text Post)
                    itemHtml = `<div class="grid-item" onclick="window.location.href='dashboard.html'"><div class="text-preview text-white small">${post.caption.substring(0, 30)}...</div></div>`;
                }
                grid.innerHTML += itemHtml;
            });
        } catch (e) {
            console.error("Error loading posts: ", e);
            grid.innerHTML = "<p class='text-danger text-center w-100 p-3'>An samu matsalar dauko bayanai.</p>";
        }
    }

    window.logoutUser = function() {
        if(confirm("Shin da gaske kake son fita daga account dinka?")) {
            localStorage.removeItem('amd_user');
            window.location.href = "login.html";
        }
    }
</script>
</body>
</html>
