<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - Auwal MD Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0084ff; --bg: #020617; }
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; padding-bottom: 80px; }
        
        .profile-header { padding: 20px; background: #0f172a; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .pfp-main { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary); padding: 3px; }
        
        .stats-bar { display: flex; justify-content: center; gap: 35px; margin: 20px 0; }
        .stat-box { text-align: center; }
        .stat-num { display: block; font-size: 18px; font-weight: 700; }
        .stat-label { font-size: 12px; color: #64748b; }

        .action-btns { padding: 0 15px; display: flex; gap: 10px; }
        .btn-edit { flex: 1; background: #1e293b; color: white; border: none; padding: 10px; border-radius: 8px; font-weight: 600; }
        .btn-logout { width: 50px; background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid #ef4444; border-radius: 8px; }

        .content-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 20px; }
        .grid-item { aspect-ratio: 1/1; background: #0f172a; position: relative; overflow: hidden; }
        .grid-item img, .grid-item video { width: 100%; height: 100%; object-fit: cover; }
        
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: #0f172a; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid rgba(255,255,255,0.1); }
        .nav-item { color: #64748b; text-decoration: none; font-size: 22px; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

<div class="profile-header text-center">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <i class="fas fa-arrow-left fs-5" onclick="window.location.href='dashboard.html'"></i>
        <span class="fw-bold" id="top_user_name">Profile</span>
        <i class="fas fa-cog fs-5 text-muted"></i>
    </div>

    <img id="user_avatar" src="https://ui-avatars.com/api/?name=User" class="pfp-main">
    <h5 class="mt-3 fw-bold mb-0" id="user_full_name">Loading...</h5>
    <p class="text-muted small">Auwal MD Network User</p>

    <div class="stats-bar">
        <div class="stat-box"><span class="stat-num" id="total_posts">0</span><span class="stat-label">Posts</span></div>
        <div class="stat-box"><span class="stat-num">0</span><span class="stat-label">Followers</span></div>
        <div class="stat-box"><span class="stat-num">0</span><span class="stat-label">Following</span></div>
    </div>
</div>

<div class="action-btns">
    <button class="btn-edit" onclick="alert('Feature coming soon')">Edit Profile</button>
    <button class="btn-logout" onclick="performLogout()"><i class="fas fa-sign-out-alt"></i></button>
</div>

<div class="content-grid" id="post_display_grid">
    </div>

<div class="nav-bottom">
    <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i></a>
    <a href="chats.html" class="nav-item"><i class="fas fa-comment"></i></a>
    <a href="create-post.html" class="nav-item"><i class="fas fa-plus-square"></i></a>
    <a href="profile.html" class="nav-item active"><i class="fas fa-user"></i></a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA6Ce7cEDzcxOoEyh5Swl3wFx7ju-Up00k",
        authDomain: "auwalmdtech.firebaseapp.com",
        projectId: "auwalmdtech",
        storageBucket: "auwalmdtech.firebasestorage.app",
        messagingSenderId: "202329584080",
        appId: "1:202329584080:web:e989d7df53d3c3024609d5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const authUser = JSON.parse(localStorage.getItem('amd_user'));

    if(!authUser) {
        window.location.href = "login.html";
    } else {
        document.getElementById('user_full_name').innerText = authUser.name;
        document.getElementById('top_user_name').innerText = authUser.name;
        document.getElementById('user_avatar').src = authUser.photo || `https://ui-avatars.com/api/?name=${authUser.name}&background=0084ff&color=fff`;
        loadActualPosts();
    }

    async function loadActualPosts() {
        const grid = document.getElementById('post_display_grid');
        const postRef = collection(db, "posts");
        // Only fetch posts where userId matches the logged-in user
        const q = query(postRef, where("userId", "==", authUser.phone), orderBy("createdAt", "desc"));
        
        try {
            const snapshot = await getDocs(q);
            document.getElementById('total_posts').innerText = snapshot.size;
            grid.innerHTML = "";

            if (snapshot.empty) {
                grid.innerHTML = `<div class="text-center w-100 p-5 text-muted">No posts yet</div>`;
                return;
            }

            snapshot.forEach((doc) => {
                const data = doc.data();
                let card = "";
                if(data.type === 'video') {
                    card = `<div class="grid-item"><video src="${data.fileUrl}#t=0.1"></video></div>`;
                } else if(data.type === 'image') {
                    card = `<div class="grid-item"><img src="${data.fileUrl}"></div>`;
                } else {
                    card = `<div class="grid-item d-flex align-items-center p-2 small" style="background:#1e293b; font-size:9px;">${data.caption}</div>`;
                }
                grid.innerHTML += card;
            });
        } catch (err) {
            console.error("Error:", err);
        }
    }

    window.performLogout = function() {
        if(confirm("Logout from account?")) {
            localStorage.removeItem('amd_user');
            window.location.href = "login.html";
        }
    }
</script>
</body>
</html>
