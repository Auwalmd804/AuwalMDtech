<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Auwal MD Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0084ff; --dark-bg: #020617; --card-bg: #0f172a; }
        body { background: var(--dark-bg); color: #ffffff; font-family: 'Inter', sans-serif; padding-bottom: 80px; }
        .header-nav { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .profile-info { text-align: center; padding: 20px; }
        .pfp-container { position: relative; width: 120px; height: 120px; margin: 0 auto; }
        .profile-img { width: 100%; height: 100%; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover; }
        .camera-overlay { position: absolute; bottom: 5px; right: 5px; background: var(--primary); width: 35px; height: 35px; border-radius: 50%; border: 3px solid var(--card-bg); display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .user-stats { display: flex; justify-content: center; gap: 35px; margin: 25px 0; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; }
        .stat-box { text-align: center; }
        .stat-count { display: block; font-weight: 800; font-size: 1.2rem; color: #fff; }
        .stat-label { font-size: 0.7rem; color: #64748b; text-transform: uppercase; }
        .action-area { display: flex; gap: 10px; padding: 0 20px; margin-bottom: 25px; }
        .btn-edit-profile { flex: 1; background: var(--primary); border: none; color: white; padding: 12px; border-radius: 10px; font-weight: 600; }
        .btn-logout { width: 50px; background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; color: #ef4444; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .media-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .media-item { aspect-ratio: 1/1; background: var(--card-bg); overflow: hidden; }
        .media-item img, .media-item video { width: 100%; height: 100%; object-fit: cover; }
        .bottom-bar { position: fixed; bottom: 0; width: 100%; background: var(--card-bg); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #1e293b; z-index: 1000; }
        .bar-link { color: #64748b; font-size: 20px; text-decoration: none; }
        .bar-link.active { color: var(--primary); }
    </style>
</head>
<body>

<div class="header-nav">
    <i class="fas fa-arrow-left" onclick="location.href='dashboard.html'"></i>
    <span class="fw-bold" id="top-title">My Profile</span>
    <i class="fas fa-cog text-muted"></i>
</div>

<div class="profile-info">
    <div class="pfp-container">
        <img id="user-avatar" src="" class="profile-img">
        <label for="img-upload" class="camera-overlay"><i class="fas fa-camera text-white"></i></label>
        <input type="file" id="img-upload" hidden accept="image/*">
    </div>
    <h5 class="mt-3 fw-bold mb-0" id="display-name">---</h5>
    <p class="text-muted small" id="display-phone">@username</p>

    <div class="user-stats">
        <div class="stat-box"><span class="stat-count" id="post-total">0</span><span class="stat-label">Posts</span></div>
        <div class="stat-box"><span class="stat-count" id="follower-total">0</span><span class="stat-label">Followers</span></div>
        <div class="stat-box"><span class="stat-count" id="following-total">0</span><span class="stat-label">Following</span></div>
    </div>
</div>

<div class="action-area">
    <button class="btn-edit-profile" onclick="location.href='edit-profile.html'">Edit Profile</button>
    <button class="btn-logout" onclick="appLogout()"><i class="fas fa-sign-out-alt"></i></button>
</div>

<div class="media-grid" id="user-gallery"></div>

<div class="bottom-bar">
    <a href="dashboard.html" class="bar-link"><i class="fas fa-home"></i></a>
    <a href="chats.html" class="bar-link"><i class="fas fa-comment"></i></a>
    <a href="create-post.html" class="bar-link"><i class="fas fa-plus-square"></i></a>
    <a href="explore.html" class="bar-link"><i class="fas fa-compass"></i></a>
    <a href="profile.html" class="bar-link active"><i class="fas fa-user"></i></a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA6Ce7cEDzcxOoEyh5Swl3wFx7ju-Up00k",
        authDomain: "auwalmdtech.firebaseapp.com",
        projectId: "auwalmdtech",
        storageBucket: "auwalmdtech.firebasestorage.app",
        messagingSenderId: "202329584080",
        appId: "1:202329584080:web:e989d7df53d3c3024609d5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const authUser = JSON.parse(localStorage.getItem('amd_user'));

    if(!authUser) { window.location.href = "index.html"; }

    document.getElementById('display-name').innerText = authUser.name;
    document.getElementById('display-phone').innerText = "@" + authUser.phone;
    document.getElementById('user-avatar').src = authUser.photo || `https://ui-avatars.com/api/?name=${authUser.name}`;

    async function loadData() {
        const gallery = document.getElementById('user-gallery');
        
        // GYARA: Mun cire orderBy don hotunan su fito ko da babu timestamp
        const qPosts = query(collection(db, "posts"), where("phone", "==", authUser.phone));
        
        onSnapshot(qPosts, (snap) => {
            document.getElementById('post-total').innerText = snap.size;
            gallery.innerHTML = "";
            snap.forEach(doc => {
                const p = doc.data();
                let item = p.type === 'video' ? `<video src="${p.fileUrl}"></video>` : `<img src="${p.fileUrl}">`;
                gallery.innerHTML += `<div class="media-item">${item}</div>`;
            });
        });

        // Count Followers & Following
        onSnapshot(query(collection(db, "follows"), where("following", "==", authUser.phone)), s => {
            document.getElementById('follower-total').innerText = s.size;
        });
        onSnapshot(query(collection(db, "follows"), where("follower", "==", authUser.phone)), s => {
            document.getElementById('following-total').innerText = s.size;
        });
    }

    window.appLogout = () => {
        if(confirm("Kuna son fita?")) {
            localStorage.clear();
            window.location.href = "index.html";
        }
    }

    loadData();
</script>
</body>
</html>
