<style>
    body { background: #0a0a0a; color: white; font-family: 'Poppins', sans-serif; }
    .profile-card { background: #161616; border-radius: 30px; padding: 30px; margin-top: 50px; text-align: center; border: 1px solid #222; }
    .pfp-circle { width: 130px; height: 130px; border-radius: 50%; object-fit: cover; border: 3px solid #0084ff; background: #222; margin-bottom: 15px; }
    .btn-edit { background: #0084ff; color: white; border: none; padding: 10px 25px; border-radius: 50px; font-weight: 600; transition: 0.3s; }
    .btn-edit:hover { transform: scale(1.05); }
    .info-box { margin-top: 20px; border-top: 1px solid #222; padding-top: 20px; }
</style>

<div class="container">
    <div class="profile-card animate__animated animate__fadeInUp">
        <div class="position-relative d-inline-block">
            <img id="myBigPfp" src="https://ui-avatars.com/api/?name=User&background=0084ff&color=fff" class="pfp-circle">
            <input type="file" id="changePfp" hidden accept="image/*" onchange="updateProfilePhoto()">
        </div>
        
        <h3 id="profileName" class="fw-bold m-0">Loading...</h3>
        <p id="profilePhone" class="text-muted small"></p>
        
        <button class="btn-edit" onclick="document.getElementById('changePfp').click()">
            <i class="fas fa-camera me-2"></i> Update Photo
        </button>

        <div class="info-box d-flex justify-content-around">
            <div><b id="followerCount">0</b><br><small class="text-muted">Followers</small></div>
            <div><b id="followingCount">0</b><br><small class="text-muted">Following</small></div>
        </div>
    </div>
</div>

<script>
    // Karanto data daga wayar mutum
    const user = JSON.parse(localStorage.getItem('amd_user'));

    if(user) {
        document.getElementById('profileName').innerText = user.name;
        document.getElementById('profilePhone').innerText = "+234 " + user.phone;
        
        // Idan akwai hoto, saka shi. Idan babu, bar placeholder
        if(user.photo && user.photo !== "https://via.placeholder.com/150") {
            document.getElementById('myBigPfp').src = user.photo;
        } else {
            // Placeholder mai dauke da harafin sunan mutum
            document.getElementById('myBigPfp').src = `https://ui-avatars.com/api/?name=${user.name}&background=random&color=fff&size=128`;
        }
    } else {
        window.location.href = "index.html"; // Idan bai yi login ba
    }
</script>
