<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Professional Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0084ff; --bg: #020617; }
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; padding-bottom: 80px; }
        
        /* Header & Profile Section */
        .profile-card { padding: 30px 20px; text-align: center; background: #0f172a; border-bottom: 1px solid #1e293b; position: relative; }
        
        .pfp-wrapper { position: relative; width: 110px; height: 110px; margin: 0 auto; }
        .pfp-img { width: 100%; height: 100%; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover; }
        
        /* Wajen Chanja Hoto */
        .change-pfp-btn { position: absolute; bottom: 5px; right: 5px; background: var(--primary); color: white; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border: 3px solid #0f172a; cursor: pointer; }

        .stats-bar { display: flex; justify-content: center; gap: 30px; margin: 25px 0; }
        .stat-item { text-align: center; }
        .stat-num { display: block; font-weight: bold; font-size: 1.2rem; }
        .stat-label { font-size: 0.8rem; color: #64748b; }

        /* Buttons */
        .btn-group-custom { display: flex; gap: 10px; padding: 0 20px; }
        .btn-edit { flex: 1; background: #1e293b; border: none; color: white; padding: 12px; border-radius: 10px; font-weight: 600; }
        .btn-logout { width: 55px; background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid #ef4444; border-radius: 10px; }

        /* Post Grid */
        .post-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 20px; }
        .grid-item { aspect-ratio: 1/1; background: #0f172a; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 0.5px solid #1e293b; }
        .grid-item img, .grid-item video { width: 100%; height: 100%; object-fit: cover; }

        /* Navigation */
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: #0f172a; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #1e293b; }
        .nav-link { color: #64748b; font-size: 22px; text-decoration: none; }
        .nav-link.active { color: var(--primary); }
    </style>
</head>
<body>

<div class="profile-card">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <i class="fas fa-arrow-left fs-5" onclick="location.href='dashboard.html'"></i>
        <span class="fw-bold" id="top_username">Profile</span>
        <i class="fas fa-cog text-muted"></i>
    </div>

    <div class="pfp-wrapper">
        <img id="display_image" src="https://ui-avatars.com/api/?name=User" class="pfp-img">
        <label for="pfp-input" class="change-pfp-btn">
            <i class="fas fa-camera"></i>
        </label>
        <input type="file" id="pfp-input" style="display: none;" accept="image/*">
    </div>

    <h5 class="mt-3 fw-bold mb-0" id="full_name">Loading...</h5>
    <p class="text-muted small">Auwal MD Network User</p>

    <div class="stats-bar">
        <div class="stat-item"><span class="stat-num" id="post_count">0</span><span class="stat-label">Posts</span></div>
        <div class="stat-item"><span class="stat-num">0</span><span class="stat-label">Followers</span></div>
        <div class="stat-item"><span class="stat-num">0</span><span class="stat-label">Following</span></div>
    </div>
</div>

<div class="btn-group-custom">
    <button class="btn-edit" onclick="alert('Profile Settings coming soon!')">Edit Profile</button>
    <button class="btn-logout" onclick="processLogout()"><i class="fas fa-sign-out-alt"></i></button>
</div>

<div class="post-grid" id="profile_feed">
    </div>

<div class="nav-bottom">
    <a href="dashboard.html" class="nav-link"><i class="fas fa-home"></i></a>
    <a href="chats.html" class="nav-link"><i class="fas fa-comment"></i></a>
    <a href="create-post.html" class="nav-link"><i class="fas fa-plus-square"></i></a>
    <a href="profile.html" class="nav-link active"><i class="fas fa-user"></i></a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA6Ce7cEDzcxOoEyh5Swl3wFx7ju-Up00k",
        authDomain: "auwalmdtech.firebaseapp.com",
        projectId: "auwalmdtech",
        storageBucket: "auwalmdtech.firebasestorage.app",
        messagingSenderId: "202329584080",
        appId: "1:202329584080:web:e989d7df53d3c3024609d5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const currentUser = JSON.parse(localStorage.getItem('amd_user'));

    if(!currentUser) {
        window.location.href = "login.html";
    } else {
        document.getElementById('full_name').innerText = currentUser.name;
        document.getElementById('top_username').innerText = currentUser.name;
        document.getElementById('display_image').src = currentUser.photo || `https://ui-avatars.com/api/?name=${currentUser.name}&background=0084ff&color=fff`;
        loadUserMedia();
    }

    // Function na dauko hotuna da bidiyo na gaske
    async function loadUserMedia() {
        const grid = document.getElementById('profile_feed');
        // Muna duba "userId" ko "phone" don gano posts dinka
        const q = query(collection(db, "posts"), where("userId", "==", currentUser.phone), orderBy("createdAt", "desc"));
        
        try {
            const snapshot = await getDocs(q);
            document.getElementById('post_count').innerText = snapshot.size;
            grid.innerHTML = "";

            if (snapshot.empty) {
                grid.innerHTML = `<div class="text-center w-100 p-5 text-muted">No media posts found.</div>`;
                return;
            }

            snapshot.forEach((doc) => {
                const post = doc.data();
                let html = "";
                if(post.type === 'video') {
                    html = `<div class="grid-item"><video src="${post.fileUrl}#t=0.1"></video></div>`;
                } else if(post.type === 'image') {
                    html = `<div class="grid-item"><img src="${post.fileUrl}"></div>`;
                } else {
                    html = `<div class="grid-item p-2 small text-center" style="font-size:10px">${post.text || post.caption}</div>`;
                }
                grid.innerHTML += html;
            });
        } catch (err) { console.error(err); }
    }

    // Logout Function
    window.processLogout = function() {
        if(confirm("Logout from Auwal MD Chat?")) {
            localStorage.clear();
            window.location.href = "index.html";
        }
    }

    // Placeholder for PFP update (Zaka iya hada shi da Firebase Storage)
    document.getElementById('pfp-input').onchange = (e) => {
        alert("Uploading image feature requires Firebase Storage. We will set it up next!");
    };
</script>
</body>
</html>
