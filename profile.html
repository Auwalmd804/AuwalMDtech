<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Auwal MD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0084ff; --bg: #020617; }
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; padding-bottom: 80px; margin: 0; }
        .p-header { padding: 30px 20px; text-align: center; background: #0f172a; border-bottom: 1px solid #1e293b; }
        .pfp-circle { width: 95px; height: 95px; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover; }
        .stats-row { display: flex; justify-content: center; gap: 30px; margin: 20px 0; }
        .stat-n { display: block; font-weight: bold; font-size: 1.1rem; }
        .stat-l { font-size: 0.75rem; color: #64748b; text-transform: uppercase; }
        .post-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; }
        .grid-box { aspect-ratio: 1/1; background: #0f172a; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 0.5px solid #1e293b; }
        .grid-box img, .grid-box video { width: 100%; height: 100%; object-fit: cover; }
        .nav-b { position: fixed; bottom: 0; width: 100%; background: #0f172a; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #1e293b; }
        .nav-b a { color: #64748b; font-size: 1.4rem; }
        .active-icon { color: var(--primary) !important; }
    </style>
</head>
<body>

<div class="p-header">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <i class="fas fa-chevron-left" onclick="location.href='dashboard.html'"></i>
        <span class="fw-bold" id="top_name">Profile</span>
        <i class="fas fa-cog"></i>
    </div>
    
    <img id="u_pfp" src="https://ui-avatars.com/api/?name=User" class="pfp-circle">
    <h5 class="mt-3 fw-bold mb-1" id="u_name">Loading...</h5>
    <p class="text-muted small">Auwal MD Network User</p>

    <div class="stats-row">
        <div class="text-center"><span class="stat-n" id="p_count">0</span><span class="stat-l">Posts</span></div>
        <div class="text-center"><span class="stat-n">0</span><span class="stat-l">Followers</span></div>
        <div class="text-center"><span class="stat-n">0</span><span class="stat-l">Following</span></div>
    </div>
</div>

<div class="post-grid" id="u_grid">
    </div>

<div class="nav-b">
    <a href="dashboard.html"><i class="fas fa-home"></i></a>
    <a href="chats.html"><i class="fas fa-comment"></i></a>
    <a href="create-post.html"><i class="fas fa-plus-square"></i></a>
    <a href="profile.html" class="active-icon"><i class="fas fa-user"></i></a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA6Ce7cEDzcxOoEyh5Swl3wFx7ju-Up00k",
        authDomain: "auwalmdtech.firebaseapp.com",
        projectId: "auwalmdtech",
        storageBucket: "auwalmdtech.firebasestorage.app",
        messagingSenderId: "202329584080",
        appId: "1:202329584080:web:e989d7df53d3c3024609d5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const auth = JSON.parse(localStorage.getItem('amd_user'));

    if(!auth) {
        window.location.href = "index.html";
    } else {
        document.getElementById('u_name').innerText = auth.name;
        document.getElementById('top_name').innerText = auth.name;
        document.getElementById('u_pfp').src = auth.photo || `https://ui-avatars.com/api/?name=${auth.name}&background=0084ff&color=fff`;
        getMyContent();
    }

    async function getMyContent() {
        const grid = document.getElementById('u_grid');
        // Neman posts ta amfani da userId (Lambar waya)
        const q = query(collection(db, "posts"), where("userId", "==", auth.phone), orderBy("createdAt", "desc"));
        
        try {
            const snap = await getDocs(q);
            document.getElementById('p_count').innerText = snap.size;
            grid.innerHTML = "";

            if(snap.empty) {
                grid.innerHTML = "<div class='text-center w-100 p-5 text-muted'>No posts yet.</div>";
                return;
            }

            snap.forEach(doc => {
                const data = doc.data();
                let item = "";
                if(data.type === 'image') item = `<img src="${data.fileUrl}">`;
                else if(data.type === 'video') item = `<video src="${data.fileUrl}#t=0.5"></video>`;
                else item = `<div class="p-2 text-center small" style="font-size:10px">${data.caption}</div>`;
                
                grid.innerHTML += `<div class="grid-box">${item}</div>`;
            });
        } catch(e) { console.error(e); }
    }
</script>
</body>
</html>
