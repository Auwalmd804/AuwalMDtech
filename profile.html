<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Auwal MD Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            background: linear-gradient(180deg, #0f172a 0%, #000000 100%); 
            color: white; font-family: 'Poppins', sans-serif; 
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .profile-card { 
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px);
            border-radius: 35px; padding: 40px 25px; width: 90%; max-width: 380px;
            text-align: center; border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.7);
        }
        .pfp-container { position: relative; width: 140px; height: 140px; margin: 0 auto 20px; }
        .pfp-circle { 
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover; 
            border: 4px solid #0084ff; box-shadow: 0 0 25px rgba(0, 132, 255, 0.5);
            background: #1e293b;
        }
        #profileName { font-size: 24px; font-weight: 700; color: #fff; margin-bottom: 5px; }
        #profilePhone { font-size: 15px; color: #00c6ff; font-weight: 500; margin-bottom: 25px; display: block; }
        .btn-update { 
            background: linear-gradient(90deg, #0084ff, #00c6ff); color: white; border: none; 
            padding: 12px; border-radius: 15px; font-weight: 600; width: 100%; transition: 0.3s;
        }
        .stats-box { 
            display: flex; justify-content: space-around; margin-top: 30px; padding: 20px 0; 
            border-top: 1px solid rgba(255,255,255,0.1); border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .stat-item b { font-size: 20px; display: block; color: #fff; }
        .stat-item small { color: #94a3b8; font-size: 11px; text-transform: uppercase; }
        .btn-logout {
            background: transparent; color: #ff4b5c; border: 1px solid #ff4b5c;
            padding: 10px; border-radius: 15px; font-weight: 600; width: 100%; margin-top: 30px;
            transition: 0.3s;
        }
        .btn-logout:hover { background: #ff4b5c; color: white; }
        .back-nav { position: absolute; top: 30px; left: 30px; color: white; cursor: pointer; }
    </style>
</head>
<body>

<i class="fas fa-arrow-left back-nav fs-3" onclick="history.back()"></i>

<div class="profile-card">
    <div class="pfp-container">
        <img id="myBigPfp" src="" class="pfp-circle">
        <input type="file" id="changePfp" hidden accept="image/*" onchange="uploadToCloudinary()">
    </div>
    
    <h3 id="profileName">Loading...</h3>
    <span id="profilePhone"></span>
    
    <button id="upBtn" class="btn-update mb-2" onclick="document.getElementById('changePfp').click()">
        <i class="fas fa-camera me-2"></i> UPDATE PROFILE PHOTO
    </button>

    <div class="stats-box">
        <div class="stat-item"><b id="followerCount">0</b><small>Followers</small></div>
        <div class="stat-item"><b id="followingCount">0</b><small>Following</small></div>
    </div>

    <button class="btn-logout" onclick="logoutUser()">
        <i class="fas fa-power-off me-2"></i> LOGOUT ACCOUNT
    </button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA6Ce7cEDzcxOoEyh5Swl3wFx7ju-Up00k",
        authDomain: "auwalmdtech.firebaseapp.com",
        projectId: "auwalmdtech",
        storageBucket: "auwalmdtech.firebasestorage.app",
        messagingSenderId: "202329584080",
        appId: "1:202329584080:web:e989d7df53d3c3024609d5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const user = JSON.parse(localStorage.getItem('amd_user'));
    
    if(user) {
        document.getElementById('profileName').innerText = user.name;
        document.getElementById('profilePhone').innerText = "+234 " + user.phone;
        document.getElementById('myBigPfp').src = user.photo || `https://ui-avatars.com/api/?name=${user.name}&background=0084ff&color=fff&size=128&bold=true`;
    } else {
        window.location.href = "index.html";
    }

    // Cloudinary Upload Logic
    window.uploadToCloudinary = async function() {
        const file = document.getElementById('changePfp').files[0];
        const btn = document.getElementById('upBtn');
        if(!file) return;

        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Uploading...';
        btn.disabled = true;

        try {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', 'ml_default'); 

            const res = await fetch(`https://api.cloudinary.com/v1_1/dpxn8b7ao/image/upload`, {
                method: 'POST',
                body: formData
            });

            if(!res.ok) throw new Error("Upload failed. Check Cloudinary settings.");

            const data = await res.json();
            const newUrl = data.secure_url;

            // Update Firebase
            const userRef = doc(db, "users", user.phone);
            await updateDoc(userRef, { photo: newUrl });

            // Update LocalStorage
            user.photo = newUrl;
            localStorage.setItem('amd_user', JSON.stringify(user));

            document.getElementById('myBigPfp').src = newUrl;
            alert("Success! Profile photo updated.");

        } catch (e) {
            alert("Error: " + e.message);
        } finally {
            btn.innerHTML = '<i class="fas fa-camera me-2"></i> UPDATE PROFILE PHOTO';
            btn.disabled = false;
        }
    }

    window.logoutUser = function() {
        if(confirm("Log out from Auwal MD Chat?")) {
            localStorage.clear();
            window.location.href = "index.html";
        }
    }
</script>
</body>
</html>
