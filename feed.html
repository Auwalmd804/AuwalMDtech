<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auwal MD Tech - Feed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; padding-bottom: 70px; }
        .header-feed { background: white; padding: 15px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #ddd; }
        
        /* Story Style */
        .story-container { display: flex; overflow-x: auto; padding: 10px; background: white; gap: 10px; }
        .story-circle { min-width: 70px; height: 70px; border-radius: 50%; border: 3px solid #0d6efd; padding: 2px; }
        .story-circle img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        /* Post Box */
        .post-box { background: white; border-radius: 15px; padding: 15px; margin: 15px 0; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .post-input { border: none; background: #f0f2f5; border-radius: 20px; padding: 10px 20px; width: 100%; outline: none; }
        
        /* Feed Post */
        .feed-card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; }
        .feed-header img { width: 40px; height: 40px; border-radius: 50%; }
        
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #ddd; display: flex; justify-content: space-around; padding: 12px 0; }
    </style>
</head>
<body>

<div class="header-feed d-flex justify-content-between align-items-center shadow-sm">
    <h4 class="fw-bold text-primary mb-0">Auwal MD Tech</h4>
    <i class="fas fa-bell fs-5"></i>
</div>

<div class="story-container shadow-sm">
    <div class="text-center">
        <div class="story-circle"><img src="Image_1.png"></div>
        <small>You</small>
    </div>
    </div>

<div class="container">
    <div class="post-box shadow-sm">
        <div class="d-flex align-items-center mb-3">
            <img src="Image_1.png" style="width:40px; border-radius:50%; margin-right:10px;">
            <input type="text" id="postText" class="post-input" placeholder="What's on your mind, Auwal?">
        </div>
        <button onclick="uploadPost()" class="btn btn-primary w-100 rounded-pill fw-bold">POST</button>
    </div>

    <div id="feedList">
        </div>
</div>

<div class="nav-bottom">
    <a href="dashboard.html" class="text-muted"><i class="fas fa-home fs-4"></i></a>
    <a href="feed.html" class="text-primary"><i class="fas fa-users fs-4"></i></a>
    <a href="chat.html" class="text-muted"><i class="fas fa-comment-dots fs-4"></i></a>
    <a href="history.html" class="text-muted"><i class="fas fa-history fs-4"></i></a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Saka config dinka anan
    const firebaseConfig = {
        apiKey: "AIzaSyA6Ce7cEDzcxOoEyh5Swl3wFx7ju-Up00k",
        authDomain: "auwalmdtech.firebaseapp.com",
        projectId: "auwalmdtech",
        storageBucket: "auwalmdtech.firebasestorage.app",
        messagingSenderId: "202329584080",
        appId: "1:202329584080:web:e989d7df53d3c3024609d5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Function na yin Post
    window.uploadPost = async function() {
        const txt = document.getElementById('postText').value;
        if(txt.trim() === "") return;

        try {
            await addDoc(collection(db, "posts"), {
                text: txt,
                user: "Auwal MD", // Nan zamu gyara ya zama sunan wanda yayi login
                timestamp: serverTimestamp()
            });
            document.getElementById('postText').value = "";
        } catch (e) { alert("Error: " + e.message); }
    }

    // Karanto Postings daga Database
    const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
    onSnapshot(q, (snapshot) => {
        const feedList = document.getElementById('feedList');
        feedList.innerHTML = "";
        snapshot.forEach((doc) => {
            const data = doc.data();
            feedList.innerHTML += `
                <div class="feed-card shadow-sm animate__animated animate__fadeIn">
                    <div class="feed-header d-flex align-items-center mb-2">
                        <img src="https://via.placeholder.com/40" class="me-2">
                        <div>
                            <div class="fw-bold small">${data.user}</div>
                            <small class="text-muted" style="font-size:10px;">Just now</small>
                        </div>
                    </div>
                    <div class="feed-body">
                        <p class="mb-0">${data.text}</p>
                    </div>
                </div>
            `;
        });
    });
</script>

</body>
</html>
