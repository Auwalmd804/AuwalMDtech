<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA6Ce7cEDzcxOoEyh5Swl3wFx7ju-Up00k",
        authDomain: "auwalmdtech.firebaseapp.com",
        projectId: "auwalmdtech",
        storageBucket: "auwalmdtech.firebasestorage.app",
        messagingSenderId: "202329584080",
        appId: "1:202329584080:web:e989d7df53d3c3024609d5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // WANNAN SHI NE MAI TURA HOTO ZUWA IMGBB
    async function uploadToImgBB(file) {
        const formData = new FormData();
        formData.append("image", file);
        
        // SAKA API KEY DIN KA A NAN
        const apiKey = "SAKA_API_KEY_DIN_KA_ANAN"; 
        
        const response = await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`, {
            method: "POST",
            body: formData
        });
        const data = await response.json();
        return data.data.url; // Wannan zai ba mu link din hoton
    }

    window.handleUpload = async function() {
        const btn = document.getElementById('postBtn');
        const file = document.getElementById('fileInp').files[0];
        const text = document.getElementById('postText').value;
        let mediaUrl = "";

        if(!text && !file) return;

        btn.disabled = true;
        btn.innerText = "Processing...";

        try {
            if(file) {
                // Tura hoto zuwa ImgBB
                mediaUrl = await uploadToImgBB(file);
            }

            // Ajiye komai a Firebase Firestore
            await addDoc(collection(db, "posts"), {
                text: text,
                media: mediaUrl,
                user: localStorage.getItem('amd_name') || "User",
                uPhoto: localStorage.getItem('amd_photo') || "",
                timestamp: serverTimestamp()
            });

            location.reload();
        } catch (e) {
            alert("Error: " + e.message);
            btn.disabled = false;
            btn.innerText = "POST TO FEED";
        }
    }
    
    // Code na Karanto Postings (onSnapshot) yana nan kamar na baya...
</script>
