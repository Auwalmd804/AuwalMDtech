<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auwal MD Pay - Join the Future</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary: #1e3c72; --gold: #ffd700; }
        body { background: #f8f9fa; font-family: 'Poppins', sans-serif; }
        .auth-card { border-radius: 25px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn-main { background: var(--primary); color: white; border-radius: 12px; padding: 12px; font-weight: bold; }
        .logo { font-size: 28px; font-weight: 800; color: var(--primary); }
    </style>
</head>
<body class="d-flex align-items-center min-vh-100">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card auth-card p-4">
                <div class="text-center mb-4">
                    <div class="logo">AMDPAY<span style="color:var(--gold)">.</span></div>
                    <p class="text-muted small">Your Secure Digital Wallet</p>
                </div>

                <div id="authForm">
                    <div class="mb-3">
                        <label class="small fw-bold">Full Name</label>
                        <input type="text" id="regName" class="form-control" placeholder="John Doe">
                    </div>
                    <div class="mb-3">
                        <label class="small fw-bold">Phone Number</label>
                        <input type="number" id="regPhone" class="form-control" placeholder="090...">
                    </div>
                    <div class="mb-3">
                        <label class="small fw-bold">Create 4-Digit PIN</label>
                        <input type="password" maxlength="4" id="regPin" class="form-control" placeholder="****">
                        <small class="text-danger" style="font-size: 10px;">Don't share your PIN with anyone!</small>
                    </div>
                    <button class="btn btn-main w-100 mt-2" onclick="registerUser()">Create Account</button>
                </div>
                
                <p class="text-center mt-3 small">Already have an account? <a href="#" onclick="toggleMode()">Login</a></p>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Saka Firebase Config dinka anan
    const firebaseConfig = {
        apiKey: "AIzaSyA6Ce7cEDzcxOoEyh5Swl3wFx7ju-Up00k",
        authDomain: "auwalmdtech.firebaseapp.com",
        projectId: "auwalmdtech",
        storageBucket: "auwalmdtech.firebasestorage.app",
        messagingSenderId: "202329584080",
        appId: "1:202329584080:web:e989d7df53d3c3024609d5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.registerUser = async () => {
        const name = document.getElementById('regName').value;
        const phone = document.getElementById('regPhone').value;
        const pin = document.getElementById('regPin').value;

        if(!name || !phone || pin.length < 4) return alert("Please fill all correctly");

        const userRef = doc(db, "users", phone);
        const check = await getDoc(userRef);

        if(check.exists()) return alert("User already exists!");

        await setDoc(userRef, {
            name: name,
            phone: phone,
            pin: pin,
            balance: 0,
            referrals: 0,
            createdAt: new Date()
        });

        localStorage.setItem('amd_user', JSON.stringify({name, phone}));
        window.location.href = "dashboard.html";
    }
</script>
</body>
</html>
