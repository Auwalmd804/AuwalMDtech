<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - Auwal MD Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0084ff; --bg: #020617; --card: #0f172a; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; padding-bottom: 80px; }
        
        .chat-header { background: var(--card); padding: 20px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #1e293b; }
        .user-item { background: var(--card); padding: 15px; border-bottom: 1px solid #1e293b; display: flex; align-items: center; cursor: pointer; transition: 0.3s; }
        .user-item:hover { background: #1e293b; }
        .user-pfp { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); }
        .user-details { margin-left: 15px; flex: 1; }
        .user-name { font-weight: 700; margin: 0; font-size: 1rem; }
        .last-msg { font-size: 0.85rem; color: #64748b; margin: 0; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #1e293b; }
        .nav-link { color: #64748b; font-size: 22px; text-decoration: none; }
        .nav-link.active { color: var(--primary); }
    </style>
</head>
<body>

<div class="chat-header">
    <h5 class="fw-bold m-0">Messages</h5>
</div>

<div id="users-list">
    </div>

<div class="bottom-nav">
    <a href="dashboard.html" class="nav-link"><i class="fas fa-home"></i></a>
    <a href="chats.html" class="nav-link active"><i class="fas fa-comment"></i></a>
    <a href="create-post.html" class="nav-link"><i class="fas fa-plus-square"></i></a>
    <a href="explore.html" class="nav-link"><i class="fas fa-compass"></i></a>
    <a href="profile.html" class="nav-link"><i class="fas fa-user"></i></a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA6Ce7cEDzcxOoEyh5Swl3wFx7ju-Up00k",
        authDomain: "auwalmdtech.firebaseapp.com",
        projectId: "auwalmdtech",
        storageBucket: "auwalmdtech.firebasestorage.app",
        messagingSenderId: "202329584080",
        appId: "1:202329584080:web:e989d7df53d3c3024609d5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const currentUser = JSON.parse(localStorage.getItem('amd_user'));

    async function loadUsers() {
        const listArea = document.getElementById('users-list');
        // Nemo duka sauran users banda kai kanka
        const q = query(collection(db, "users"), where("phone", "!=", currentUser.phone));
        const snap = await getDocs(q);
        
        listArea.innerHTML = "";
        snap.forEach(doc => {
            const u = doc.data();
            const pfp = u.photo || `https://ui-avatars.com/api/?name=${u.name}`;
            listArea.innerHTML += `
                <div class="user-item" onclick="openChat('${u.phone}', '${u.name}')">
                    <img src="${pfp}" class="user-pfp">
                    <div class="user-details">
                        <p class="user-name">${u.name}</p>
                        <p class="last-msg">Click to start conversation...</p>
                    </div>
                </div>
            `;
        });
    }

    window.openChat = (phone, name) => {
        sessionStorage.setItem('chat_target_phone', phone);
        sessionStorage.setItem('chat_target_name', name);
        window.location.href = "messaging.html";
    };

    loadUsers();
</script>
</body>
</html>
