<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - Auwal MD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #050505; color: white; font-family: 'Poppins', sans-serif; height: 100vh; display: flex; flex-direction: column; }
        .chat-header { background: #111; padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #222; }
        .chat-pfp { width: 40px; height: 40px; border-radius: 50%; margin-right: 12px; object-fit: cover; }
        
        #chatBox { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        
        /* Bubble Styles */
        .msg { max-width: 75%; padding: 10px 15px; border-radius: 18px; margin-bottom: 10px; font-size: 14px; position: relative; }
        .sent { align-self: flex-end; background: #0084ff; color: white; border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: #1f1f1f; color: #eee; border-bottom-left-radius: 2px; }
        
        .msg-info { font-size: 9px; opacity: 0.7; margin-top: 5px; display: block; text-align: right; }

        .input-area { background: #111; padding: 15px; display: flex; align-items: center; gap: 10px; }
        .input-area input { background: #222; border: none; color: white; border-radius: 25px; padding: 10px 20px; flex: 1; }
        .send-btn { background: #0084ff; border: none; width: 45px; height: 45px; border-radius: 50%; color: white; }
    </style>
</head>
<body>

<div class="chat-header">
    <i class="fas fa-arrow-left me-3" onclick="history.back()"></i>
    <img id="peerPfp" src="https://via.placeholder.com/40" class="chat-pfp">
    <div>
        <h6 id="peerName" class="m-0 fw-bold">Select User</h6>
        <small class="text-success" style="font-size: 10px;">Online</small>
    </div>
</div>

<div id="chatBox">
    </div>

<div class="input-area">
    <button class="btn text-white"><i class="fas fa-plus"></i></button>
    <input type="text" id="msgInp" placeholder="Type a message...">
    <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA6Ce7cEDzcxOoEyh5Swl3wFx7ju-Up00k",
        authDomain: "auwalmdtech.firebaseapp.com",
        projectId: "auwalmdtech",
        storageBucket: "auwalmdtech.firebasestorage.app",
        messagingSenderId: "202329584080",
        appId: "1:202329584080:web:e989d7df53d3c3024609d5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const me = JSON.parse(localStorage.getItem('amd_user'));
    // Za mu dauko 'peer' (wanda kake son yiwa magana) daga URL
    const urlParams = new URLSearchParams(window.location.search);
    const peerPhone = urlParams.get('to'); 
    const peerName = urlParams.get('name');
    const peerPhoto = urlParams.get('img');

    if(peerPhone) {
        document.getElementById('peerName').innerText = peerName;
        document.getElementById('peerPfp').src = peerPhoto;
    }

    // Load Messages
    const chatID = [me.phone, peerPhone].sort().join('_'); // Unique ID na hira tsakanin mutum biyu
    const q = query(collection(db, "chats"), where("chatID", "==", chatID), orderBy("timestamp", "asc"));

    onSnapshot(q, (snap) => {
        const box = document.getElementById('chatBox');
        box.innerHTML = "";
        snap.forEach(doc => {
            const data = doc.data();
            const isMe = data.sender === me.phone;
            box.innerHTML += `
                <div class="msg ${isMe ? 'sent' : 'received'}">
                    ${data.text}
                    <span class="msg-info">${new Date(data.timestamp?.toDate()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                </div>
            `;
        });
        box.scrollTop = box.scrollHeight;
    });

    window.sendMessage = async function() {
        const txt = document.getElementById('msgInp').value;
        if(!txt.trim()) return;

        await addDoc(collection(db, "chats"), {
            chatID: chatID,
            sender: me.phone,
            receiver: peerPhone,
            text: txt,
            timestamp: serverTimestamp()
        });
        document.getElementById('msgInp').value = "";
    }
</script>
</body>
</html>
