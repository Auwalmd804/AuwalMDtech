<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - Auwal MD Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            background: #020617; 
            color: white; 
            font-family: 'Poppins', sans-serif; 
            height: 100vh; 
            display: flex; 
            flex-direction: column;
        }

        /* Chat Header */
        .chat-header {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chat-header img {
            width: 40px; height: 40px; border-radius: 50%; border: 2px solid #0084ff;
        }

        /* Message Area */
        #chatBox {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Message Bubbles */
        .msg {
            max-width: 75%;
            padding: 12px 16px;
            font-size: 14px;
            position: relative;
            line-height: 1.5;
        }

        /* Sakonka (Dama) */
        .msg.me {
            align-self: flex-end;
            background: linear-gradient(135deg, #0084ff, #00c6ff);
            color: white;
            border-radius: 20px 20px 0 20px;
            box-shadow: 0 4px 15px rgba(0, 132, 255, 0.3);
        }

        /* Sakon Abokinka (Hagu) */
        .msg.them {
            align-self: flex-start;
            background: #1e293b;
            color: #e2e8f0;
            border-radius: 20px 20px 20px 0;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .msg-time {
            font-size: 9px;
            display: block;
            margin-top: 5px;
            opacity: 0.7;
            text-align: right;
        }

        /* Input Area */
        .chat-input-area {
            background: #0f172a;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chat-input-area input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 10px 20px;
            color: white;
            outline: none;
        }

        .btn-send {
            background: #0084ff;
            color: white;
            border: none;
            width: 45px; height: 45px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
        }
        .btn-send:active { transform: scale(0.9); }
    </style>
</head>
<body>

<div class="chat-header">
    <i class="fas fa-arrow-left me-3 fs-5" onclick="history.back()"></i>
    <img id="friendPfp" src="https://via.placeholder.com/150">
    <div class="ms-3">
        <h6 class="m-0 fw-bold" id="friendName">Loading...</h6>
        <small class="text-success" style="font-size: 10px;">Online</small>
    </div>
</div>


<div id="chatBox">
    </div>

<div class="chat-input-area">
    <button class="btn text-muted"><i class="fas fa-plus"></i></button>
    <input type="text" id="msgInput" placeholder="Type a message...">
    <button class="btn-send" onclick="sendMessage()">
        <i class="fas fa-paper-plane"></i>
    </button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA6Ce7cEDzcxOoEyh5Swl3wFx7ju-Up00k",
        authDomain: "auwalmdtech.firebaseapp.com",
        projectId: "auwalmdtech",
        storageBucket: "auwalmdtech.firebasestorage.app",
        messagingSenderId: "202329584080",
        appId: "1:202329584080:web:e989d7df53d3c3024609d5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Get current user and friend from URL or Storage
    const user = JSON.parse(localStorage.getItem('amd_user'));
    const urlParams = new URLSearchParams(window.location.search);
    const friendPhone = urlParams.get('phone'); // Lamba abokin da za'a yi hira da shi
    const friendName = urlParams.get('name');

    document.getElementById('friendName').innerText = friendName || "Chat User";

    // Create Chat ID (misali: 080..._090...)
    const chatId = [user.phone, friendPhone].sort().join('_');

    // Load Messages
    const q = query(collection(db, "chats", chatId, "messages"), orderBy("timestamp", "asc"));
    onSnapshot(q, (snap) => {
        const chatBox = document.getElementById('chatBox');
        chatBox.innerHTML = "";
        snap.forEach(doc => {
            const data = doc.data();
            const isMe = data.sender === user.phone;
            
            const msgHtml = `
                <div class="msg ${isMe ? 'me' : 'them'} animate__animated animate__fadeInUp">
                    ${data.text}
                    <span class="msg-time">${new Date(data.timestamp?.toDate()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                </div>
            `;
            chatBox.innerHTML += msgHtml;
        });
        chatBox.scrollTop = chatBox.scrollHeight; // Auto scroll to bottom
    });

    // Send Message
    window.sendMessage = async function() {
        const text = document.getElementById('msgInput').value;
        if(!text.trim()) return;

        document.getElementById('msgInput').value = "";

        await addDoc(collection(db, "chats", chatId, "messages"), {
            text: text,
            sender: user.phone,
            timestamp: serverTimestamp()
        });
    }
</script>

</body>
</html>
