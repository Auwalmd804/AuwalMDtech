<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - IM SMART</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #2f3542; color: white; }
        .admin-card { background: #3f4452; border: none; color: white; margin-bottom: 15px; }
    </style>
</head>
<body class="p-4">
    <h3 class="fw-bold mb-4 text-warning">Barka da Zuwa Admin (Auwal)</h3>
    
    <div class="row">
        <div class="col-6 mb-3">
            <div class="card admin-card p-3">
                <small>Duk Mutanenka</small>
                <h4 class="fw-bold text-info">128</h4>
            </div>
        </div>
        <div class="col-6 mb-3">
            <div class="card admin-card p-3">
                <small>Riba (Today)</small>
                <h4 class="fw-bold text-success">₦4,200</h4>
            </div>
        </div>
    </div>

    <div class="card admin-card p-3 mt-3">
        <h6 class="fw-bold mb-3 border-bottom pb-2 text-warning">Saita Farashin NIN Slips</h6>
        <div class="mb-3">
            <label class="small">Standard Slip (₦)</label>
            <input type="number" class="form-control bg-dark text-white border-secondary" value="180">
        </div>
        <div class="mb-3">
            <label class="small">Premium Slip (₦)</label>
            <input type="number" class="form-control bg-dark text-white border-secondary" value="200">
        </div>
        <button class="btn btn-warning w-100 fw-bold">Update Prices</button>
    </div>

    <a href="dashboard.html" class="btn btn-outline-light btn-sm mt-5">Koma Dashboard</a>
</body>
</html>
