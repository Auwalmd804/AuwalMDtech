<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <title>Admin - Auwal MD Tech</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #1a1a1a; color: white; padding: 30px; }
        .card { background: #2d2d2d; border: none; color: white; border-radius: 15px; }
    </style>
</head>
<body>
    <div id="admin-login" class="text-center">
        <h4>Admin Security</h4>
        <input type="password" id="pass" class="form-control mb-2" placeholder="Saka Password">
        <button onclick="login()" class="btn btn-primary">Login</button>
    </div>

    <div id="admin-panel" style="display:none;" class="container">
        <h3 class="fw-bold text-warning">AUWAL MD TECH - Ikon Website</h3>
        <div class="card p-4 mt-4 shadow">
            <h5>Saka Wa Customer Kudi (Credit User)</h5>
            <p class="small text-muted">Wannan zai canza balance din customer a wayarsa.</p>
            <input type="number" id="new-bal" class="form-control mb-3" placeholder="Saka Adadin Kudi (misali 2000)">
            <button onclick="updateBalance()" class="btn btn-success w-100 fw-bold">UPDATE BALANCE</button>
        </div>
    </div>

    <script>
        function login() {
            if(document.getElementById('pass').value === "Auwal@00") {
                document.getElementById('admin-login').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
            } else { alert("Password ba daidai ba!"); }
        }
        function updateBalance() {
            let amount = document.getElementById('new-bal').value;
            localStorage.setItem('userBalance', amount);
            alert("An saka wa customer kudi: ₦" + amount);
        }
    </script>
</body>
</html>
