<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RetayaX Master Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .sidebar { background: #0f2027; color: white; height: 100vh; padding: 20px; }
        .section { display: none; padding: 20px; }
        .active { display: block; }
    </style>
</head>
<body>

<div class="d-flex">
    <div class="sidebar col-md-3">
        <h4>RetayaX Admin</h4>
        <button class="btn btn-outline-light w-100 mb-2" onclick="show('upload')">Add Product</button>
        <button class="btn btn-outline-light w-100 mb-2" onclick="show('products')">Manage Inventory</button>
        <button class="btn btn-outline-light w-100 mb-2" onclick="show('users')">Manage Users</button>
    </div>

    <div class="col-md-9 p-4">
        <div id="upload" class="section active">
            <input type="text" id="pName" class="form-control mb-2" placeholder="Product Name">
            <input type="number" id="pPrice" class="form-control mb-2" placeholder="Price">
            <input type="file" id="imageInput" class="form-control mb-2">
            <button onclick="uploadProduct()" class="btn btn-primary">Upload</button>
        </div>

        <div id="products" class="section">
            <div id="productList"></div>
        </div>

        <div id="users" class="section">
            <div id="userList"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { /* SAKA CONFIG DIN KA ANAN */ };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 1. Password check
    if(prompt("Enter Admin Password:") !== "Auwal@00") window.location.href = "dashboard.html";

    // 2. Navigation
    window.show = (id) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // 3. Upload Product
    window.uploadProduct = async () => {
        const file = document.getElementById('imageInput').files[0];
        const formData = new FormData();
        formData.append("file", file);
        formData.append("upload_preset", "unsigned");
        
        const res = await fetch("https://api.cloudinary.com/v1_1/YOUR_CLOUD_NAME/image/upload", { method: "POST", body: formData });
        const data = await res.json();
        
        await addDoc(collection(db, "products"), { name: document.getElementById('pName').value, price: document.getElementById('pPrice').value, imageUrl: data.secure_url });
        alert("Done!");
    }

    // 4. Delete/Sold Product (Cire kaya bayan an sayar)
    window.deleteProduct = async (id) => {
        await deleteDoc(doc(db, "products", id));
        alert("Product Sold/Removed!");
    }

    // 5. Manage Users & Delete/Block
    onSnapshot(collection(db, "users"), (snapshot) => {
        let html = "";
        snapshot.forEach(doc => {
            html += `<div class="border p-2 mb-2">${doc.data().name} 
                     <button onclick="deleteDoc(doc(db, 'users', '${doc.id}'))" class="btn btn-danger btn-sm">Block User</button></div>`;
        });
        document.getElementById('userList').innerHTML = html;
    });

    // 6. Manage Products (Nuna kayan don ka goge idan an sayar)
    onSnapshot(collection(db, "products"), (snapshot) => {
        let html = "";
        snapshot.forEach(doc => {
            html += `<div class="border p-2 mb-2">${doc.data().name} - ₦${doc.data().price}
                     <button onclick="deleteProduct('${doc.id}')" class="btn btn-warning btn-sm">Mark as Sold/Delete</button></div>`;
        });
        document.getElementById('productList').innerHTML = html;
    });
</script>
</body>
</html>
