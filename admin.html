<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RetayaX Super Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f2027; color: white; padding: 20px; font-family: sans-serif; }
        .spinner { display: none; width: 50px; height: 50px; border: 5px solid #ccc; border-top: 5px solid #25d366; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="text-center">
    <h3>Super Admin Panel</h3>
    <input type="text" id="pName" class="form-control mb-2" placeholder="Product Name">
    <input type="number" id="pPrice" class="form-control mb-2" placeholder="Price (₦)">
    <input type="file" id="imageInput" class="form-control mb-2">
    <button onclick="uploadProduct()" class="btn btn-success w-100">Upload Product</button>
    <div class="spinner" id="loader"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // SECURITY
    const password = prompt("Enter Admin Password:");
    if (password !== "Auwal@00") { window.location.href = "dashboard.html"; }

    // CONFIGS
    const firebaseConfig = { /* SAKA FIREBASE CONFIG DIN KA ANAN */ };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const CLOUD_NAME = "YOUR_CLOUD_NAME"; // Saka sunan ka na Cloudinary
    const UPLOAD_PRESET = "unsigned"; 

    window.uploadProduct = async () => {
        const file = document.getElementById('imageInput').files[0];
        if(!file) return alert("Please select an image!");
        
        document.getElementById('loader').style.display = 'block';

        // 1. Upload to Cloudinary
        const formData = new FormData();
        formData.append("file", file);
        formData.append("upload_preset", UPLOAD_PRESET);
        
        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
            method: "POST", body: formData
        });
        const data = await res.json();
        
        // 2. Save to Firebase
        await addDoc(collection(db, "products"), {
            name: document.getElementById('pName').value,
            price: document.getElementById('pPrice').value,
            imageUrl: data.secure_url
        });

        document.getElementById('loader').style.display = 'none';
        alert("Product Uploaded Successfully!");
    }
</script>
</body>
</html>
