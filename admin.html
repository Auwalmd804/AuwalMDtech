<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RetayaX - Sign In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: #0f2027; 
            color: white; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .main-container {
            max-width: 420px;
            margin: auto;
            padding: 30px;
            background: #162b36;
            border-radius: 16px;
            border: 1px solid #2c5364;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            width: 90%;
        }
        .logo-area {
            text-align: center;
            margin-bottom: 25px;
        }
        .logo-area h4 {
            color: #25d366;
            font-weight: 700;
            margin-top: 10px;
        }
        .form-label {
            font-size: 0.88rem;
            color: #e0e6ed;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .form-control {
            background-color: #1a2a34;
            border: 1px solid #4a6d7c; /* An kara kauri da karfin layin wajen rubutu */
            color: #ffffff;
            font-weight: 500;
            border-radius: 8px;
            padding: 12px 14px;
            margin-bottom: 16px;
            font-size: 0.95rem;
        }
        .form-control::placeholder {
            color: #8fa0aa; /* Rubutu a ciki zai fito fili */
            opacity: 1; 
        }
        .form-control:focus {
            background-color: #1a2a34;
            border-color: #25d366;
            color: #ffffff;
            box-shadow: none;
        }
        .btn-green {
            background-color: #25d366;
            color: #000000;
            font-weight: 600;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            transition: 0.2s;
            margin-top: 8px;
        }
        .btn-green:hover {
            background-color: #128C7E;
            color: #ffffff;
        }
        .alert-box {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10000;
            width: 90%;
            max-width: 400px;
            border-radius: 10px;
            text-align: center;
            padding: 12px;
            font-weight: 600;
            display: none;
        }
    </style>
</head>
<body>

    <div id="alertBox" class="alert-box"></div>

    <div class="main-container">
        <div class="logo-area">
            <h4>RetayaX</h4>
            <p class="text-muted small">Sign in to continue to your account</p>
        </div>

        <form id="loginForm">
            <div class="mb-2">
                <label class="form-label">Phone Number or Email</label>
                <input type="text" class="form-control" id="loginEmail" placeholder="Enter phone or email" required>
            </div>

            <div class="mb-2">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" id="loginPassword" placeholder="Enter password" required>
            </div>

            <div class="text-end mb-3">
                <a href="forgot.html" class="text-success text-decoration-none small">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-green">Sign In</button>
        </form>

        <hr style="border-color: #2c5364;">
        
        <div class="text-center mt-3">
            <p class="text-muted small">Don't have an account yet? <a href="register.html" class="text-success text-decoration-none">Create Account</a></p>
            <p class="text-muted small">&copy; 2026 RetayaX - All Rights Reserved</p>
        </div>
    </div>

    <script type="module">
        // Wannan wuri ne na rubuta JavaScript
    </script>
</body>
</html>
