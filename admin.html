<!DOCTYPE html>
<html lang="en">
<head>
    <title>RetayaX Super Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .loader { display: none; border: 4px solid #f3f3f3; border-top: 4px solid #25d366; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-dark text-white">

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-2 bg-black vh-100 p-3">
            <img src="logo.png" width="60" class="rounded-circle mb-3">
            <h5 class="text-success">RetayaX Admin</h5>
            <hr>
            <div class="nav flex-column gap-2">
                <button class="btn btn-outline-light" onclick="show('upload')">Add Product</button>
                <button class="btn btn-outline-light" onclick="show('users')">Manage Users</button>
                <button class="btn btn-outline-light" onclick="show('chat')">Messages</button>
            </div>
        </nav>

        <main class="col-md-10 p-4">
            <div id="loader" class="loader mx-auto"></div>
            
            <div id="upload" class="section">
                <h3>Add Product</h3>
                <input type="text" id="pName" class="form-control mb-2" placeholder="Product Name">
                <input type="number" id="pPrice" class="form-control mb-2" placeholder="Price">
                <input type="file" id="img" class="form-control mb-2">
                <button onclick="uploadProduct()" class="btn btn-success">Upload</button>
            </div>

            <div id="users" class="section" style="display:none;">
                <h3>Users</h3>
                <div id="userList"></div>
            </div>
        </main>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { /* SAKA CONFIG DIN KA ANAN */ };
    const db = getFirestore(initializeApp(firebaseConfig));

    // Security
    if(prompt("Password:") !== "Auwal@00") window.location.href = "index.html";

    // Upload with Animation
    window.uploadProduct = async () => {
        document.getElementById('loader').style.display = 'block';
        const file = document.getElementById('img').files[0];
        
        const data = new FormData();
        data.append("file", file);
        data.append("upload_preset", "unsigned");
        
        const res = await fetch("https://api.cloudinary.com/v1_1/YOUR_CLOUD_NAME/image/upload", { method: "POST", body: data });
        const img = await res.json();
        
        await addDoc(collection(db, "products"), {
            name: document.getElementById('pName').value,
            price: document.getElementById('pPrice').value,
            image: img.secure_url
        });
        document.getElementById('loader').style.display = 'none';
        alert("Success!");
    };

    // User Management (BLOCK)
    onSnapshot(collection(db, "users"), (snap) => {
        let html = "";
        snap.forEach(d => {
            html += `<div class="d-flex justify-content-between p-2 border">${d.data().name} 
                     <button class="btn btn-danger btn-sm" onclick="deleteDoc(doc(db, 'users', '${d.id}'))">Block</button></div>`;
        });
        document.getElementById('userList').innerHTML = html;
    });

    window.show = (id) => {
        document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }
</script>
</body>
</html>
