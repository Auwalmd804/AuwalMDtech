<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RetayaX - Super Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body { 
            background: #0f2027; 
            color: white; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .main-container {
            max-width: 500px;
            margin: auto;
            padding: 25px;
            background: #162b36;
            border-radius: 16px;
            border: 1px solid #2c5364;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            width: 90%;
            margin-top: 30px;
            margin-bottom: 30px;
        }
        .logo-area {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo-area img {
            width: 60px;
            height: auto;
            border-radius: 50%;
        }
        .logo-area h4 {
            color: #25d366;
            font-weight: 700;
            margin-top: 8px;
        }
        .form-label {
            font-size: 0.82rem;
            color: #a0aab0;
            margin-bottom: 4px;
        }
        .form-control {
            background-color: #1a2a34;
            border: 1px solid #2c5364;
            color: #ffffff;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 12px;
            font-size: 0.9rem;
        }
        .form-control:focus {
            background-color: #1a2a34;
            border-color: #25d366;
            color: #ffffff;
            box-shadow: none;
        }
        .btn-green {
            background-color: #25d366;
            color: #000000;
            font-weight: 600;
            width: 100%;
            padding: 11px;
            border-radius: 8px;
            border: none;
            transition: 0.2s;
            margin-bottom: 8px;
        }
        .btn-green:hover {
            background-color: #128C7E;
            color: #ffffff;
        }
        .btn-danger-custom {
            background-color: #d9534f;
            color: #ffffff;
            width: 100%;
            padding: 11px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            margin-top: 6px;
        }
        .btn-danger-custom:hover {
            background-color: #c9302c;
        }
        #authOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0f2027;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .auth-box {
            background: #162b36;
            padding: 30px;
            border-radius: 16px;
            border: 1px solid #2c5364;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        .alert-box {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10000;
            width: 90%;
            max-width: 400px;
            border-radius: 10px;
            text-align: center;
            padding: 12px;
            font-weight: 600;
            display: none;
        }
        .divider {
            border-top: 1px solid #2c5364;
            margin: 15px 0;
        }
    </style>
</head>
<body>

    <div id="alertBox" class="alert-box"></div>

    <div id="authOverlay">
        <div class="auth-box">
            <h4 class="text-success mb-3"><i class="fas fa-lock me-2"></i>Admin Panel Lock</h4>
            <p class="text-muted small mb-4">Enter your credentials to access the admin area.</p>
            
            <div class="mb-3 text-start">
                <label class="form-label">Admin PIN (4-digit)</label>
                <input type="password" class="form-control" id="adminPin" placeholder="e.g., 8332" maxlength="4">
            </div>
            
            <div class="mb-3 text-start">
                <label class="form-label">Admin Password</label>
                <input type="password" class="form-control" id="adminPass" placeholder="e.g., Auwal@00">
            </div>

            <button class="btn btn-green mt-2" id="unlockBtn">Unlock Panel</button>
            <button class="btn btn-secondary w-100 mt-2" onclick="location.href='dashboard.html'">Back to Dashboard</button>
        </div>
    </div>

    <div class="main-container" id="adminPanel" style="display: none;">
        <div class="logo-area">
            <img src="logo.png" alt="RetayaX Logo">
            <h4>Super Admin Panel</h4>
            <p class="text-muted small">Welcome, CEO Auwal & Shayibu Ali Baba</p>
        </div>

        <div class="divider"></div>

        <h6 class="text-success mb-3"><i class="fas fa-users-cog me-2"></i>Admin Management</h6>
        <button class="btn btn-green mb-3" onclick="alert('Za a sanya tsarin ƙara Admin a nan gaba!')">Add New Admin</button>

        <h6 class="text-success mb-3"><i class="fas fa-database me-2"></i>Services Management</h6>
        <button class="btn btn-green mb-2" onclick="alert('Za a sanya tsarin ƙara sabon Service a nan gaba!')">Add New Service</button>
        <button class="btn btn-danger-custom mb-4" onclick="alert('Za a sanya tsarin goge Service a nan gaba!')">Remove Service</button>

        <h6 class="text-success mb-3"><i class="fas fa-user-check me-2"></i>User Records</h6>
        <button class="btn btn-green w-100 mb-4" onclick="alert('Za a sanya tsarin duba masu amfani a nan gaba!')">View All Users</button>

        <button type="button" class="btn btn-secondary w-100" id="logoutBtn">Exit Admin Panel</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA6Ce7cEDzcxOoEyh5Swl3wFx7ju-Up00k",
            authDomain: "auwalmdtech.firebaseapp.com",
            projectId: "auwalmdtech",
            storageBucket: "auwalmdtech.firebasestorage.app",
            messagingSenderId: "202329584080",
            appId: "1:202329584080:web:e989d7df53d3c3024609d5",
            measurementId: "G-8SZ1MQRMC9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        function showMessage(type, text) {
            const box = document.getElementById('alertBox');
            box.innerText = text;
            if (type === 'success') {
                box.className = 'alert-box bg-success text-black shadow';
            } else {
                box.className = 'alert-box bg-danger text-white shadow';
            }
            box.style.display = 'block';
            setTimeout(() => { box.style.display = 'none'; }, 4500);
        }

        // Tantance wanda ya shiga shafin
        auth.onAuthStateChanged((user) => {
            if (!user) {
                location.replace("index.html");
            }
        });

        // Bincika PIN da Password
        document.getElementById('unlockBtn').addEventListener('click', () => {
            const enteredPin = document.getElementById('adminPin').value;
            const enteredPass = document.getElementById('adminPass').value;

            // Daidaitawar PIN (8332) da Password (Auwal@00)
            if (enteredPin === '8332' && enteredPass === 'Auwal@00') {
                document.getElementById('authOverlay').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                showMessage('success', 'Access Granted: Welcome Super Admin!');
            } else {
                showMessage('error', 'Access Denied: Incorrect PIN or Password.');
            }
        });

        // Fita daga Admin Panel zuwa Dashboard
        document.getElementById('logoutBtn').addEventListener('click', () => {
            location.replace("dashboard.html");
        });
    </script>
</body>
</html>
