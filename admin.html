<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RetayaX Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #1a1a1a; color: white; padding: 20px; }
        .logo-admin { width: 100px; height: 100px; border-radius: 50%; margin-bottom: 20px; }
        .spinner { display: none; width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #25d366; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="text-center">
    <img src="logo.png" alt="Logo" class="logo-admin">
    <h3>Admin Panel</h3>
</div>

<div class="container mt-4">
    <input type="text" id="pName" class="form-control mb-2" placeholder="Product Name">
    <input type="number" id="pPrice" class="form-control mb-2" placeholder="Price (₦)">
    <input type="text" id="pImg" class="form-control mb-2" placeholder="Image URL">
    
    <button onclick="addProduct()" class="btn btn-success w-100">Upload Product</button>
    
    <div class="spinner" id="loader"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 1. Password Security
    const password = prompt("Enter Admin Password:");
    if (password !== "Auwal@00") {
        alert("Access Denied!");
        window.location.href = "dashboard.html";
    }

    // 2. Firebase Init (Ka tabbata config ɗinka yana nan)
    const firebaseConfig = { /* Ka saka config ɗinka anan */ };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 3. Upload Function
    window.addProduct = async () => {
        const loader = document.getElementById('loader');
        loader.style.display = 'block'; // Fara juyawa

        try {
            await addDoc(collection(db, "products"), {
                name: document.getElementById('pName').value,
                price: document.getElementById('pPrice').value,
                imageUrl: document.getElementById('pImg').value
            });
            alert("Product Uploaded Successfully!");
        } catch(e) {
            alert("Error!");
        } finally {
            loader.style.display = 'none'; // Daina juyawa
        }
    }
</script>
</body>
</html>
