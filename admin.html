<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RetayaX Super Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; font-family: sans-serif; }
        .sidebar { background: #0f2027; height: 100vh; color: white; padding: 20px; }
        .logo-nav { width: 50px; border-radius: 50%; margin-right: 10px; }
        .section { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .spinner { display: none; width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #25d366; border-radius: 50%; animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="d-flex">
    <div class="sidebar col-md-2">
        <div class="d-flex align-items-center mb-4">
            <img src="logo.png" class="logo-nav" alt="Logo">
            <h5>RetayaX Admin</h5>
        </div>
        <hr>
        <button class="btn btn-outline-light w-100 mb-2" onclick="show('products')">Manage Products</button>
        <button class="btn btn-outline-light w-100 mb-2" onclick="show('users')">Manage Users</button>
        <button class="btn btn-outline-light w-100 mb-2" onclick="show('chat')">Messages</button>
    </div>

    <div class="col-md-10 p-4">
        <div id="products" class="section">
            <h3>Add New Product</h3>
            <input type="text" id="pName" class="form-control mb-2" placeholder="Product Name">
            <input type="number" id="pPrice" class="form-control mb-2" placeholder="Price">
            <input type="file" id="imageInput" class="form-control mb-2">
            <button onclick="uploadProduct()" class="btn btn-success">Upload</button>
            <div class="spinner" id="loader"></div>
        </div>

        <div id="users" class="section" style="display:none;">
            <h3>User Management</h3>
            <p>List of all registered users will appear here. You can block them.</p>
        </div>

        <div id="chat" class="section" style="display:none;">
            <h3>Direct Messaging</h3>
            <p>Live chat support with users.</p>
        </div>
    </div>
</div>

<script type="module">
    // SECURITY
    const password = prompt("Enter Admin Password:");
    if (password !== "Auwal@00") { window.location.href = "dashboard.html"; }

    // NAVIGATION
    window.show = (id) => {
        document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    // UPLOAD LOGIC (Cloudinary + Firebase)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    
    // SAKA FIREBASE CONFIG DIN KA ANAN
    const app = initializeApp({/*...*/});
    const db = getFirestore(app);

    window.uploadProduct = async () => {
        const file = document.getElementById('imageInput').files[0];
        document.getElementById('loader').style.display = 'block';
        
        // Cloudinary Logic
        const formData = new FormData();
        formData.append("file", file);
        formData.append("upload_preset", "unsigned");
        const res = await fetch("https://api.cloudinary.com/v1_1/YOUR_CLOUD_NAME/image/upload", {
            method: "POST", body: formData
        });
        const data = await res.json();
        
        // Save to Firebase
        await addDoc(collection(db, "products"), {
            name: document.getElementById('pName').value,
            price: document.getElementById('pPrice').value,
            imageUrl: data.secure_url
        });
        document.getElementById('loader').style.display = 'none';
        alert("Product Uploaded!");
    }
</script>
</body>
</html>
