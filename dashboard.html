<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AMD Chat - Complete Build</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --tiktok-red: #fe2c55; --tiktok-blue: #00a2ff; --bg-dark: #050a12; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; overflow: hidden; font-family: sans-serif; }
        
        /* Feed System */
        #feedSection { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; -ms-overflow-style: none; }
        #feedSection::-webkit-scrollbar { display: none; }
        
        .post-card { height: 100vh; width: 100%; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; background: #000; }
        .post-media { width: 100%; height: 100%; object-fit: contain; }

        /* Top Navigation */
        .top-nav { position: absolute; top: 0; width: 100%; padding: 45px 20px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 2000; background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent); }
        .tabs { display: flex; gap: 15px; font-weight: bold; font-size: 18px; }
        .tabs span { opacity: 0.6; cursor: pointer; color: white; text-decoration: none; }
        .tabs span.active { opacity: 1; border-bottom: 3px solid white; }
        .top-icons { display: flex; gap: 20px; font-size: 22px; }

        /* Sidebar Actions - Always Visible */
        .sidebar { position: absolute; right: 12px; bottom: 120px; display: flex; flex-direction: column; align-items: center; gap: 22px; z-index: 2000; }
        .action-item { text-align: center; cursor: pointer; text-shadow: 0 2px 5px rgba(0,0,0,1); }
        .action-item i { font-size: 34px; color: white; }
        .action-item span { display: block; font-size: 13px; font-weight: bold; margin-top: 4px; color: white; }

        .profile-btn { position: relative; width: 50px; height: 50px; margin-bottom: 5px; }
        .profile-img { width: 100%; height: 100%; border-radius: 50%; border: 2px solid white; object-fit: cover; }
        .follow-plus { position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); background: var(--tiktok-red); width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid white; font-size: 12px; color: white; }

        /* Post Info - Corrected visibility */
        .post-info { position: absolute; bottom: 100px; left: 15px; right: 80px; z-index: 2000; pointer-events: none; }
        .post-info h6 { font-weight: 800; margin-bottom: 8px; font-size: 18px; color: white; text-shadow: 2px 2px 8px #000; }
        .post-info p { font-size: 15px; line-height: 1.3; color: white; text-shadow: 2px 2px 8px #000; }

        /* Bottom Nav - Blue and Black Style */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: #050a12; border-top: 1px solid #1a222d; display: flex; justify-content: space-around; align-items: center; z-index: 3000; }
        .nav-btn { color: #505d6b; text-decoration: none; text-align: center; font-size: 11px; flex: 1; transition: 0.3s; }
        .nav-btn.active { color: var(--tiktok-blue); }
        .nav-btn i { font-size: 26px; display: block; margin-bottom: 2px; }
        .add-btn-container { flex: 1; display: flex; justify-content: center; }
        .add-btn { width: 55px; height: 42px; background: var(--tiktok-blue); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; border: 3px solid #050a12; box-shadow: 0 0 15px rgba(0,162,255,0.4); }

        /* Touch Overlay for Audio/Controls */
        .touch-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 500; }
    </style>
</head>
<body>

<div class="top-nav">
    <i class="fas fa-tv text-white fs-4"></i>
    <div class="tabs">
        <span onclick="location.reload()">Following</span>
        <span class="active">For You</span>
    </div>
    <div class="top-icons">
        <i class="fas fa-search" onclick="alert('Search feature coming soon!')"></i>
        <i class="fas fa-bell" onclick="window.location.href='notifications.html'"></i>
    </div>
</div>

<div id="feedSection">
    </div>

<div class="bottom-nav">
    <a href="dashboard.html" class="nav-btn active"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="chats.html" class="nav-btn"><i class="fas fa-comment-dots"></i><span>Chats</span></a>
    <div class="add-btn-container">
        <div class="add-btn" onclick="window.location.href='create-post.html'"><i class="fas fa-plus"></i></div>
    </div>
    <a href="explore.html" class="nav-btn"><i class="fas fa-compass"></i><span>Explore</span></a>
    <a href="profile.html" class="nav-btn"><i class="fas fa-user"></i><span>Profile</span></a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot, doc, updateDoc, arrayUnion, arrayRemove, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyA6Ce7cEDzcxOoEyh5Swl3wFx7ju-Up00k",
        authDomain: "auwalmdtech.firebaseapp.com",
        projectId: "auwalmdtech",
        storageBucket: "auwalmdtech.firebasestorage.app",
        messagingSenderId: "202329584080",
        appId: "1:202329584080:web:e989d7df53d3c3024609d5"
    };

    const db = getFirestore(initializeApp(firebaseConfig));
    const currentUser = JSON.parse(localStorage.getItem('amd_user')) || { phone: '000', name: 'Guest' };

    const videoObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            const vid = entry.target.querySelector('video');
            if (vid) {
                if (entry.isIntersecting) {
                    vid.play().catch(() => { vid.muted = true; vid.play(); });
                } else {
                    vid.pause();
                }
            }
        });
    }, { threshold: 0.8 });

    onSnapshot(query(collection(db, "posts"), orderBy("createdAt", "desc")), (snapshot) => {
        const feed = document.getElementById('feedSection');
        feed.innerHTML = "";
        
        snapshot.forEach(async (pDoc) => {
            const p = pDoc.data();
            const pid = pDoc.id;
            const isLiked = p.likes?.includes(currentUser.phone);

            const card = document.createElement('div');
            card.className = 'post-card';
            card.innerHTML = `
                ${p.type === 'video' ? 
                    `<video src="${p.fileUrl}" class="post-media" loop playsinline></video>` : 
                    `<img src="${p.fileUrl}" class="post-media">`
                }
                
                <div class="touch-overlay" onclick="handleTap(this)"></div>

                <div class="sidebar">
                    <div class="profile-btn" onclick="window.location.href='profile.html?id=${p.phone}'">
                        <img src="${p.userPhoto || 'logo.jpg'}" class="profile-img">
                        <div class="follow-plus" onclick="doFollow(event, '${p.phone}')"><i class="fas fa-plus"></i></div>
                    </div>
                    <div class="action-item" onclick="toggleLike('${pid}', ${isLiked})">
                        <i class="fas fa-heart" style="color: ${isLiked ? '#fe2c55' : 'white'}"></i>
                        <span>${p.likes?.length || 0}</span>
                    </div>
                    <div class="action-item" onclick="alert('Comments opening...')">
                        <i class="fas fa-comment-dots"></i>
                        <span>${p.commentCount || 0}</span>
                    </div>
                    <div class="action-item" onclick="shareNow('${p.fileUrl}')">
                        <i class="fas fa-share"></i>
                        <span>Share</span>
                    </div>
                </div>

                <div class="post-info">
                    <h6>@${p.userName || 'User'}</h6>
                    <p>${p.caption || ""}</p>
                </div>
            `;
            feed.appendChild(card);
            videoObserver.observe(card);
        });
    });

    window.handleTap = (overlay) => {
        const vid = overlay.parentElement.querySelector('video');
        if(vid) {
            if(vid.paused) {
                vid.play();
                vid.muted = false; // Bude murya
            } else {
                vid.pause();
            }
        }
    };

    window.toggleLike = async (pid, liked) => {
        const ref = doc(db, "posts", pid);
        await updateDoc(ref, { likes: liked ? arrayRemove(currentUser.phone) : arrayUnion(currentUser.phone) });
    };

    window.doFollow = async (e, phone) => {
        e.stopPropagation();
        const ref = doc(db, "users", phone);
        await updateDoc(ref, { followers: arrayUnion(currentUser.phone) });
        alert("Following!");
    };

    window.shareNow = (url) => {
        if (navigator.share) {
            navigator.share({ title: 'AMD Chat', url: url });
        } else {
            prompt("Copy link:", url);
        }
    };
</script>
</body>
</html>
