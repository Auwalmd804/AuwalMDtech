<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Auwal MD Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #0084ff;
            --secondary: #00c6ff;
            --bg-gradient: linear-gradient(180deg, #0f172a 0%, #020617 100%);
        }

        body { 
            background: var(--bg-gradient); 
            color: white; 
            font-family: 'Poppins', sans-serif; 
            margin-bottom: 80px;
            min-height: 100vh;
        }

        .header { 
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(15px); 
            padding: 15px 20px; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .user-pfp-small { 
            width: 42px; height: 42px; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 2px solid var(--primary); 
            cursor: pointer;
        }

        .post-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            overflow: hidden;
        }

        /* Tsarin yadda rubutu kawai zai fito */
        .text-only-post {
            background: linear-gradient(45deg, #1e293b, #334155);
            padding: 40px 20px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 500;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; 
            background: rgba(15, 23, 42, 0.95); 
            backdrop-filter: blur(15px);
            display: flex; justify-content: space-around; 
            padding: 12px 0; border-top: 1px solid rgba(255,255,255,0.1); 
            z-index: 1000;
        }
        .nav-btn { color: #64748b; text-decoration: none; text-align: center; }
        .nav-btn.active { color: var(--primary); }

        .btn-plus {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            width: 55px; height: 55px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin-top: -35px;
            border: 4px solid #020617;
            color: white; font-size: 24px;
        }

        video.post-media { width: 100%; background: #000; max-height: 500px; }
    </style>
</head>
<body>

<div class="header d-flex justify-content-between align-items-center">
    <div class="d-flex align-items-center">
        <img id="myPfp" src="" class="user-pfp-small" onclick="window.location.href='profile.html'">
        <div class="ms-3">
            <small class="text-muted d-block" style="font-size: 10px;">Welcome back,</small>
            <h6 class="fw-bold m-0" id="dashName" style="font-size: 14px;">User</h6>
        </div>
    </div>
    <i class="far fa-bell fs-5 text-muted"></i>
</div>

<div id="feedSection" class="container mt-3">
    <div class="text-center mt-5" id="loader">
        <div class="spinner-border text-primary"></div>
        <p class="text-muted mt-2">Loading feed...</p>
    </div>
</div>
    
<div class="nav-bottom">
    <a href="dashboard.html" class="nav-item active"><i class="fas fa-home"></i></a>
    <a href="chats.html" class="nav-item"><i class="fas fa-comment"></i></a>
    <a href="create-post.html" class="nav-item"><i class="fas fa-plus-circle"></i></a>
    <a href="explore.html" class="nav-item"><i class="fas fa-compass"></i></a>
    <a href="profile.html" class="nav-item"><i class="fas fa-user"></i></a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA6Ce7cEDzcxOoEyh5Swl3wFx7ju-Up00k",
        authDomain: "auwalmdtech.firebaseapp.com",
        projectId: "auwalmdtech",
        storageBucket: "auwalmdtech.firebasestorage.app",
        messagingSenderId: "202329584080",
        appId: "1:202329584080:web:e989d7df53d3c3024609d5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const user = JSON.parse(localStorage.getItem('amd_user'));
    if(user) {
        document.getElementById('dashName').innerText = user.name;
        document.getElementById('myPfp').src = user.photo || `https://ui-avatars.com/api/?name=${user.name}&background=0084ff&color=fff`;
    }

    const postsQuery = query(collection(db, "posts"), orderBy("createdAt", "desc"));
    
    onSnapshot(postsQuery, (snapshot) => {
        const feed = document.getElementById('feedSection');
        feed.innerHTML = "";

        if (snapshot.empty) {
            feed.innerHTML = `<div class="text-center mt-5 text-muted"><p>No posts yet. Be the first!</p></div>`;
            return;
        }

        snapshot.forEach((doc) => {
            const post = doc.data();
            const name = post.userName || 'User';
            const pfp = post.userPhoto || `https://ui-avatars.com/api/?name=${name}`;
            
            let mediaHtml = "";
            if (post.type === 'image' && post.fileUrl) {
                mediaHtml = `<img src="${post.fileUrl}" class="w-100" style="max-height: 500px; object-fit: cover;">`;
            } else if (post.type === 'video' && post.fileUrl) {
                mediaHtml = `<video src="${post.fileUrl}" class="post-media" controls></video>`;
            } else if (post.type === 'text') {
                mediaHtml = `<div class="text-only-post">${post.caption}</div>`;
            }

            const postHtml = `
                <div class="post-card">
                    <div class="p-3 d-flex align-items-center">
                        <img src="${pfp}" style="width: 35px; height: 35px; border-radius: 50%; border: 1px solid #0084ff; object-fit: cover;">
                        <div class="ms-2">
                            <h6 class="m-0 small fw-bold">${name}</h6>
                            <small class="text-muted" style="font-size: 10px;">Just now</small>
                        </div>
                    </div>
                    
                    ${mediaHtml}

                    <div class="p-3">
                        <div class="d-flex gap-3 mb-2">
                            <i class="far fa-heart fs-5"></i>
                            <i class="far fa-comment fs-5"></i>
                            <i class="far fa-paper-plane fs-5"></i>
                        </div>
                        ${post.type !== 'text' ? `<p class="small m-0"><b>${name}</b> ${post.caption || ""}</p>` : ''}
                    </div>
                </div>
            `;
            feed.innerHTML += postHtml;
        });
    }, (error) => {
        console.error("Error:", error);
    });
</script>

</body>
</html>
