<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Auwal MD Pay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1e3c72; --secondary: #2a5298; --accent: #ffd700; }
        body { background: #f4f7f6; font-family: 'Poppins', sans-serif; padding-bottom: 90px; }
        
        .top-bar { background: var(--primary); color: white; padding: 25px 20px 60px; border-radius: 0 0 30px 30px; }
        .wallet-card { background: white; border-radius: 20px; padding: 25px; margin-top: -40px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-bottom: 5px solid var(--accent); }
        
        .service-btn { background: white; border-radius: 15px; padding: 15px; text-align: center; border: 1px solid #eee; transition: 0.3s; cursor: pointer; height: 100%; }
        .service-btn:active { transform: scale(0.95); }
        .service-btn i { font-size: 24px; margin-bottom: 8px; color: var(--primary); }
        
        /* Chat Widget */
        #chatBox { position: fixed; bottom: 100px; right: 20px; width: 300px; height: 400px; background: white; border-radius: 15px; display: none; flex-direction: column; box-shadow: 0 5px 25px rgba(0,0,0,0.2); z-index: 1000; overflow: hidden; }
        .chat-header { background: var(--primary); color: white; padding: 10px 15px; display: flex; justify-content: space-between; }
        #msgArea { flex: 1; padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; background: #f9f9f9; }
        .msg { padding: 8px 12px; border-radius: 15px; max-width: 80%; font-size: 13px; }
        .msg.sent { background: var(--primary); color: white; align-self: flex-end; }
        .msg.received { background: #eee; align-self: flex-start; }

        .footer-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #eee; }
        .nav-item { color: #888; text-decoration: none; text-align: center; font-size: 12px; }
        .nav-item.active { color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="d-flex justify-content-between align-items-center">
        <div>
            <small class="opacity-75">Assalamu Alaikum,</small>
            <h5 id="uName" class="fw-bold m-0">User</h5>
        </div>
        <div class="bg-white rounded-circle p-2" style="width: 40px; height: 40px;">
            <i class="fas fa-user text-primary"></i>
        </div>
    </div>
</div>

<div class="container">
    <div class="wallet-card text-center">
        <small class="text-muted">Available Balance</small>
        <h2 class="fw-bold my-1 text-dark" id="uBal">₦0.00</h2>
        <div class="d-flex gap-2 mt-3">
            <button class="btn btn-primary w-100 fw-bold" onclick="showTransfer()"><i class="fas fa-paper-plane me-1"></i> Transfer</button>
            <button class="btn btn-outline-primary w-100 fw-bold" onclick="window.location.href='fund.html'"><i class="fas fa-wallet me-1"></i> Add Fund</button>
        </div>
    </div>

    <div class="row mt-4 g-3">
        <div class="col-4">
            <div class="service-btn shadow-sm" onclick="window.location.href='buy-data.html'">
                <i class="fas fa-wifi"></i><div class="small fw-bold">Data</div>
            </div>
        </div>
        <div class="col-4">
            <div class="service-btn shadow-sm" onclick="window.location.href='buy-airtime.html'">
                <i class="fas fa-phone"></i><div class="small fw-bold">Airtime</div>
            </div>
        </div>
        <div class="col-4">
            <div class="service-btn shadow-sm" onclick="window.location.href='bill.html'">
                <i class="fas fa-lightbulb"></i><div class="small fw-bold">Bills</div>
            </div>
        </div>
    </div>
</div>

<div id="chatBox">
    <div class="chat-header">
        <span class="small fw-bold">Live Support (Admin)</span>
        <i class="fas fa-times cursor-pointer" onclick="toggleChat()"></i>
    </div>
    <div id="msgArea"></div>
    <div class="p-2 border-top d-flex">
        <input type="text" id="chatInput" class="form-control form-control-sm border-0" placeholder="Type a message...">
        <button class="btn btn-primary btn-sm ms-1" id="sendMsg"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<div class="footer-nav">
    <a href="#" class="nav-item active"><i class="fas fa-home d-block mb-1"></i>Home</a>
    <a href="transactions.html" class="nav-item"><i class="fas fa-history d-block mb-1"></i>History</a>
    <a href="#" class="nav-item" onclick="toggleChat()"><i class="fas fa-headset d-block mb-1"></i>Support</a>
    <a href="profile.html" class="nav-item"><i class="fas fa-cog d-block mb-1"></i>Settings</a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot, collection, addDoc, query, where, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA6Ce7cEDzcxOoEyh5Swl3wFx7ju-Up00k",
        authDomain: "auwalmdtech.firebaseapp.com",
        projectId: "auwalmdtech",
        storageBucket: "auwalmdtech.firebasestorage.app",
        messagingSenderId: "202329584080",
        appId: "1:202329584080:web:e989d7df53d3c3024609d5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const user = JSON.parse(localStorage.getItem('amd_user'));

    if(!user) window.location.href = "auth.html";

    document.getElementById('uName').innerText = user.name;

    // 1. Real-time Balance
    onSnapshot(doc(db, "users", user.phone), (d) => {
        if(d.exists()){
            const bal = d.data().balance || 0;
            document.getElementById('uBal').innerText = "₦" + bal.toLocaleString();
        }
    });

    // 2. Chat Logic
    window.toggleChat = () => {
        const box = document.getElementById('chatBox');
        box.style.display = box.style.display === 'flex' ? 'none' : 'flex';
        if(box.style.display === 'flex') loadMsgs();
    };

    async function loadMsgs() {
        const q = query(collection(db, "support_chats"), where("chatId", "==", user.phone), orderBy("time", "asc"));
        onSnapshot(q, (snap) => {
            const area = document.getElementById('msgArea');
            area.innerHTML = "";
            snap.forEach(doc => {
                const m = doc.data();
                area.innerHTML += `<div class="msg ${m.sender === 'user' ? 'sent' : 'received'}">${m.text}</div>`;
            });
            area.scrollTop = area.scrollHeight;
        });
    }

    document.getElementById('sendMsg').onclick = async () => {
        const text = document.getElementById('chatInput').value;
        if(!text) return;
        await addDoc(collection(db, "support_chats"), {
            chatId: user.phone,
            sender: 'user',
            text: text,
            time: serverTimestamp()
        });
        document.getElementById('chatInput').value = "";
    };

    // 3. Transfer Placeholder (For next step)
    window.showTransfer = () => {
        const phone = prompt("Enter Receiver's Phone Number:");
        if(phone) window.location.href = `transfer.html?to=${phone}`;
    };

</script>
</body>
</html>
