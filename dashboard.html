<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - IM SMART VTU</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f0f2f5; font-family: 'Ubuntu', sans-serif; }
        .header-logo { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
        .card { border: none; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .wallet-box { background: linear-gradient(135deg, #1e3a8a, #3b82f6); color: white; padding: 25px; border-radius: 20px; }
        .network-card { cursor: pointer; transition: 0.3s; border: 1px solid #eee; }
        .network-card:hover { transform: translateY(-5px); border-color: #3b82f6; }
        .network-logo { width: 50px; height: 50px; border-radius: 10px; margin-bottom: 10px; }
        .slip-card { border: 2px solid #eee; border-radius: 15px; padding: 15px; text-align: center; cursor: pointer; }
        input[type="radio"]:checked + .slip-card { border-color: #3b82f6; background-color: #eff6ff; }
        .admin-link { position: fixed; bottom: 80px; right: 20px; background: #dc3545; color: white; padding: 10px 20px; border-radius: 30px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container py-3">
    <div class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 rounded-pill shadow-sm">
        <div class="d-flex align-items-center">
            <img src="https://via.placeholder.com/50" alt="Logo" class="header-logo me-2"> <span class="fw-bold">IM SMART</span>
        </div>
        <div class="text-primary fw-bold">ID: #00123</div>
    </div>

    <div class="wallet-box mb-4">
        <p class="mb-1 opacity-75">Adadin Kudinka</p>
        <h2 class="fw-bold mb-3">₦5,450.00</h2>
        <button class="btn btn-light btn-sm px-4 fw-bold">Saka Kudi</button>
    </div>

    <h6 class="fw-bold mb-3 text-secondary">SAYI DATA DA AIRTIME</h6>
    <div class="row g-3 mb-4">
        <div class="col-3 text-center">
            <div class="card p-2 network-card">
                <img src="https://upload.wikimedia.org/wikipedia/commons/9/93/MTN_Logo.svg" class="network-logo mx-auto">
                <div style="font-size: 10px; font-weight: bold;">MTN</div>
            </div>
        </div>
        <div class="col-3 text-center">
            <div class="card p-2 network-card">
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/e1/Airtel_logo.png" class="network-logo mx-auto">
                <div style="font-size: 10px; font-weight: bold;">AIRTEL</div>
            </div>
        </div>
        <div class="col-3 text-center">
            <div class="card p-2 network-card">
                <img src="https://upload.wikimedia.org/wikipedia/en/thumb/7/75/Glo_Limited_logo.png/220px-Glo_Limited_logo.png" class="network-logo mx-auto">
                <div style="font-size: 10px; font-weight: bold;">GLO</div>
            </div>
        </div>
        <div class="col-3 text-center">
            <div class="card p-2 network-card">
                <img src="https://upload.wikimedia.org/wikipedia/en/3/33/9mobile_Logo.png" class="network-logo mx-auto">
                <div style="font-size: 10px; font-weight: bold;">9MOBILE</div>
            </div>
        </div>
    </div>

    <div class="card p-4 mb-5">
        <h5 class="fw-bold text-primary mb-3 text-uppercase" style="font-size: 14px;">NIN Slip & Information</h5>
        <div class="row g-3">
            <div class="col-6">
                <label class="w-100">
                    <input type="radio" name="nin_type" class="d-none" checked>
                    <div class="slip-card">
                        <div class="small fw-bold">Standard</div>
                        <div class="text-primary fw-bold">₦180.00</div>
                    </div>
                </label>
            </div>
            <div class="col-6">
                <label class="w-100">
                    <input type="radio" name="nin_type" class="d-none">
                    <div class="slip-card">
                        <div class="small fw-bold">Premium</div>
                        <div class="text-primary fw-bold">₦200.00</div>
                    </div>
                </label>
            </div>
        </div>
        <div class="mt-3">
            <label class="small fw-bold mb-1">Saka Lambar Waya ko NIN</label>
            <input type="number" class="form-control form-control-lg" placeholder="11112222333">
        </div>
        <button class="btn btn-primary w-100 mt-3 py-3">FITAR DA SLIP YANZU</button>
    </div>
</div>

<a href="admin.html" class="admin-link shadow">
    <i class="fas fa-user-shield me-2"></i> Admin Panel
</a>

<nav class="fixed-bottom bg-white border-top p-2 d-flex justify-content-around shadow-lg">
    <div class="text-center text-primary"><i class="fas fa-home fs-5"></i></div>
    <div class="text-center text-muted"><i class="fas fa-history fs-5"></i></div>
    <div class="text-center text-muted"><i class="fas fa-wallet fs-5"></i></div>
    <div class="text-center text-muted"><i class="fas fa-cog fs-5"></i></div>
</nav>

</body>
</html>
