<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RetayaX - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body { 
            background: #0f2027; 
            color: white; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* --- PROFESSIONAL LOADING SCREEN --- */
        #loader {
            position: fixed;
            inset: 0;
            background: #0f2027;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .loader-container {
            position: relative;
            width: 100px;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .loader-logo {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            z-index: 2;
        }
        .loader-spinner {
            position: absolute;
            width: 90px;
            height: 90px;
            border: 4px solid transparent;
            border-top: 4px solid #25d366;
            border-right: 4px solid #25d366;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-text {
            margin-top: 15px;
            font-size: 14px;
            color: #25d366;
            letter-spacing: 1px;
            font-weight: bold;
        }

        /* --- LOGO ENHANCEMENT --- */
        .waving-logo {
            width: 40px;
            height: 40px;
            object-fit: contain;
            border-radius: 50%;
            border: 2px solid #25d366;
            box-shadow: 0 0 10px rgba(37, 211, 102, 0.8); /* Wannan zai ba shi haske */
            background: white; /* Don ya fito fili ko da akwai duhu */
        }

        .top-banner {
            background: #162b36;
            border-radius: 15px;
            padding: 0;
            margin: 12px auto;
            border: 2px solid #25d366;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            overflow: hidden;
            width: 92%;
            max-width: 500px;
            position: relative;
        }
        .top-banner img { width: 100%; height: auto; display: block; }

        @keyframes pointHand {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(15px, 0) scale(1.1); }
        }
        .pointing-hand {
            position: absolute;
            right: 20px;
            bottom: 15px;
            font-size: 32px;
            color: #25d366;
            animation: pointHand 1.5s infinite;
        }
        
        .service-card { 
            background: #1a2a34; 
            border-radius: 15px; 
            padding: 8px; 
            text-align: center; 
            border: 1px solid #2c5364; 
            height: 105px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            transition: 0.2s; 
        }
        .service-card img { height: 42px; width: auto; margin-bottom: 6px; }
        .service-card h6 { font-size: 0.65rem; color: #fff; margin: 0; }
        .wa-btn { position: fixed; bottom: 80px; right: 20px; background: #25d366; color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        footer { padding: 12px; text-align: center; color: rgba(255,255,255,0.6); font-size: 12px; margin-top: auto; }
        .offcanvas { background: #0f2027; }
    </style>
</head>
<body>

<div id="loader">
    <div class="loader-container">
        <div class="loader-spinner"></div>
        <img src="logo.png" class="loader-logo" alt="Loading">
    </div>
    <div class="loading-text">RE-TAYAX PROCESSING...</div>
</div>

<nav class="navbar navbar-dark bg-dark p-3 shadow">
    <div class="container-fluid d-flex justify-content-between align-items-center w-100">
        <img src="logo.png" class="waving-logo" alt="Logo">
        <span class="text-white fw-bold">Welcome to RetayaX</span>
        <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>
    </div>
</nav>

<div class="offcanvas offcanvas-end" id="menu">
    <div class="offcanvas-header"><h5 class="offcanvas-title text-white">Menu</h5><button class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button></div>
    <div class="offcanvas-body">
        <a href="transactions.html" class="btn btn-outline-success w-100 mb-3 py-2">Transaction History</a>
    </div>
</div>

<marquee class="bg-success text-black fw-bold p-1">The CEO Auwal MD and Shayibu Ali Baba | Site Active 24/7</marquee>

<div class="top-banner" onclick="window.location.href='https://retayax.quark.ng'">
    <img src="all-in-one.png" alt="All-in-one Digital Service">
    <span id="handIcon" class="pointing-hand">👉</span>
</div>

<div class="container-fluid mt-2">
    <div class="row g-2" id="grid"></div>
</div>

<a href="https://wa.me/2348164712102" target="_blank" class="wa-btn"><i class="fab fa-whatsapp"></i></a>
<footer>&copy; 2026 RetayaX - All Rights Reserved</footer>

<script type="module">
    const services = [
        {name: "Sunking", img: "sunking.png"},
        {name: "NIN Device", img: "nin-device.png"},
        {name: "Airtel Reg", img: "airtel-reg.png"},
        {name: "BVN Registration", img: "bvn-reg.png"},
        {name: "WhatsApp Hub", img: "whatsapp-hub.png"},
        {name: "Data Sim", img: "data-sim.png"},
        {name: "Wifi/Router", img: "router-wifi.png"},
        {name: "Product Shop", img: "shop-all.png"},
        {name: "SIM Swap", img: "sim-swap.png"},
        {name: "Graphic Design", img: "graphic-design.png"},
        {name: "Service Match", img: "service-match.png"}
    ];

    const grid = document.getElementById('grid');
    services.forEach(s => {
        let fileLink = s.name.toLowerCase().replace(/ /g,'').replace('/','');
        grid.innerHTML += `
            <div class="col-4">
                <div class="service-card" onclick="location.href='${fileLink}.html'">
                    <img src="${s.img}" alt="${s.name}">
                    <h6 class="text-truncate">${s.name}</h6>
                </div>
            </div>`;
    });

    // Wannan zai ba wa dukkan abubuwa lokaci su gama fitowa kafin ya cire loading
    window.onload = () => {
        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
        }, 1500); // 1.5 seconds loading don kyakkyawan tsari
    };

    setTimeout(() => {
        const handIcon = document.getElementById('handIcon');
        if (handIcon) handIcon.style.display = 'none';
    }, 30000);
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
