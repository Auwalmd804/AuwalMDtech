<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AMD Chat - Pro Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; overflow: hidden; font-family: sans-serif; }
        
        /* Pull to Refresh Style */
        #refreshIndicator { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); z-index: 1000; display: none; }
        .spinner-border { width: 1.5rem; height: 1.5rem; color: #25f4ee; }

        #feedSection { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #feedSection::-webkit-scrollbar { display: none; }
        
        .post-card { height: 100vh; width: 100%; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        .post-media { width: 100%; height: 100%; object-fit: contain; }

        /* Original Bottom Navigation Style from your image */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; height: 70px; 
            background: #050a12; /* Deep dark blue-black */
            display: flex; justify-content: space-around; align-items: center; 
            z-index: 1000; border-top: 1px solid #1a222d;
        }
        .nav-item { color: #505d6b; text-decoration: none; text-align: center; font-size: 11px; transition: 0.3s; }
        .nav-item.active { color: #00a2ff; } /* Blue color from your screenshot */
        .nav-item i { font-size: 24px; display: block; margin-bottom: 2px; }
        
        /* The Big Blue Plus Button */
        .main-plus-btn { 
            width: 55px; height: 55px; background: #00a2ff; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: white; font-size: 28px; margin-top: -35px;
            box-shadow: 0 4px 15px rgba(0, 162, 255, 0.4);
            border: 4px solid #050a12;
        }

        /* Interaction Sidebar */
        .interaction-sidebar { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 10; }
        .profile-link { position: relative; margin-bottom: 10px; }
        .profile-pic { width: 48px; height: 48px; border-radius: 50%; border: 2px solid white; }
        .plus-badge { position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%); background: #fe2c55; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; border: 2px solid white; font-size: 12px; }

        .stat-btn { text-align: center; cursor: pointer; }
        .stat-btn i { font-size: 32px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8)); }
        .stat-btn span { display: block; font-size: 12px; font-weight: bold; margin-top: 4px; }

        /* Comment Sheet */
        .comment-sheet { position: fixed; bottom: -100%; left: 0; width: 100%; height: 65%; background: #161823; border-radius: 12px 12px 0 0; z-index: 2000; transition: 0.4s ease; padding: 20px; }
        .comment-sheet.open { bottom: 0; }
    </style>
</head>
<body>

<div id="refreshIndicator"><div class="spinner-border"></div></div>

<div id="feedSection"></div>

<div class="bottom-nav">
    <a href="dashboard.html" class="nav-item active"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="chats.html" class="nav-item"><i class="fas fa-comment-dots"></i><span>Chats</span></a>
    <div class="main-plus-btn" onclick="window.location.href='create-post.html'"><i class="fas fa-plus"></i></div>
    <a href="explore.html" class="nav-item"><i class="fas fa-compass"></i><span>Explore</span></a>
    <a href="profile.html" class="nav-item"><i class="fas fa-user"></i><span>Profile</span></a>
</div>

<div id="commentSheet" class="comment-sheet">
    <div class="d-flex justify-content-between mb-3 border-bottom border-secondary pb-2">
        <h6 id="countLabel">0 Comments</h6>
        <i class="fas fa-times" onclick="closeComments()"></i>
    </div>
    <div id="commentList" style="height: 300px; overflow-y: auto;" class="mb-3"></div>
    <div class="input-group">
        <input type="text" id="cmInput" class="form-control bg-dark border-0 text-white" placeholder="Add comment...">
        <button class="btn btn-primary" onclick="sendComment()">Send</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot, doc, updateDoc, arrayUnion, arrayRemove, addDoc, serverTimestamp, getCountFromServer } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { /* Manna Config dinka anan */ };
    const db = getFirestore(initializeApp(firebaseConfig));
    const currentUser = JSON.parse(localStorage.getItem('amd_user'));
    let activePid = null;

    // Load Posts & Real Comment Count
    onSnapshot(query(collection(db, "posts"), orderBy("createdAt", "desc")), (snap) => {
        const feed = document.getElementById('feedSection');
        feed.innerHTML = "";
        snap.forEach(async (pDoc) => {
            const p = pDoc.data();
            const pid = pDoc.id;
            
            // Get real comment count from DB
            const commentSnap = await getCountFromServer(collection(db, "posts", pid, "comments"));
            const commentCount = commentSnap.data().count;

            const isLiked = p.likes?.includes(currentUser?.phone);

            feed.innerHTML += `
                <div class="post-card">
                    <video src="${p.fileUrl}" class="post-media" loop autoplay playsinline onclick="this.paused?this.play():this.pause()"></video>
                    <div class="interaction-sidebar">
                        <div class="profile-link">
                            <img src="${p.userPhoto || 'logo.jpg'}" class="profile-pic">
                            <div class="plus-badge"><i class="fas fa-plus"></i></div>
                        </div>
                        <div class="stat-btn" onclick="handleLike('${pid}', ${isLiked})">
                            <i class="fas fa-heart" style="color:${isLiked ? '#fe2c55':'white'}"></i>
                            <span>${p.likes?.length || 0}</span>
                        </div>
                        <div class="stat-btn" onclick="openComments('${pid}')">
                            <i class="fas fa-comment-dots"></i>
                            <span>${commentCount}</span>
                        </div>
                        <div class="stat-btn" onclick="sharePost('${p.fileUrl}')">
                            <i class="fas fa-share"></i>
                            <span>Share</span>
                        </div>
                    </div>
                </div>`;
        });
    });

    // Real Pull to Refresh Logic
    let touchStart = 0;
    document.getElementById('feedSection').addEventListener('touchstart', e => touchStart = e.touches[0].pageY);
    document.getElementById('feedSection').addEventListener('touchmove', e => {
        const touchMove = e.touches[0].pageY;
        if (touchMove - touchStart > 150 && document.getElementById('feedSection').scrollTop === 0) {
            document.getElementById('refreshIndicator').style.display = 'block';
            setTimeout(() => location.reload(), 1000);
        }
    });

    // Comment Functions
    window.openComments = (id) => {
        activePid = id;
        document.getElementById('commentSheet').classList.add('open');
        loadRealComments(id);
    };

    window.closeComments = () => document.getElementById('commentSheet').classList.remove('open');

    function loadRealComments(id) {
        onSnapshot(query(collection(db, "posts", id, "comments"), orderBy("createdAt", "desc")), (snap) => {
            const list = document.getElementById('commentList');
            document.getElementById('countLabel').innerText = `${snap.size} Comments`;
            list.innerHTML = "";
            snap.forEach(d => {
                const c = d.data();
                list.innerHTML += `<div class="mb-2"><small class="text-info">@${c.userName}</small><br>${c.text}</div>`;
            });
        });
    }

    window.sendComment = async () => {
        const input = document.getElementById('cmInput');
        if (!input.value || !activePid) return;
        await addDoc(collection(db, "posts", activePid, "comments"), {
            text: input.value,
            userName: currentUser.name,
            createdAt: serverTimestamp()
        });
        input.value = "";
    };

    window.sharePost = (url) => navigator.share ? navigator.share({url}) : alert("Link: "+url);
</script>
</body>
</html>
