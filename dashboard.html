<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMD Chat - Final TikTok Build</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; overflow: hidden; font-family: sans-serif; }
        
        #feedSection { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #feedSection::-webkit-scrollbar { display: none; }
        
        .post-card { height: 100vh; width: 100%; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; background: #000; }
        
        .post-media { max-width: 100%; max-height: 100vh; object-fit: contain; z-index: 1; }

        /* Video Controls Overlay */
        .video-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; display: flex; }
        .side-touch { width: 50%; height: 100%; } /* For double tap detection */
        
        .play-pause-icon { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 60px; opacity: 0; transition: 0.3s; color: rgba(255,255,255,0.5); z-index: 3;
        }

        /* Side UI */
        .side-actions { position: absolute; right: 12px; bottom: 120px; display: flex; flex-direction: column; gap: 18px; align-items: center; z-index: 10; }
        .profile-container { position: relative; margin-bottom: 8px; }
        .profile-img { width: 48px; height: 48px; border-radius: 50%; border: 2px solid white; }
        .follow-plus { 
            position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
            background: #fe2c55; color: white; width: 20px; height: 20px; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px;
        }

        .action-btn { text-align: center; cursor: pointer; text-shadow: 1px 1px 3px #000; }
        .action-btn i { font-size: 30px; }
        .action-btn small { display: block; font-size: 12px; font-weight: bold; margin-top: 2px; }

        /* Bottom Info */
        .post-content { position: absolute; bottom: 100px; left: 15px; right: 80px; z-index: 10; text-shadow: 1px 1px 4px #000; }
        
        /* Bottom Nav */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; background: #000; 
            display: flex; justify-content: space-around; padding: 12px 0; 
            border-top: 0.5px solid #333; z-index: 100;
        }
        .nav-item { color: #8a8a8e; text-decoration: none; text-align: center; }
        .nav-item.active { color: white; }
        .nav-item i { font-size: 22px; }
        .nav-item span { display: block; font-size: 10px; }
        .upload-icon { background: linear-gradient(to right, #2af598, #009efd); color: black !important; padding: 4px 12px; border-radius: 8px; }
    </style>
</head>
<body>

<div id="feedSection"></div>

<div class="bottom-nav">
    <a href="dashboard.html" class="nav-item active"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="friends.html" class="nav-item"><i class="fas fa-users"></i><span>Friends</span></a>
    <div class="nav-item" onclick="window.location.href='create-post.html'"><i class="fas fa-plus upload-icon"></i></div>
    <a href="chats.html" class="nav-item"><i class="fas fa-comment-dots"></i><span>Inbox</span></a>
    <a href="profile.html" class="nav-item"><i class="fas fa-user"></i><span>Profile</span></a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot, doc, updateDoc, arrayUnion, arrayRemove, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA6Ce7cEDzcxOoEyh5Swl3wFx7ju-Up00k",
        authDomain: "auwalmdtech.firebaseapp.com",
        projectId: "auwalmdtech",
        storageBucket: "auwalmdtech.firebasestorage.app",
        messagingSenderId: "202329584080",
        appId: "1:202329584080:web:e989d7df53d3c3024609d5"
    };

    const db = getFirestore(initializeApp(firebaseConfig));
    const currentUser = JSON.parse(localStorage.getItem('amd_user'));

    // Intersection Observer to handle Auto-play/Pause
    const observerOptions = { threshold: 0.7 };
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            const video = entry.target.querySelector('video');
            if (video) {
                if (entry.isIntersecting) {
                    video.play().catch(() => {}); // Play when visible
                } else {
                    video.pause(); // Stop when hidden
                    video.currentTime = 0; // Reset
                }
            }
        });
    }, observerOptions);

    onSnapshot(query(collection(db, "posts"), orderBy("createdAt", "desc")), (snapshot) => {
        const feed = document.getElementById('feedSection');
        feed.innerHTML = "";
        snapshot.forEach((pDoc) => {
            const post = pDoc.data();
            const pid = pDoc.id;
            const isLiked = post.likes?.includes(currentUser?.phone);

            const card = document.createElement('div');
            card.className = 'post-card';
            card.innerHTML = `
                ${post.type === 'video' ? 
                    `<video src="${post.fileUrl}" class="post-media" loop playsinline></video>
                     <div class="play-pause-icon"><i class="fas fa-play"></i></div>
                     <div class="video-overlay">
                        <div class="side-touch" onclick="handleTap(event, '${pid}', 'left')"></div>
                        <div class="side-touch" onclick="handleTap(event, '${pid}', 'right')"></div>
                     </div>` : 
                    `<img src="${post.fileUrl}" class="post-media">`
                }
                <div class="side-actions">
                    <div class="profile-container" onclick="window.location.href='profile.html?id=${post.phone}'">
                        <img src="${post.userPhoto || 'logo.jpg'}" class="profile-img">
                        <div class="follow-plus"><i class="fas fa-plus"></i></div>
                    </div>
                    <div class="action-btn" onclick="likePost('${pid}', ${isLiked}, '${post.phone}')">
                        <i class="fas fa-heart" style="color: ${isLiked ? '#fe2c55' : 'white'}"></i>
                        <small>${post.likes ? post.likes.length : 0}</small>
                    </div>
                    <div class="action-btn" onclick="openComments('${pid}')">
                        <i class="fas fa-comment-dots text-white"></i><small>Comment</small>
                    </div>
                    <div class="action-btn"><i class="fas fa-share text-white"></i><small>Share</small></div>
                </div>
                <div class="post-content">
                    <h6 class="fw-bold">@${post.userName}</h6>
                    <p class="small">${post.caption || ""}</p>
                </div>
            `;
            feed.appendChild(card);
            observer.observe(card);
        });
    });

    // Double Tap Logic for Forward/Rewind
    let lastTap = 0;
    window.handleTap = (e, pid, side) => {
        const now = Date.now();
        const video = e.target.closest('.post-card').querySelector('video');
        const icon = e.target.closest('.post-card').querySelector('.play-pause-icon');

        if (now - lastTap < 300) { // Double tap detected
            if (side === 'right') video.currentTime += 10;
            else video.currentTime -= 10;
        } else { // Single tap: Play/Pause
            if (video.paused) {
                video.play();
                icon.style.opacity = 0;
            } else {
                video.pause();
                icon.style.opacity = 1;
            }
        }
        lastTap = now;
    };

    window.likePost = async (id, liked, owner) => {
        const ref = doc(db, "posts", id);
        await updateDoc(ref, { likes: liked ? arrayRemove(currentUser.phone) : arrayUnion(currentUser.phone) });
    };
</script>
</body>
</html>
