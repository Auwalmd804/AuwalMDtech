<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RetayaX | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f2027; color: white; font-family: 'Segoe UI', sans-serif; }
        .loader-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#0f2027; z-index:9999; display:flex; justify-content:center; align-items:center; }
        .spinner { width: 50px; height: 50px; border: 5px solid #2c5364; border-top: 5px solid #25d366; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .marquee-container { background: #25d366; color: #000; padding: 8px; font-weight: bold; overflow: hidden; }
        .service-card { background: #1a2a34; border-radius: 15px; padding: 20px; text-align: center; border: 1px solid #2c5364; transition: 0.3s; }
        .service-card:hover { transform: translateY(-10px); border-color: #25d366; cursor: pointer; }
        .service-card img { width: 60px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="loader-overlay" id="loader"><div class="spinner"></div></div>

<div class="d-flex justify-content-between p-3 align-items-center bg-dark">
    <img src="logo.png" width="50" class="rounded-circle">
    <div>
        <button class="btn btn-outline-light btn-sm" onclick="location.href='profile.html'">Profile</button>
        <button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
    </div>
</div>

<div class="marquee-container">
    <marquee>The CEO Auwal MD and Shayibu Ali Baba | Site Active 24/7</marquee>
</div>

<div class="container mt-4">
    <div class="row g-4" id="serviceGrid">
        <script>
            const services = [
                {name: "Sunking", img: "sunking.png"},
                {name: "NIN Device", img: "nin-device.png"},
                {name: "Airtel Reg", img: "airtel-reg.png"},
                {name: "BVN Registration", img: "bvn-reg.png"},
                {name: "WhatsApp Hub", img: "whatsapp-hub.png"},
                {name: "Data Sim", img: "data-sim.png"},
                {name: "Wifi/Router", img: "router-wifi.png"},
                {name: "Product Shop", img: "shop-all.png"},
                {name: "Airtime & Data", img: "airtime-data.png"},
                {name: "SIM Swap", img: "sim-swap.png"},
                {name: "Graphic Design", img: "graphic-design.png"},
                {name: "Service Match", img: "service-match.png"}
            ];

            const grid = document.getElementById('serviceGrid');
            services.forEach(s => {
                grid.innerHTML += `
                    <div class="col-md-3 col-6">
                        <div class="service-card" onclick="location.href='${s.name.toLowerCase().replace(/ /g,'')}.html'">
                            <img src="${s.img}" alt="${s.name}">
                            <h6>${s.name}</h6>
                        </div>
                    </div>`;
            });
        </script>
    </div>
</div>

<script>
    window.onload = () => setTimeout(() => document.getElementById('loader').style.display = 'none', 800);

    function logout() {
        localStorage.removeItem('amd_user');
        window.location.href = "index.html";
    }

    // Check Auth
    if(!localStorage.getItem('amd_user')) window.location.href = "index.html";
</script>
</body>
</html>
