<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auwal MD Chat - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0084ff; --bg: #050505; --card: #121212; }
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; margin-bottom: 70px; }
        
        /* Header Section */
        .header { background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); padding: 15px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #222; }
        .user-pfp-small { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); cursor: pointer; }
        .search-box { background: #1a1a1a; border-radius: 20px; padding: 5px 15px; margin-top: 10px; display: flex; align-items: center; }
        .search-box input { background: transparent; border: none; color: white; width: 100%; padding-left: 10px; font-size: 14px; }
        .search-box input:focus { outline: none; }

        /* TikTok Feed Container */
        #feedSection { height: calc(100vh - 130px); overflow-y: scroll; scroll-snap-type: y mandatory; }
        .video-card { height: 100vh; scroll-snap-align: start; position: relative; background: #000; border-bottom: 2px solid #111; }
        .video-card video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Video Actions (Like, Comment, Follow) */
        .v-actions { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .v-actions i { font-size: 28px; filter: drop-shadow(0 0 5px rgba(0,0,0,0.5)); cursor: pointer; }
        .v-actions span { font-size: 12px; font-weight: bold; }

        /* Bottom Navigation */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #222; }
        .nav-btn { color: #666; text-decoration: none; text-align: center; font-size: 20px; transition: 0.3s; }
        .nav-btn.active { color: var(--primary); }
        .nav-btn span { display: block; font-size: 10px; margin-top: 2px; }

        /* Chat List Styling */
        .chat-row { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #111; text-decoration: none; color: white; }
        .chat-row img { width: 55px; height: 55px; border-radius: 50%; margin-right: 15px; }
    </style>
</head>
<body>

<div class="header">
    <div class="d-flex justify-content-between align-items-center">
        <img id="myPfp" src="" class="user-pfp-small" onclick="window.location.href='profile.html'">
        <h6 class="fw-bold m-0">Auwal MD Chat</h6>
        <i class="fas fa-bell" onclick="alert('No new notifications')"></i>
    </div>
    <div class="search-box">
        <i class="fas fa-search text-muted"></i>
        <input type="text" id="userSearch" placeholder="Search friends to follow..." onkeyup="searchUsers()">
    </div>
</div>

<div id="feedSection">
    </div>

<div id="chatSection" style="display: none;">
    <div id="chatList">
        </div>
</div>

<div class="bottom-nav">
    <a href="javascript:void(0)" class="nav-btn active" onclick="showSection('feed')">
        <i class="fas fa-home"></i><span>Home</span>
    </a>
    <a href="javascript:void(0)" class="nav-btn" onclick="showSection('chats')">
        <i class="fas fa-comment-dots"></i><span>Chats</span>
    </a>
    <a href="upload.html" class="nav-btn">
        <i class="fas fa-plus-circle" style="font-size: 35px; color: var(--primary);"></i>
    </a>
    <a href="profile.html" class="nav-btn">
        <i class="fas fa-user-circle"></i><span>Profile</span>
    </a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA6Ce7cEDzcxOoEyh5Swl3wFx7ju-Up00k",
        authDomain: "auwalmdtech.firebaseapp.com",
        projectId: "auwalmdtech",
        storageBucket: "auwalmdtech.firebasestorage.app",
        messagingSenderId: "202329584080",
        appId: "1:202329584080:web:e989d7df53d3c3024609d5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Setup Local Data
    const me = JSON.parse(localStorage.getItem('amd_user'));
    if(me) document.getElementById('myPfp').src = me.photo;

    // Switch Sections
    window.showSection = function(type) {
        document.getElementById('feedSection').style.display = type === 'feed' ? 'block' : 'none';
        document.getElementById('chatSection').style.display = type === 'chats' ? 'block' : 'none';
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    // Load TikTok Feed
    const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
    onSnapshot(q, (snap) => {
        const feed = document.getElementById('feedSection');
        feed.innerHTML = "";
        snap.forEach(doc => {
            const post = doc.data();
            if(post.type === 'video') {
                feed.innerHTML += `
                    <div class="video-card">
                        <video src="${post.media}" loop onclick="this.paused ? this.play() : this.pause()"></video>
                        <div class="v-actions">
                            <i class="fas fa-heart text-white" onclick="likePost('${doc.id}')"></i><span>${post.likes || 0}</span>
                            <i class="fas fa-comment text-white"></i><span>${post.comments || 0}</span>
                            <i class="fas fa-share text-white"></i>
                        </div>
                        <div style="position:absolute; left:15px; bottom:130px;">
                            <h6 class="fw-bold">@${post.userName}</h6>
                            <p class="small">${post.text}</p>
                        </div>
                    </div>
                `;
            }
        });
    });
</script>
</body>
</html>
