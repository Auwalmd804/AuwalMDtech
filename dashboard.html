<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auwal MD Tech Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00AEEF; --dark: #0f172a; --bg: #f1f5f9; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); }

        /* Nav */
        nav { background: #fff; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo { display: flex; align-items: center; gap: 10px; font-weight: 600; }
        .logo img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--primary); }
        .logout { color: #ff4757; text-decoration: none; font-size: 14px; font-weight: 600; }

        .container { padding: 20px 5%; max-width: 1200px; margin: auto; }

        /* Balance Card */
        .balance-card { background: var(--dark); color: #fff; padding: 25px; border-radius: 20px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .balance-card h1 { font-size: 28px; }
        .deposit-btn { background: var(--primary); color: #fff; padding: 10px 20px; border-radius: 10px; text-decoration: none; font-size: 14px; }

        /* Admin Section (Hidden by default) */
        #adminSection { display: none; background: #fffbeb; border: 2px dashed #f59e0b; padding: 20px; border-radius: 15px; margin-bottom: 25px; }

        /* Services Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; }
        .card { background: #fff; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.03); cursor: pointer; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .card img { width: 45px; margin-bottom: 10px; }
        .card p { font-size: 13px; font-weight: 500; }

        /* WhatsApp Button */
        .whatsapp { position: fixed; bottom: 30px; right: 30px; background: #25D366; width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<nav>

    </div>

    <div class="grid">
        <div class="card"><img src="https://cdn-icons-png.flaticon.com/512/2099/2099201.png"><p>Buy Data</p></div>

</html>
