<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Auwal MD Data</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Poppins', sans-serif; padding-bottom: 80px; }
        .header-bg {
            background: #1e3c72;
            height: 160px;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            padding: 20px;
            color: white;
        }

        /* Wallet Card */
        .wallet-card {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border-radius: 20px;
            padding: 25px;
            margin-top: -60px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        /* Monnify Box */
        .monnify-box {
            background: white;
            border-radius: 15px;
            padding: 15px;
            margin-top: 20px;
            border-left: 5px solid #25d366;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* Service Icons */
        .service-box {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
            border: 1px solid #eee;
            height: 100%;
        }
        .service-box:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .service-box i { font-size: 30px; margin-bottom: 10px; }
        
        .icon-data { color: #0084ff; }
        .icon-airtime { color: #28a745; }
        .icon-nin { color: #ffc107; }
        .icon-bvn { color: #dc3545; }

        .footer-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            box-shadow: 0 -2px 15px rgba(0,0,0,0.1);
            z-index: 1000;
        }
        .footer-nav a { color: #888; text-decoration: none; font-size: 12px; text-align: center; }
        .footer-nav a.active { color: #1e3c72; font-weight: bold; }
        .loader-sm { width: 15px; height: 15px; border: 2px solid #f3f3f3; border-top: 2px solid #1e3c72; border-radius: 50%; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="header-bg">
    <div class="d-flex justify-content-between align-items-center">
        <div>
            <h5 id="welcomeName" class="mb-0">Loading...</h5>
            <small class="opacity-75">Professional Data Services</small>
        </div>
        <img src="Image_1.png" style="width: 45px; height: 45px; border-radius: 50%; border: 2px solid white; object-fit: cover;">
    </div>
</div>

<div class="container">
    <div class="wallet-card text-center">
        <small class="opacity-75">Available Balance</small>
        <h2 class="fw-bold my-1" id="userBalance">₦0.00</h2>
        <div class="d-flex gap-2 mt-3">
            <button class="btn btn-light btn-sm w-100 fw-bold" onclick="toggleMonnify()"><i class="fas fa-plus-circle"></i> Fund Wallet</button>
            <button class="btn btn-outline-light btn-sm w-100" onclick="location.href='notifications.html'"><i class="fas fa-history"></i> History</button>
        </div>
    </div>

    <div id="monnifyArea" class="monnify-box" style="display: none;">
        <h6 class="fw-bold text-dark mb-2 small"><i class="fas fa-university text-success"></i> Instant Funding Account</h6>
        <div id="monnifyLoading" class="text-center py-2" style="display:none;">
            <div class="loader-sm"></div> <span class="small">Generating Account...</span>
        </div>
        <div id="accountDisplay">
            <div class="d-flex justify-content-between small border-bottom py-1">
                <span class="text-muted">Bank:</span>
                <span class="fw-bold" id="bankName">---</span>
            </div>
            <div class="d-flex justify-content-between small border-bottom py-1">
                <span class="text-muted">Acc No:</span>
                <span class="fw-bold text-primary" id="userAccNo">---</span>
            </div>
            <div class="d-flex justify-content-between small py-1">
                <span class="text-muted">Name:</span>
                <span class="fw-bold" id="userAccName">---</span>
            </div>
        </div>
        <p class="text-danger mb-0 mt-2" style="font-size: 10px;">* Note: ₦50 charges applied per transfer.</p>
    </div>

    <div class="row mt-4 g-3">
        <div class="col-6">
            <div class="service-box shadow-sm" onclick="location.href='buy-data.html'">
                <i class="fas fa-wifi icon-data"></i>
                <div class="fw-bold small">Buy Data</div>
            </div>
        </div>
        <div class="col-6">
            <div class="service-box shadow-sm" onclick="location.href='buy-airtime.html'">
                <i class="fas fa-mobile-alt icon-airtime"></i>
                <div class="fw-bold small">Airtime</div>
            </div>
        </div>
        <div class="col-6">
            <div class="service-box shadow-sm" onclick="location.href='nin-slip.html'">
                <i class="fas fa-id-card icon-nin"></i>
                <div class="fw-bold small">NIN Slip</div>
            </div>
        </div>
        <div class="col-6">
            <div class="service-box shadow-sm" onclick="location.href='bvn-slip.html'">
                <i class="fas fa-university icon-bvn"></i>
                <div class="fw-bold small">BVN Slip</div>
            </div>
        </div>
    </div>
</div>

<div class="footer-nav">
    <a href="dashboard.html" class="active"><i class="fas fa-home d-block fa-lg mb-1"></i>Home</a>
    <a href="profile.html"><i class="fas fa-user d-block fa-lg mb-1"></i>Profile</a>
    <a href="notifications.html"><i class="fas fa-bell d-block fa-lg mb-1"></i>Alerts</a>
    <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt d-block fa-lg mb-1"></i>Logout</a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA6Ce7cEDzcxOoEyh5Swl3wFx7ju-Up00k",
        authDomain: "auwalmdtech.firebaseapp.com",
        projectId: "auwalmdtech",
        storageBucket: "auwalmdtech.firebasestorage.app",
        messagingSenderId: "202329584080",
        appId: "1:202329584080:web:e989d7df53d3c3024609d5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const userData = JSON.parse(localStorage.getItem('amd_user'));

    // --- MONNIFY SETTINGS ---
    const API_KEY = "MK_TEST_MPZR1JRFP0";
    const SECRET_KEY = "8SCYPRY5LM7E3KSB5C95YJ01TP53CPL0";
    const CONTRACT = "7031639441";

    if(!userData) {
        window.location.href = "index.html";
    } else {
        document.getElementById('welcomeName').innerText = "Welcome, " + userData.name;
        
        const userRef = doc(db, "users", userData.phone);
        onSnapshot(userRef, (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                const bal = parseFloat(data.balance) || 0;
                document.getElementById('userBalance').innerText = "₦" + bal.toLocaleString(undefined, {minimumFractionDigits: 2});
            }
        });
    }

    async function getMonnifyToken() {
        const base64Auth = btoa(API_KEY + ":" + SECRET_KEY);
        const response = await fetch("https://sandbox.monnify.com/api/v1/auth/login", {
            method: 'POST',
            headers: { 'Authorization': 'Basic ' + base64Auth }
        });
        const json = await response.json();
        return json.responseBody.accessToken;
    }

    window.toggleMonnify = async function() {
        const area = document.getElementById('monnifyArea');
        if(area.style.display === 'block') { area.style.display = 'none'; return; }
        
        area.style.display = 'block';
        document.getElementById('monnifyLoading').style.display = 'block';
        document.getElementById('accountDisplay').style.display = 'none';

        try {
            const token = await getMonnifyToken();
            const response = await fetch("https://sandbox.monnify.com/api/v1/bank-transfer/reserved-accounts", {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + token,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    "accountReference": userData.phone + "_ref",
                    "accountName": "AMD-" + userData.name,
                    "currencyCode": "NGN",
                    "contractCode": CONTRACT,
                    "customerEmail": userData.phone + "@auwaldata.com",
                    "customerName": userData.name,
                    "getAllAvailableBanks": true
                })
            });
            const data = await response.json();
            if(data.requestSuccessful) {
                const acc = data.responseBody.accounts[0];
                document.getElementById('bankName').innerText = acc.bankName;
                document.getElementById('userAccNo').innerText = acc.accountNumber;
                document.getElementById('userAccName').innerText = acc.accountName;
            }
        } catch (e) {
            document.getElementById('userAccNo').innerText = "Error Loading";
        } finally {
            document.getElementById('monnifyLoading').style.display = 'none';
            document.getElementById('accountDisplay').style.display = 'block';
        }
    }

    window.logout = function() {
        localStorage.clear();
        window.location.href = "index.html";
    }
</script>
</body>
</html>
