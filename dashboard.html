<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RetayaX - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        /* GYARAN KALA ZUWA FARI (QUARKAXIS STYLE) */
        body { 
            background: #ffffff; 
            color: #333; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* --- LOADING SCREEN --- */
        #loader {
            position: fixed;
            inset: 0;
            background: #ffffff;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .loader-spinner {
            position: absolute;
            width: 90px;
            height: 90px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #25d366;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- LOGO --- */
        .waving-logo {
            width: 40px;
            height: 40px;
            object-fit: contain;
            border-radius: 50%;
            border: 2px solid #25d366;
            background: white;
        }

        /* --- NAVBAR & MENU FIX --- */
        .navbar { 
            background: #ffffff !important; 
            border-bottom: 1px solid #eee;
            z-index: 1050; /* Tabbatar da menu yana sama */
        }
        .navbar span { color: #333 !important; }
        .navbar-toggler { 
            border-color: #25d366 !important; 
            background-color: #f8f9fa;
        }
        .navbar-toggler-icon {
            filter: invert(0); /* Baki zai fito a fari */
        }

        /* --- THE ANIMATED LOGIN/REGISTER BUTTON --- */
        .login-btn-container {
            width: 92%;
            margin: 10px auto;
            max-width: 500px;
        }
        .login-btn {
            width: 100%;
            background: linear-gradient(45deg, #25d366, #128c7e);
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            text-decoration: none;
            display: block;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
            animation: pulse-animation 2s infinite; /* Animation din nan */
        }
        @keyframes pulse-animation {
            0% { transform: scale(1); box-shadow: 0 0 0 0px rgba(37, 211, 102, 0.7); }
            70% { transform: scale(1.02); box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0px rgba(37, 211, 102, 0); }
        }

        /* --- TOP BANNER --- */
        .top-banner {
            background: #fff;
            border-radius: 15px;
            margin: 5px auto;
            border: 1px solid #25d366;
            overflow: hidden;
            width: 92%;
            max-width: 500px;
            cursor: pointer;
        }
        .top-banner img { width: 100%; height: auto; display: block; }

        /* --- SERVICE CARDS --- */
        .service-card { 
            background: #fdfdfd; 
            border-radius: 12px; 
            padding: 8px; 
            text-align: center; 
            border: 1px solid #eaeaea; 
            height: 105px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }
        .service-card img { height: 42px; width: auto; margin-bottom: 6px; }
        .service-card h6 { font-size: 0.65rem; color: #444; margin: 0; font-weight: 600; }

        .wa-btn { position: fixed; bottom: 80px; right: 20px; background: #25d366; color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; justify-content: center; align-items: center; z-index: 1000; text-decoration: none; font-size: 24px; }
        footer { padding: 12px; text-align: center; color: #888; font-size: 12px; margin-top: auto; }
        .offcanvas { background: #ffffff; color: #333; }
        .offcanvas-title { color: #333 !important; }
    </style>
</head>
<body>

<div id="loader">
    <div class="loader-spinner"></div>
    <div class="loading-text" style="margin-top: 110px; color: #25d366; font-weight: bold;">RE-TAYAX PROCESSING...</div>
</div>

<nav class="navbar navbar-light p-3 shadow-sm">
    <div class="container-fluid d-flex justify-content-between align-items-center">
        <img src="logo.png" class="waving-logo" alt="Logo">
        <span class="fw-bold">Welcome to RetayaX</span>
        <!-- GYARAN MENU BUTTON -->
        <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>
    </div>
</nav>

<div class="offcanvas offcanvas-end" id="menu">
    <div class="offcanvas-header">
        <h5 class="offcanvas-title">Menu Options</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
        <a href="transactions.html" class="btn btn-outline-success w-100 mb-3 py-2">Transaction History</a>
        <a href="https://wa.me/2348164712102" class="btn btn-success w-100 mb-3 py-2">Contact Support</a>
    </div>
</div>

<marquee class="bg-success text-white fw-bold p-1">CEO Auwal MD & Shayibu Ali Baba | Site Active 24/7</marquee>

<!-- ANIMATED LOGIN BUTTON -->
<div class="login-btn-container">
    <a href="https://retayax.quark.ng" class="login-btn">
        <i class="fas fa-user-circle"></i> LOGIN / REGISTER TO ACCOUNT
    </a>
</div>

<div class="top-banner" onclick="window.location.href='https://retayax.quark.ng'">
    <img src="all-in-one.png" alt="All-in-one Digital Service">
</div>

<div class="container-fluid mt-2">
    <div class="row g-2" id="grid"></div>
</div>

<a href="https://wa.me/2348164712102" target="_blank" class="wa-btn"><i class="fab fa-whatsapp"></i></a>
<footer>&copy; 2026 RetayaX - All Rights Reserved</footer>

<!-- SCRIPTS TSAYAYYU -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const services = [
        {name: "Sunking", img: "sunking.png"},
        {name: "NIN Device", img: "nin-device.png"},
        {name: "Airtel Reg", img: "airtel-reg.png"},
        {name: "BVN Registration", img: "bvn-reg.png"},
        {name: "WhatsApp Hub", img: "whatsapp-hub.png"},
        {name: "Data Sim", img: "data-sim.png"},
        {name: "Wifi/Router", img: "router-wifi.png"},
        {name: "Product Shop", img: "shop-all.png"},
        {name: "SIM Swap", img: "sim-swap.png"},
        {name: "Graphic Design", img: "graphic-design.png"},
        {name: "Service Match", img: "service-match.png"}
    ];

    const grid = document.getElementById('grid');
    services.forEach(s => {
        let fileLink = s.name.toLowerCase().replace(/ /g,'').replace('/','');
        grid.innerHTML += `
            <div class="col-4">
                <div class="service-card" onclick="location.href='${fileLink}.html'">
                    <img src="${s.img}" alt="${s.name}">
                    <h6 class="text-truncate">${s.name}</h6>
                </div>
            </div>`;
    });

    window.onload = () => {
        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
        }, 1200);
    };
</script>
</body>
</html>
