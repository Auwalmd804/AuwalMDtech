<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Auwal MD Tech</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #00AEEF; --dark: #0f172a; --bg: #f1f5f9; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); padding: 15px; }
        .card { background: var(--dark); color: white; padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 20px; }
        .balance-label { font-size: 14px; opacity: 0.8; }
        .balance-amount { font-size: 32px; font-weight: bold; margin: 5px 0; }
        
        .bank-card { background: white; padding: 15px; border-radius: 15px; border: 1px dashed var(--primary); margin-bottom: 20px; }
        .bank-label { font-size: 11px; color: #64748b; text-transform: uppercase; }
        
        .buy-section { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h3 { margin-bottom: 15px; color: var(--dark); font-size: 16px; }
        select, input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #e2e8f0; border-radius: 10px; outline: none; }
        
        .btn-buy { background: var(--primary); color: white; width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-logout { background: transparent; color: #ef4444; border: none; margin-top: 20px; width: 100%; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <p class="balance-label">Available Balance</p>
        <h1 id="userBalance" class="balance-amount">₦0.00</h1>
        <p id="userEmailDisplay" style="font-size: 12px; color: #10b981;"></p>
    </div>

    <div class="bank-card">
        <p class="bank-label"><i class="fas fa-university"></i> Funding Account (Auto-Wallet)</p>
        <h4 id="bankName" style="margin-top: 5px; color: #334155;">Setting up Bank...</h4>
        <h2 id="accNo" style="color: var(--primary); letter-spacing: 1px; margin: 5px 0;">Generating...</h2>
        <p id="accName" style="font-size: 12px; font-weight: bold; color: #475569;"></p>
    </div>

    <div class="buy-section">
        <h3><i class="fas fa-bolt" style="color: #fbbf24;"></i> Quick Buy Data</h3>
        
        <label style="font-size: 12px;">Select Network</label>
        <select id="network">
            <option value="MTN">MTN (SME)</option>
            <option value="GLO">GLO</option>
            <option value="AIRTEL">AIRTEL</option>
            <option value="9MOBILE">9MOBILE</option>
        </select>

        <label style="font-size: 12px;">Select Data Plan</label>
        <select id="plan">
            <option value="260">1GB (SME) - ₦260</option>
            <option value="520">2GB (SME) - ₦520</option>
            <option value="1300">5GB (SME) - ₦1,300</option>
            <option value="2600">10GB (SME) - ₦2,600</option>
        </select>

        <label style="font-size: 12px;">Recipient Phone Number</label>
        <input type="number" id="phone" placeholder="08123456789">

        <button class="btn-buy" id="buyBtn">Purchase Now</button>
        <p id="txStatus" style="text-align: center; font-size: 12px; margin-top: 10px;"></p>
    </div>

    <button class="btn-logout" id="logoutBtn">Logout</button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA6Ce7cEDzcxOoEyh5Swl3wFx7ju-Up00k",
        authDomain: "auwalmdtech.firebaseapp.com",
        projectId: "auwalmdtech",
        storageBucket: "auwalmdtech.firebasestorage.app",
        messagingSenderId: "202329584080",
        appId: "1:202329584080:web:e989d7df53d3c3024609d5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            const userEmail = user.email.toLowerCase();
            document.getElementById("userEmailDisplay").innerText = userEmail;
            
            // Listen for data changes (Balance and Account)
            onSnapshot(doc(db, "auwalmdtech", userEmail), (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById("userBalance").innerText = "₦" + (data.balance || 0).toLocaleString();
                    
                    if (data.accountNumber) {
                        document.getElementById("bankName").innerText = data.bankName || "Wema Bank";
                        document.getElementById("accNo").innerText = data.accountNumber;
                        document.getElementById("accName").innerText = "NAME: AMD-" + (data.fullName || "USER");
                    }
                }
            });
        } else {
            window.location.href = "index.html";
        }
    });

    // Buying Data Logic
    document.getElementById("buyBtn").onclick = async () => {
        const phone = document.getElementById("phone").value;
        const price = Number(document.getElementById("plan").value);
        const status = document.getElementById("txStatus");
        const user = auth.currentUser;

        if (phone.length < 10) return alert("Enter a valid phone number!");

        status.innerText = "Processing...";
        status.style.color = "blue";

        const userRef = doc(db, "auwalmdtech", user.email.toLowerCase());
        const userSnap = await getDoc(userRef);
        const currentBal = userSnap.data().balance || 0;

        if (currentBal < price) {
            status.innerText = "Insufficient Balance!";
            status.style.color = "red";
            return;
        }

        try {
            await updateDoc(userRef, { balance: currentBal - price });
            status.innerText = "Transaction Successful! Data sent to " + phone;
            status.style.color = "green";
            alert("Data Purchase Success!");
        } catch (e) {
            status.innerText = "Error: " + e.message;
            status.style.color = "red";
        }
    };

    document.getElementById("logoutBtn").onclick = () => signOut(auth);
</script>
</body>
</html>
