<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auwal MD Technology - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body { background: #f0f2f5; font-family: 'Poppins', sans-serif; color: #333; }
        .header { background: #fff; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #0d6efd; }
        .logo-img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #0d6efd; }
        
        /* Virtual Debit Card Styling */
        .v-card { 
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); 
            color: white; border-radius: 20px; padding: 25px; 
            position: relative; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            margin-top: 20px; height: 180px;
        }
        .v-card::after { content: ''; position: absolute; top: -50%; right: -20%; width: 200px; height: 200px; background: rgba(255,255,255,0.1); border-radius: 50%; }
        .chip { width: 40px; height: 30px; background: #fbbf24; border-radius: 5px; margin-bottom: 20px; }
        
        .service-card { background: white; border-radius: 15px; padding: 15px; text-align: center; transition: 0.3s; cursor: pointer; border: 1px solid #eee; }
        .service-card:hover { transform: translateY(-5px); border-color: #0d6efd; }
        .net-icon { width: 45px; height: 45px; border-radius: 10px; margin-bottom: 8px; }
        
        #proc-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10000; display: none; align-items: center; justify-content: center; color: white; flex-direction: column; }
        .loader-arrow { font-size: 3.5rem; animation: rotate 1.5s linear infinite; color: #fbbf24; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="proc-overlay">
    <div class="loader-arrow"><i class="fas fa-sync-alt"></i></div>
    <h5 class="mt-3 animate__animated animate__pulse animate__infinite">Processing Request...</h5>
</div>

<div class="header shadow-sm">
    <div class="d-flex align-items-center">
        <img src="Image_1.png" class="logo-img" onerror="this.src='https://via.placeholder.com/45?text=AMD'">
        <div class="ms-2">
            <div class="fw-bold" style="font-size: 14px;">AUWAL MD TECH</div>
            <div style="font-size: 9px; color: #0d6efd;">Premium Digital Services</div>
        </div>
    </div>
    <div onclick="window.location.href='index.html'" class="text-danger fw-bold small cursor-pointer"><i class="fas fa-sign-out-alt"></i> Logout</div>
</div>

<div class="container pb-5">
    <div class="v-card animate__animated animate__fadeIn">
        <div class="d-flex justify-content-between">
            <div class="chip"></div>
            <i class="fab fa-cc-visa fs-2 opacity-50"></i>
        </div>
        <div class="mt-2">
            <small class="opacity-75">Wallet Status</small>
            <h4 class="fw-bold text-uppercase tracking-widest">AUWAL MD</h4>
        </div>
        <div class="d-flex justify-content-between align-items-end mt-2">
            <div style="font-size: 12px;">Valid Thru: 12/29</div>
            <div class="badge bg-warning text-dark px-3">ACTIVE WALLET</div>
        </div>
    </div>

    <h6 class="fw-bold mt-4 mb-3"><i class="fas fa-bolt text-warning"></i> AIRTIME & DATA</h6>
    <div class="row g-2 mb-4">
        <div class="col-3" onclick="openService('MTN')"><div class="service-card"><img src="mtn.png" class="net-icon"><br><small class="fw-bold">MTN</small></div></div>
        <div class="col-3" onclick="openService('Airtel')"><div class="service-card"><img src="airtel.png" class="net-icon"><br><small class="fw-bold">Airtel</small></div></div>
        <div class="col-3" onclick="openService('Glo')"><div class="service-card"><img src="glo.png" class="net-icon"><br><small class="fw-bold">Glo</small></div></div>
        <div class="col-3" onclick="openService('9mobile')"><div class="service-card"><img src="9mobile.png" class="net-icon"><br><small class="fw-bold">9mobile</small></div></div>
    </div>

    <div class="bg-white p-3 rounded-4 shadow-sm mb-4">
        <h6 class="fw-bold text-primary mb-3"><i class="fas fa-id-card me-2"></i>NIN SLIP SERVICES</h6>
        <div class="row g-2 mb-3">
            <div class="col-4"><label class="w-100"><input type="radio" name="nin" value="Standard (N250)" class="d-none" checked><div class="p-2 border rounded text-center small">Standard<br><b>N250</b></div></label></div>
            <div class="col-4"><label class="w-100"><input type="radio" name="nin" value="Premium (N250)" class="d-none"><div class="p-2 border rounded text-center small">Premium<br><b>N250</b></div></label></div>
            <div class="col-4"><label class="w-100"><input type="radio" name="nin" value="Performance (N300)" class="d-none"><div class="p-2 border rounded text-center small text-danger">Fafomas<br><b>N300</b></div></label></div>
        </div>
        <input type="number" id="nin_num" class="form-control mb-2" placeholder="Enter NIN/Phone Number">
        <button onclick="sendOrder('NIN')" class="btn btn-primary w-100 fw-bold">ORDER SLIP</button>
    </div>

    <div class="bg-white p-3 rounded-4 shadow-sm border border-warning">
        <h6 class="fw-bold text-warning mb-3"><i class="fas fa-paint-brush me-2"></i>GRAPHICS DESIGN (N500)</h6>
        <select id="design_type" class="form-select mb-2">
            <option value="Logo Design">Logo Design</option>
            <option value="School Badge">School Badge</option>
            <option value="ID Card Design">ID Card Design</option>
        </select>
        <input type="text" id="design_desc" class="form-control mb-2" placeholder="School/Company Name">
        <button onclick="sendOrder('Design')" class="btn btn-warning w-100 fw-bold">ORDER DESIGN</button>
    </div>
</div>

<div class="modal fade" id="orderModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header"><h5 id="m-title" class="fw-bold"></h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <select id="s-type" class="form-select mb-3"><option>Airtime</option><option>Data</option></select>
                <input type="number" id="s-phone" class="form-control mb-3" placeholder="Phone Number">
                <input type="number" id="s-amt" class="form-control mb-3" placeholder="Amount (N)">
                <button onclick="sendOrder('VTU')" class="btn btn-primary w-100 fw-bold">PROCEED</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let currentNet = "";
    const modal = new bootstrap.Modal('#orderModal');

    function openService(net) {
        currentNet = net;
        document.getElementById('m-title').innerText = net + " Service";
        modal.show();
    }

    function sendOrder(mode) {
        document.getElementById('proc-overlay').style.display = 'flex';
        let msg = "";
        
        setTimeout(() => {
            if(mode === 'VTU') {
                let type = document.getElementById('s-type').value;
                let ph = document.getElementById('s-phone').value;
                let amt = document.getElementById('s-amt').value;
                msg = `HELLO AUWAL MD TECH,\nI want to buy ${currentNet} ${type}.\nAmount: N${amt}\nNumber: ${ph}`;
            } else if(mode === 'NIN') {
                let type = document.querySelector('input[name="nin"]:checked').value;
                let num = document.getElementById('nin_num').value;
                msg = `HELLO AUWAL MD TECH,\nI want to order NIN Slip.\nType: ${type}\nDetails: ${num}`;
            } else {
                let type = document.getElementById('design_type').value;
                let desc = document.getElementById('design_desc').value;
                msg = `HELLO AUWAL MD TECH,\nI want to order ${type} (N500).\nName: ${desc}`;
            }
            window.location.href = `https://wa.me/2349137904300?text=${encodeURIComponent(msg)}`;
        }, 2500);
    }
</script>
</body>
</html>
