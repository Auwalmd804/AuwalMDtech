<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Auwal MD Tech</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00AEEF; --dark: #0f172a; --bg: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); padding-bottom: 50px; }
        
        nav { 
            background: #fff; 
            padding: 15px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
        }
        
        .logo { font-weight: 600; color: var(--dark); font-size: 18px; }
        .logout-btn { 
            color: #ff4757; 
            text-decoration: none; 
            font-size: 13px; 
            font-weight: 600; 
            cursor: pointer; 
            background: #fff1f2; 
            padding: 8px 15px; 
            border-radius: 8px; 
            border: none; 
        }

        .container { padding: 20px 5%; max-width: 800px; margin: auto; }
        
        .wallet-card { 
            background: var(--dark); 
            color: #fff; 
            padding: 30px; 
            border-radius: 20px; 
            margin-bottom: 25px; 
            position: relative;
            overflow: hidden;
        }
        
        .wallet-card p { font-size: 12px; opacity: 0.8; margin-bottom: 5px; }
        .wallet-card h1 { font-size: 35px; margin-bottom: 10px; }
        #dbStatus { font-size: 11px; color: #fbbf24; display: block; }
        
        .welcome-msg { margin-top: 20px; color: #475569; font-size: 15px; }
    </style>
</head>
<body>

<nav>
    <div class="logo">Auwal MD Tech</div>
    <button class="logout-btn" id="logoutBtn">Logout</button>
</nav>

<div class="container">
    <div class="wallet-card">
        <p>Wallet Balance</p>
        <h1 id="userBalance">₦0.00</h1>
        <span id="dbStatus">Connecting to server...</span>
    </div>
    
    <div class="welcome-msg">
        <p>Barka da zuwa dashboard dinka, <span id="userNameDisplay">User</span>.</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA6Ce7cEDzcxOoEyh5Swl3wFx7ju-Up00k",
        authDomain: "auwalmdtech.firebaseapp.com",
        projectId: "auwalmdtech",
        storageBucket: "auwalmdtech.firebasestorage.app",
        messagingSenderId: "202329584080",
        appId: "1:202329584080:web:e989d7df53d3c3024609d5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Logout Function
    document.getElementById("logoutBtn").onclick = () => {
        signOut(auth).then(() => window.location.href = "index.html");
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            const userEmail = user.email.toLowerCase();
            const userDoc = doc(db, "auwalmdtech", userEmail);

            // Saurara ga Database (Real-time listener)
            onSnapshot(userDoc, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    const bal = data.balance || 0;
                    const name = data.fullName || "User";
                    
                    document.getElementById("userBalance").innerText = "₦" + bal.toLocaleString();
                    document.getElementById("userNameDisplay").innerText = name;
                    document.getElementById("dbStatus").innerText = "Status: Connected to " + userEmail;
                    document.getElementById("dbStatus").style.color = "#4ade80"; // Kore (Connected)
                } else {
                    // Wannan shine gyaran idan folder ba ta bude ba tukuna
                    document.getElementById("userBalance").innerText = "₦0.00";
                    document.getElementById("dbStatus").innerText = "Status: Setting up your account... Please wait.";
                    document.getElementById("dbStatus").style.color = "#fbbf24"; // Rawaya (Waiting)
                }
            }, (error) => {
                document.getElementById("dbStatus").innerText = "Error: " + error.message;
                document.getElementById("dbStatus").style.color = "#ff4757"; // Ja (Error)
            });
        } else {
            // Idan ba a yi login ba, koma home
            window.location.href = "index.html";
        }
    });
</script>

</body>
</html>
