<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetayaX Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; font-family: 'Poppins', sans-serif; }
        .sidebar { background: #0f2027; color: white; height: 100vh; padding: 20px; border-top-right-radius: 30px; }
        .logo-small { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #25d366; margin-bottom: 15px; }
        .welcome-box { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-3 sidebar">
            <div class="text-center">
                <img src="logo.png" alt="RetayaX Logo" class="logo-small">
                <h5>RetayaX</h5>
            </div>
            <hr>
            <p id="userName">Welcome, User!</p>
            <div id="adminArea" style="display:none;">
                <button class="btn btn-warning w-100 mb-2">Admin Panel</button>
            </div>
            <button class="btn btn-outline-light w-100" onclick="logout()">Logout</button>
        </div>

        <div class="col-md-9 p-4">
            <div class="welcome-box">
                <h2>Welcome to RetayaX Dashboard</h2>
                <p>Explore the best modern gadgets and tech solutions at your fingertips.</p>
            </div>
            
            <div id="productFeed" class="row">
                <p>Trending products will appear here soon...</p>
            </div>
        </div>
    </div>
</div>

<script type="module">
    const userData = JSON.parse(localStorage.getItem('amd_user'));
    if(!userData) window.location.href = "index.html";

    // Nuna Suna
    document.getElementById('userName').innerText = "Welcome, " + userData.name;

    // Nuna Admin button
    if(userData.role === 'admin') {
        document.getElementById('adminArea').style.display = 'block';
    }

    window.logout = () => {
        localStorage.removeItem('amd_user');
        window.location.href = "index.html";
    }
</script>
</body>
</html>
