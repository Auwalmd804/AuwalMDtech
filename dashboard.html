<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - IM Smart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border-radius: 15px; border: none; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-primary { background-color: #007bff; border: none; border-radius: 10px; padding: 12px; font-weight: bold; }
        .wallet-card { background: linear-gradient(45deg, #007bff, #00d4ff); color: white; }
        .slip-option { border: 2px solid #eee; border-radius: 10px; padding: 10px; cursor: pointer; transition: 0.3s; }
        .slip-option:hover { border-color: #007bff; background: #f0f8ff; }
        input[type="radio"] { display: none; }
        input[type="radio"]:checked + .slip-content { border: 2px solid #007bff; background: #f0f8ff; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold text-dark">Barka da Zuwa, Auwal!</h4>
        <i class="fas fa-bell fs-4 text-muted"></i>
    </div>

    <div class="card wallet-card p-4">
        <div class="small">Adadin Kudinka (Wallet Balance)</div>
        <h2 class="fw-bold">₦5,450.00</h2>
        <div class="d-flex gap-2 mt-2">
            <button class="btn btn-light btn-sm fw-bold">Fund Wallet</button>
            <button class="btn btn-outline-light btn-sm fw-bold">History</button>
        </div>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-6 text-center">
            <div class="card p-3">
                <i class="fas fa-mobile-alt fs-2 text-primary mb-2"></i>
                <div class="small fw-bold">Sayi Airtime</div>
            </div>
        </div>
        <div class="col-6 text-center">
            <div class="card p-3">
                <i class="fas fa-wifi fs-2 text-success mb-2"></i>
                <div class="small fw-bold">Sayi Data</div>
            </div>
        </div>
    </div>

    <div class="card p-4">
        <h5 class="fw-bold text-primary mb-3">
            <i class="fas fa-id-card me-2"></i> NIN Slip & Retrieval
        </h5>
        <form id="ninForm">
            <label class="form-label fw-bold mb-3 text-secondary">Zabi Nau'in Slip Din Da Kake So:</label>
            
            <div class="row g-3 mb-4">
                <div class="col-6 col-md-3">
                    <label class="w-100">
                        <input type="radio" name="slip_type" value="standard" checked>
                        <div class="slip-content p-2 border text-center">
                            <img src="https://via.placeholder.com/60x40?text=Standard" class="mb-1">
                            <div class="small fw-bold">Standard</div>
                            <div class="text-success small">₦180.00</div>
                        </div>
                    </label>
                </div>
                <div class="col-6 col-md-3">
                    <label class="w-100">
                        <input type="radio" name="slip_type" value="regular">
                        <div class="slip-content p-2 border text-center">
                            <img src="https://via.placeholder.com/60x40?text=Regular" class="mb-1">
                            <div class="small fw-bold">Regular</div>
                            <div class="text-success small">₦170.00</div>
                        </div>
                    </label>
                </div>
                <div class="col-6 col-md-3">
                    <label class="w-100">
                        <input type="radio" name="slip_type" value="premium">
                        <div class="slip-content p-2 border text-center">
                            <img src="https://via.placeholder.com/60x40?text=Premium" class="mb-1">
                            <div class="small fw-bold">Premium</div>
                            <div class="text-success small">₦200.00</div>
                        </div>
                    </label>
                </div>
                <div class="col-6 col-md-3">
                    <label class="w-100">
                        <input type="radio" name="slip_type" value="info">
                        <div class="slip-content p-2 border text-center">
                            <img src="https://via.placeholder.com/60x40?text=Info" class="mb-1">
                            <div class="small fw-bold">Information</div>
                            <div class="text-success small">₦160.00</div>
                        </div>
                    </label>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Saka Lambar Waya ko NIN</label>
                <input type="number" class="form-control" placeholder="080XXXXXXXX" required>
            </div>

            <div class="form-check mb-4">
                <input class="form-check-input" type="checkbox" id="agree" required>
                <label class="form-check-label small" for="agree">Na yarda cewa bayanan nan nawa ne ko kuma na samu izini.</label>
            </div>

            <button type="submit" class="btn btn-primary w-100">FITAR DA SLIP YANZU</button>
        </form>
    </div>

</div>

<nav class="fixed-bottom bg-white border-top p-2 d-flex justify-content-around">
    <div class="text-center text-primary"><i class="fas fa-home"></i><div class="small">Home</div></div>
    <div class="text-center text-muted"><i class="fas fa-history"></i><div class="small">Transactions</div></div>
    <div class="text-center text-muted"><i class="fas fa-user"></i><div class="small">Profile</div></div>
</nav>

</body>
</html>
