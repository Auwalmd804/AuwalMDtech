<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auwal MD Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #fdfdfd; font-family: 'Segoe UI', sans-serif; }
        .app-bar { background: #075e54; color: white; padding: 15px; position: sticky; top: 0; z-index: 1000; }
        .tab-bar { background: #075e54; display: flex; justify-content: space-around; padding-bottom: 5px; color: rgba(255,255,255,0.7); font-weight: bold; font-size: 14px; position: sticky; top: 55px; z-index: 999; }
        .tab-item { padding: 10px; cursor: pointer; border-bottom: 3px solid transparent; }
        .tab-active { color: white; border-bottom: 3px solid white; }
        
        .chat-list { padding: 10px 0; }
        .chat-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #f2f2f2; transition: 0.3s; cursor: pointer; text-decoration: none; color: black; }
        .chat-item:hover { background: #f9f9f9; }
        .user-img { width: 55px; height: 55px; border-radius: 50%; background: #ddd; margin-right: 15px; }
        .chat-info { flex: 1; }
        .chat-name { font-weight: bold; font-size: 16px; margin-bottom: 2px; }
        .chat-last-msg { color: gray; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
        .chat-time { font-size: 11px; color: #25d366; }

        .fab { position: fixed; bottom: 30px; right: 20px; width: 60px; height: 60px; background: #25d366; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer; }
    </style>
</head>
<body>

<div class="app-bar d-flex justify-content-between align-items-center">
    <div class="d-flex align-items-center">
        <img id="myPfp" src="" style="width:35px; height:35px; border-radius:50%; margin-right:10px; border:2px solid white;">
        <h4 id="myName" class="mb-0 fw-bold" style="font-size:18px;">Auwal MD Chat</h4>
    </div>
    <div>
        <i class="fas fa-search me-3"></i>
        <i class="fas fa-ellipsis-v"></i>
    </div>
</div>

<script>
    // Karanto bayanan daga LocalStorage
    document.getElementById('myName').innerText = localStorage.getItem('amd_name') || "AMD Chat";
    document.getElementById('myPfp').src = localStorage.getItem('amd_photo') || "Image_1.png";
</script>
<div class="tab-bar shadow-sm">
    <div class="tab-item" onclick="location.href='feed.html'"><i class="fas fa-users"></i> POSTS</div>
    <div class="tab-item tab-active">CHATS</div>
    <div class="tab-item" onclick="location.href='feed.html'"><i class="fas fa-circle-notch"></i> STATUS</div>
</div>

<div class="chat-list" id="recentChats">
    <a href="chat.html" class="chat-item">
        <div class="user-img d-flex align-items-center justify-content-center text-white" style="background:#075e54">
            <i class="fas fa-users fa-lg"></i>
        </div>
        <div class="chat-info">
            <div class="chat-name">AMD Community Group</div>
            <div class="chat-last-msg">Welcome to the official group chat!</div>
        </div>
        <div class="chat-time">12:45 PM</div>
    </a>

    <div class="chat-item">
        <div class="user-img"><img src="Image_1.png" style="width:100%; border-radius:50%"></div>
        <div class="chat-info">
            <div class="chat-name">Auwal MD (Admin)</div>
            <div class="chat-last-msg">Hello! Barka da shigowa sabon App dina.</div>
        </div>
        <div class="chat-time" style="color:gray">Yesterday</div>
    </div>
</div>

<div class="fab" onclick="alert('New Chat feature coming soon!')">
    <i class="fas fa-comment-alt"></i>
</div>

</body>
</html>
