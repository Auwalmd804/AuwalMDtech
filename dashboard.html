<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Auwal MD Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #0084ff;
            --secondary: #00c6ff;
            --bg-gradient: linear-gradient(180deg, #0f172a 0%, #020617 100%);
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body { 
            background: var(--bg-gradient); 
            color: white; 
            font-family: 'Poppins', sans-serif; 
            margin-bottom: 80px;
            min-height: 100vh;
        }

        .header { 
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(15px); 
            padding: 15px 20px; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .user-pfp-small { 
            width: 42px; height: 42px; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 2px solid var(--primary); 
            box-shadow: 0 0 10px rgba(0, 132, 255, 0.3);
            cursor: pointer;
        }

        .search-box { 
            background: rgba(255, 255, 255, 0.07); 
            border-radius: 12px; 
            padding: 8px 15px; 
            margin-top: 15px; 
            display: flex; 
            align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .search-box input { 
            background: transparent; border: none; color: white; width: 100%; 
            padding-left: 10px; font-size: 14px; 
        }

        .post-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            overflow: hidden;
        }

        .empty-feed {
            height: 60vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #64748b;
        }
        .empty-feed i { font-size: 50px; margin-bottom: 15px; opacity: 0.5; }

        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; 
            background: rgba(15, 23, 42, 0.95); 
            backdrop-filter: blur(15px);
            display: flex; justify-content: space-around; 
            padding: 12px 0; border-top: 1px solid rgba(255,255,255,0.1); 
            z-index: 1000;
        }
        .nav-btn { color: #64748b; text-decoration: none; text-align: center; transition: 0.3s; }
        .nav-btn i { font-size: 20px; }
        .nav-btn span { display: block; font-size: 10px; margin-top: 4px; font-weight: 500; }
        .nav-btn.active { color: var(--primary); }

        .btn-plus-container { position: relative; cursor: pointer; }
        .btn-plus {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            width: 55px; height: 55px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin-top: -35px;
            border: 4px solid #020617;
            box-shadow: 0 10px 20px rgba(0, 132, 255, 0.4);
            color: white; font-size: 24px;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center">
            <img id="myPfp" src="" class="user-pfp-small" onclick="window.location.href='profile.html'">
            <div class="ms-3">
                <small class="text-muted d-block" style="font-size: 10px;">Welcome back,</small>
                <h6 class="fw-bold m-0" id="dashName" style="font-size: 14px;">User</h6>
            </div>
        </div>
        <div class="position-relative">
            <i class="far fa-bell fs-5"></i>
            <span class="position-absolute top-0 start-100 translate-middle p-1 bg-danger border border-light rounded-circle"></span>
        </div>
    </div>
    
    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" placeholder="Search friends or videos...">
    </div>
</div>

<div id="feedSection" class="container mt-3">
    <div class="empty-feed" id="loader">
        <div class="spinner-border text-primary mb-3"></div>
        <p>Loading your feed...</p>
    </div>
</div>

<div class="bottom-nav">
    <a href="dashboard.html" class="nav-btn active">
        <i class="fas fa-home"></i><span>Home</span>
    </a>
    <a href="chats.html" class="nav-btn">
        <i class="fas fa-comment-dots"></i><span>Chats</span>
    </a>
    <div class="btn-plus-container" onclick="window.location.href='create-post.html'">
        <div class="btn-plus"><i class="fas fa-plus"></i></div>
    </div>
    <a href="explore.html" class="nav-btn">
        <i class="fas fa-compass"></i><span>Explore</span>
    </a>
    <a href="profile.html" class="nav-btn">
        <i class="fas fa-user"></i><span>Profile</span>
    </a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA6Ce7cEDzcxOoEyh5Swl3wFx7ju-Up00k",
        authDomain: "auwalmdtech.firebaseapp.com",
        projectId: "auwalmdtech",
        storageBucket: "auwalmdtech.firebasestorage.app",
        messagingSenderId: "202329584080",
        appId: "1:202329584080:web:e989d7df53d3c3024609d5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const user = JSON.parse(localStorage.getItem('amd_user'));
    if(user) {
        document.getElementById('dashName').innerText = user.name;
        document.getElementById('myPfp').src = user.photo || `https://ui-avatars.com/api/?name=${user.name}&background=0084ff&color=fff`;
    }

    // ANAN NA CANZA ALL_POSTS ZUWA POSTS DOMIN YA DAICE DA DATABASE DIN KA
    const postsQuery = query(collection(db, "posts"), orderBy("createdAt", "desc"));
    
    onSnapshot(postsQuery, (snapshot) => {
        const feed = document.getElementById('feedSection');
        feed.innerHTML = "";

        if (snapshot.empty) {
            feed.innerHTML = `
                <div class="empty-feed">
                    <i class="fas fa-photo-video"></i>
                    <p>No posts available yet</p>
                    <button class="btn btn-primary btn-sm rounded-pill px-4" onclick="window.location.href='create-post.html'">
                        Start Posting
                    </button>
                </div>`;
            return;
        }

        snapshot.forEach((doc) => {
            const post = doc.data();
            const postHtml = `
                <div class="post-card">
                    <div class="p-3 d-flex align-items-center">
                        <img src="${post.userPhoto || 'https://via.placeholder.com/40'}" style="width: 35px; height: 35px; border-radius: 50%; border: 1px solid #0084ff; object-fit: cover;">
                        <div class="ms-2">
                            <h6 class="m-0 small fw-bold">${post.userName}</h6>
                            <small class="text-muted" style="font-size: 10px;">Post updated</small>
                        </div>
                    </div>
                    <img src="${post.fileUrl}" class="w-100" style="max-height: 450px; object-fit: cover;">
                    <div class="p-3">
                        <div class="d-flex gap-3 mb-2">
                            <i class="far fa-heart fs-5"></i>
                            <i class="far fa-comment fs-5"></i>
                            <i class="far fa-paper-plane fs-5"></i>
                        </div>
                        <p class="small m-0"><b>${post.userName}</b> ${post.caption || ""}</p>
                    </div>
                </div>
            `;
            feed.innerHTML += postHtml;
        });
    });
</script>

</body>
</html>
