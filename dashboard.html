<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RetayaX Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f2027; color: white; }
        /* Loader */
        .loader { position: fixed; inset: 0; background: #0f2027; z-index: 9999; display: flex; justify-content: center; align-items: center; }
        /* Cards */
        .service-card { background: #1a2a34; border-radius: 20px; padding: 15px; text-align: center; border: 1px solid #2c5364; height: 130px; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.3s; }
        .service-card:active { transform: scale(0.95); }
        .service-card img { height: 60px; width: auto; object-fit: contain; margin-bottom: 8px; }
        .service-card h6 { font-size: 0.75rem; color: #fff; margin: 0; }
        /* Menu */
        .navbar-toggler { border: none; }
        .offcanvas { background: #0f2027; color: white; }
    </style>
</head>
<body>

<div class="loader" id="loader"><div class="spinner-border text-success"></div></div>

<nav class="navbar navbar-dark bg-dark p-3">
    <div class="container-fluid">
        <img src="logo.png" width="40" class="rounded-circle">
        <span class="text-white" id="userName">Hi, User</span>
        <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#menu"><span class="navbar-toggler-icon"></span></button>
    </div>
</nav>

<div class="offcanvas offcanvas-end" id="menu">
    <div class="offcanvas-header"><h5 class="offcanvas-title">Menu</h5><button class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button></div>
    <div class="offcanvas-body">
        <button class="btn btn-outline-light w-100 mb-2" onclick="location.href='profile.html'">Profile</button>
        <button class="btn btn-danger w-100" onclick="logout()">Logout</button>
    </div>
</div>

<marquee class="bg-success text-black fw-bold p-1">The CEO Auwal MD and Shayibu Ali Baba | Site Active 24/7</marquee>

<div class="container-fluid mt-3">
    <div class="row g-2" id="grid"></div>
</div>

<footer class="text-center mt-4 text-muted small">© 2026 RetayaX</footer>

<script type="module">
    // Firebase Data
    const user = JSON.parse(localStorage.getItem('amd_user'));
    if(user) document.getElementById('userName').innerText = "Hi, " + user.name;
    else location.href = "index.html";

    window.logout = () => { localStorage.removeItem('amd_user'); location.href = "index.html"; };

    // Services Grid
    const services = [
        {name: "Sunking", img: "sunking.png"}, {name: "NIN Device", img: "nin-device.png"},
        {name: "Airtel Reg", img: "airtel-reg.png"}, {name: "BVN Registration", img: "bvn-reg.png"},
        {name: "WhatsApp Hub", img: "whatsapp-hub.png"}, {name: "Data Sim", img: "data-sim.png"},
        {name: "Wifi/Router", img: "router-wifi.png"}, {name: "Product Shop", img: "shop-all.png"},
        {name: "Airtime & Data", img: "airtime-data.png"}, {name: "SIM Swap", img: "sim-swap.png"},
        {name: "Graphic Design", img: "graphic-design.png"}, {name: "Service Match", img: "service-match.png"}
    ];

    const grid = document.getElementById('grid');
    services.forEach(s => {
        grid.innerHTML += `<div class="col-4"><div class="service-card" onclick="location.href='${s.name.toLowerCase().replace(/ /g,'')}.html'"><img src="${s.img}"><h6 class="text-truncate">${s.name}</h6></div></div>`;
    });

    window.onload = () => setTimeout(() => document.getElementById('loader').style.display = 'none', 800);
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
