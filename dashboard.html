<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetayaX Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; font-family: 'Poppins', sans-serif; }
        .sidebar { background: #2c5364; color: white; height: 100vh; padding: 20px; }
        .card { border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-3 sidebar">
            <h3>RetayaX</h3>
            <hr>
            <p id="userName">Loading...</p>
            <div id="adminArea" style="display:none;">
                <button class="btn btn-warning w-100 mb-2">Admin Panel</button>
            </div>
            <button class="btn btn-danger w-100" onclick="logout()">Logout</button>
        </div>

        <div class="col-md-9 p-4">
            <h2>Kasuwar Kayan Zamani</h2>
            <div id="productFeed" class="row">
                <p>Ana ɗauko kayayyaki...</p>
            </div>
        </div>
    </div>
</div>

<script type="module">
    // 1. Duba login
    const userData = JSON.parse(localStorage.getItem('amd_user'));
    if(!userData) window.location.href = "index.html";

    document.getElementById('userName').innerText = "Sannu, " + userData.name;

    // 2. Nuna Admin Panel idan role ɗinsa admin ne
    if(userData.role === 'admin') {
        document.getElementById('adminArea').style.display = 'block';
    }

    // 3. Logout function
    window.logout = () => {
        localStorage.removeItem('amd_user');
        window.location.href = "index.html";
    }
</script>
</body>
</html>
