<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RetayaX | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f2027; color: white; margin: 0; min-height: 100vh; display: flex; flex-direction: column; }
        .marquee-container { background: #25d366; color: #000; padding: 5px; font-weight: bold; }
        .service-card { background: #1a2a34; border-radius: 10px; padding: 15px; text-align: center; border: 1px solid #2c5364; transition: 0.2s; height: 100%; }
        .service-card img { width: 50px; margin-bottom: 10px; }
        .service-card h6 { font-size: 0.85rem; margin-top: 5px; }
        footer { margin-top: auto; padding: 20px; text-align: center; color: rgba(255,255,255,0.3); font-size: 12px; }
    </style>
</head>
<body>

<div class="d-flex justify-content-between p-2 align-items-center bg-dark">
    <img src="logo.png" width="40" class="rounded-circle">
    <div>
        <button class="btn btn-sm btn-outline-light" onclick="location.href='profile.html'">Profile</button>
        <button class="btn btn-sm btn-danger" onclick="logout()">Logout</button>
    </div>
</div>

<div class="marquee-container">
    <marquee>The CEO Auwal MD and Shayibu Ali Baba | Site Active 24/7</marquee>
</div>

<div class="container-fluid mt-3">
    <div class="row g-2" id="serviceGrid">
        </div>
</div>

<footer>&copy; 2026 RetayaX - All Rights Reserved</footer>

<script>
    const services = [
        {name: "Sunking", img: "sunking.png"}, {name: "NIN Device", img: "nin-device.png"},
        {name: "Airtel Reg", img: "airtel-reg.png"}, {name: "BVN Registration", img: "bvn-reg.png"},
        {name: "WhatsApp Hub", img: "whatsapp-hub.png"}, {name: "Data Sim", img: "data-sim.png"},
        {name: "Wifi/Router", img: "router-wifi.png"}, {name: "Product Shop", img: "shop-all.png"},
        {name: "Airtime & Data", img: "airtime-data.png"}, {name: "SIM Swap", img: "sim-swap.png"},
        {name: "Graphic Design", img: "graphic-design.png"}, {name: "Service Match", img: "service-match.png"}
    ];

    const grid = document.getElementById('serviceGrid');
    services.forEach(s => {
        grid.innerHTML += `
            <div class="col-4">
                <div class="service-card" onclick="location.href='${s.name.toLowerCase().replace(/ /g,'')}.html'">
                    <img src="${s.img}" alt="${s.name}">
                    <h6>${s.name}</h6>
                </div>
            </div>`;
    });

    function logout() { localStorage.removeItem('amd_user'); location.href = "index.html"; }
    if(!localStorage.getItem('amd_user')) location.href = "index.html";
</script>
</body>
</html>
