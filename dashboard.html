<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auwal MD Tech | Buy Airtime & Data</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00AEEF; --dark: #0f172a; --bg: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--dark); }

        /* Navigation */
        nav { background: #fff; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; }
        .logo { display: flex; align-items: center; gap: 10px; font-weight: 600; }
        .logo img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--primary); }

        .container { padding: 20px 5%; max-width: 800px; margin: auto; }

        /* Wallet */
        .wallet-card { background: var(--dark); color: #fff; padding: 25px; border-radius: 20px; margin-bottom: 25px; }
        .wallet-card h1 { font-size: 28px; margin-top: 5px; }

        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .card { background: #fff; padding: 20px; border-radius: 18px; text-align: center; cursor: pointer; border: 1px solid #f1f5f9; }
        .card i { font-size: 30px; margin-bottom: 10px; display: block; color: var(--primary); }

        /* Modal Styles */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: #fff; width: 100%; max-width: 400px; padding: 25px; border-radius: 25px; position: relative; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 22px; cursor: pointer; color: #94a3b8; }

        .network-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 20px; }
        .network-item { border: 1.5px solid #f1f5f9; padding: 10px; border-radius: 15px; text-align: center; cursor: pointer; }
        .network-item:hover { border-color: var(--primary); background: #f0f9ff; }
        .network-item img { width: 45px; height: 45px; border-radius: 10px; margin-bottom: 5px; }

        /* Form Styles */
        .form-group { margin-top: 20px; text-align: left; }
        label { font-size: 13px; font-weight: 600; color: #64748b; margin-bottom: 8px; display: block; }
        input, select { width: 100%; padding: 12px; border-radius: 12px; border: 1.5px solid #e2e8f0; background: #f8fafc; outline: none; font-size: 14px; }
        input:focus { border-color: var(--primary); }
        .btn-submit { width: 100%; background: var(--primary); color: #fff; padding: 14px; border: none; border-radius: 12px; font-weight: 600; margin-top: 20px; cursor: pointer; }

        .hidden { display: none; }
    </style>
</head>
<body>

<nav>
    <div class="logo"><img src="Image_1.png" alt="Logo"> Auwal MD Tech</div>
    <a href="#" style="color:#ff4757; text-decoration:none; font-size:13px; font-weight:600;">Logout</a>
</nav>

<div class="container">
    <div class="wallet-card">
        <p style="font-size:12px; opacity:0.8;">Wallet Balance</p>
        <h1 id="userBalance">₦0.00</h1>
    </div>

    <h3 style="margin-bottom:15px; font-size:16px;">Services</h3>
    <div class="grid">
        <div class="card" onclick="openStep1('Airtime')">
            <i class="fa-solid fa-phone-volume"></i>
            <p>Buy Airtime</p>
        </div>
        <div class="card" onclick="openStep1('Data')">
            <i class="fa-solid fa-wifi"></i>
            <p>Buy Data</p>
        </div>
    </div>
</div>

<div class="modal" id="serviceModal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        
        <div id="step1">
            <h3 style="text-align:center;" id="modalTitle">Select Network</h3>
            <div class="network-grid">
                <div class="network-item" onclick="openStep2('MTN')">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/9/93/New-mtn-logo.jpg" alt="MTN">
                    <p>MTN</p>
                </div>
                <div class="network-item" onclick="openStep2('Airtel')">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Airtel_logo-01.png/640px-Airtel_logo-01.png" alt="Airtel">
                    <p>Airtel</p>
                </div>
                <div class="network-item" onclick="openStep2('Glo')">
                    <img src="https://upload.wikimedia.org/wikipedia/en/thumb/7/76/Globacom_Limited_Logo.svg/1200px-Globacom_Limited_Logo.svg.png" alt="Glo">
                    <p>Glo</p>
                </div>
                <div class="network-item" onclick="openStep2('9mobile')">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/07/9mobile_logo.png/1200px-9mobile_logo.png" alt="9mobile">
                    <p>9mobile</p>
                </div>
            </div>
        </div>

        <div id="step2" class="hidden">
            <h3 id="formTitle">Buy Airtime</h3>
            <p id="selectedDetails" style="font-size:12px; color:var(--primary); margin-bottom:15px; font-weight:600;"></p>
            
            <div class="form-group">
                <label>Phone Number</label>
                <input type="number" id="phone" placeholder="08012345678">
            </div>

            <div class="form-group" id="amountGroup">
                <label>Amount (₦)</label>
                <input type="number" id="amount" placeholder="Min ₦50">
            </div>

            <div class="form-group hidden" id="dataGroup">
                <label>Select Data Plan</label>
                <select id="dataPlan">
                    <option value="500mb">500MB - ₦150 (30 Days)</option>
                    <option value="1gb">1GB - ₦250 (30 Days)</option>
                    <option value="2gb">2GB - ₦500 (30 Days)</option>
                    <option value="5gb">5GB - ₦1,200 (30 Days)</option>
                </select>
            </div>

            <button class="btn-submit" onclick="processOrder()">Purchase Now</button>
            <p onclick="backToStep1()" style="font-size:12px; text-align:center; margin-top:15px; cursor:pointer; color:#94a3b8;">← Back</p>
        </div>
    </div>
</div>

<script>
    const modal = document.getElementById('serviceModal');
    let serviceType = ""; // Airtime ko Data
    let selectedNet = ""; // MTN, Airtel, etc.

    function openStep1(type) {
        serviceType = type;
        document.getElementById('modalTitle').innerText = "Select " + type + " Network";
        document.getElementById('step1').classList.remove('hidden');
        document.getElementById('step2').classList.add('hidden');
        modal.style.display = "flex";
    }

    function openStep2(network) {
        selectedNet = network;
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.remove('hidden');
        
        document.getElementById('formTitle').innerText = "Buy " + serviceType;
        document.getElementById('selectedDetails').innerText = network + " | " + serviceType;

        if(serviceType === 'Data') {
            document.getElementById('amountGroup').classList.add('hidden');
            document.getElementById('dataGroup').classList.remove('hidden');
        } else {
            document.getElementById('amountGroup').classList.remove('hidden');
            document.getElementById('dataGroup').classList.add('hidden');
        }
    }

    function backToStep1() {
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('step1').classList.remove('hidden');
    }

    function closeModal() { modal.style.display = "none"; }

    function processOrder() {
        const phone = document.getElementById('phone').value;
        if(phone.length < 11) return alert("Please enter a valid phone number");
        
        alert("Processing " + serviceType + " for " + phone + " (" + selectedNet + ")");
        closeModal();
    }

    window.onclick = (e) => { if(e.target == modal) closeModal(); }
</script>

</body>
</html>
