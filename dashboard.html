<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RetayaX - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        /* GYARAN KALA: MUN MAYAR DA SHI FARI DA BAKI KAMAR NA QUARKAXIS */
        body { 
            background: #ffffff; /* Fari radau */
            color: #000000; /* Bakin rubutu */
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* --- LOADING SCREEN --- */
        #loader {
            position: fixed;
            inset: 0;
            background: #ffffff;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .loader-spinner {
            position: absolute;
            width: 90px;
            height: 90px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #28a745;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- NAVIGATION --- */
        .navbar { background: #ffffff !important; border-bottom: 1px solid #ddd; }
        .navbar span { color: #000000 !important; }
        .navbar-toggler { filter: invert(1); } /* Don icon din ya fito a fari */

        .waving-logo {
            width: 40px;
            height: 40px;
            object-fit: contain;
            border-radius: 50%;
            border: 2px solid #28a745;
            box-shadow: 0 0 10px rgba(40, 167, 69, 0.3);
        }

        /* --- BANNER & LINK --- */
        .top-banner {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 0;
            margin: 12px auto;
            border: 1px solid #28a745;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            width: 92%;
            max-width: 500px;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .top-banner img { width: 100%; height: auto; cursor: pointer; }

        /* --- ANIMATED BUTTON (REGISTER/LOGIN) --- */
        .cta-button {
            width: 100%;
            background: #28a745;
            color: white;
            padding: 12px;
            text-align: center;
            font-weight: bold;
            text-decoration: none;
            display: block;
            font-size: 18px;
            animation: glow 2s infinite; /* Animation din da kake so */
            border: none;
        }
        @keyframes glow {
            0% { background-color: #28a745; box-shadow: 0 0 5px #28a745; }
            50% { background-color: #218838; box-shadow: 0 0 20px #28a745; }
            100% { background-color: #28a745; box-shadow: 0 0 5px #28a745; }
        }

        /* --- SERVICE CARDS --- */
        .service-card { 
            background: #ffffff; 
            border-radius: 12px; 
            padding: 8px; 
            text-align: center; 
            border: 1px solid #eee; 
            height: 105px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            transition: 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .service-card:active { transform: scale(0.95); }
        .service-card img { height: 42px; width: auto; margin-bottom: 6px; }
        .service-card h6 { font-size: 0.65rem; color: #333; margin: 0; font-weight: 600; }

        .wa-btn { position: fixed; bottom: 80px; right: 20px; background: #25d366; color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; justify-content: center; align-items: center; z-index: 1000; text-decoration: none; font-size: 24px; }
        footer { padding: 12px; text-align: center; color: #666; font-size: 12px; margin-top: auto; }
    </style>
</head>
<body>

<div id="loader">
    <div class="loader-spinner"></div>
    <div class="loading-text" style="margin-top: 110px; color: #28a745; font-weight: bold;">RE-TAYAX LOADING...</div>
</div>

<nav class="navbar navbar-light p-3 shadow-sm">
    <div class="container-fluid d-flex justify-content-between align-items-center w-100">
        <img src="logo.png" class="waving-logo" alt="Logo">
        <span class="fw-bold">Welcome to RetayaX</span>
        <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>
    </div>
</nav>

<marquee class="bg-success text-white fw-bold p-1">CEO Auwal MD & Shayibu Ali Baba | RetayaX Site is Active 24/7</marquee>

<!-- BANNER SECTION DA LINK A JIKIN HOTON DA KUMA BUTTON -->
<div class="top-banner">
    <div onclick="window.location.href='https://retayax.quark.ng'" style="cursor: pointer; width: 100%;">
        <img src="all-in-one.png" alt="All-in-one Digital Service">
        <div style="padding: 10px; color: #333; font-weight: 500; font-size: 14px; text-align: center;">
            Click Image or Button to Register/Login
        </div>
    </div>
    <!-- WANNAN SHINE ANIMATED BUTTON DIN -->
    <a href="https://retayax.quark.ng" class="cta-button">
        <i class="fas fa-sign-in-alt"></i> REGISTER OR LOGIN HERE
    </a>
</div>

<div class="container-fluid mt-2">
    <div class="row g-2" id="grid"></div>
</div>

<a href="https://wa.me/2348164712102" target="_blank" class="wa-btn"><i class="fab fa-whatsapp"></i></a>
<footer>&copy; 2026 RetayaX - All Rights Reserved</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const services = [
        {name: "Sunking", img: "sunking.png"},
        {name: "NIN Device", img: "nin-device.png"},
        {name: "Airtel Reg", img: "airtel-reg.png"},
        {name: "BVN Registration", img: "bvn-reg.png"},
        {name: "WhatsApp Hub", img: "whatsapp-hub.png"},
        {name: "Data Sim", img: "data-sim.png"},
        {name: "Wifi/Router", img: "router-wifi.png"},
        {name: "Product Shop", img: "shop-all.png"},
        {name: "SIM Swap", img: "sim-swap.png"},
        {name: "Graphic Design", img: "graphic-design.png"},
        {name: "Service Match", img: "service-match.png"}
    ];

    const grid = document.getElementById('grid');
    services.forEach(s => {
        let fileLink = s.name.toLowerCase().replace(/ /g,'').replace('/','');
        grid.innerHTML += `
            <div class="col-4">
                <div class="service-card" onclick="location.href='${fileLink}.html'">
                    <img src="${s.img}" alt="${s.name}">
                    <h6 class="text-truncate">${s.name}</h6>
                </div>
            </div>`;
    });

    window.onload = () => {
        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
        }, 1000);
    };
</script>
</body>
</html>
