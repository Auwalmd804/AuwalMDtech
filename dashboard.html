<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMD Chat - TikTok Feed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: #000; font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* TikTok Vertical Scroll Container */
        #feedSection {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none; /* Hide scrollbar for Firefox */
        }
        #feedSection::-webkit-scrollbar { display: none; } /* Hide scrollbar for Chrome */

        .post-card {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .post-media {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Header Overlays */
        .top-nav {
            position: absolute;
            top: 20px;
            width: 100%;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .bell-container {
            position: relative;
            cursor: pointer;
        }

        #notifBadge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff0050;
            color: white;
            font-size: 10px;
            padding: 2px 5px;
            border-radius: 50%;
            display: none;
        }

        /* TikTok Side Actions */
        .side-actions {
            position: absolute;
            right: 15px;
            bottom: 120px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            z-index: 100;
        }

        .action-btn {
            text-align: center;
            color: white;
            cursor: pointer;
        }

        .action-btn i {
            font-size: 30px;
            margin-bottom: 5px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .action-btn.liked i { color: #ff0050; }

        /* Bottom Info */
        .post-content {
            position: absolute;
            bottom: 100px;
            left: 15px;
            right: 80px;
            color: white;
            z-index: 100;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
        }

        /* Bottom Navbar */
        .bottom-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }
        .nav-item { color: #888; text-decoration: none; font-size: 20px; text-align: center; }
        .nav-item.active { color: white; }
        .nav-item span { display: block; font-size: 10px; }

        .add-btn {
            background: linear-gradient(to right, #2af598 0%, #009efd 100%);
            width: 45px; height: 30px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: black; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="top-nav">
    <h5 class="fw-bold text-white">Following | <span class="border-bottom border-3">For You</span></h5>
    <div class="bell-container" onclick="window.location.href='notifications.html'">
        <i class="far fa-bell fs-4 text-white"></i>
        <span id="notifBadge">0</span>
    </div>
</div>

<div id="feedSection">
    </div>

<div class="bottom-bar">
    <a href="dashboard.html" class="nav-item active"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="explore.html" class="nav-item"><i class="fas fa-compass"></i><span>Explore</span></a>
    <div class="add-btn" onclick="window.location.href='create-post.html'"><i class="fas fa-plus"></i></div>
    <a href="chats.html" class="nav-item"><i class="fas fa-comment-dots"></i><span>Inbox</span></a>
    <a href="profile.html" class="nav-item"><i class="fas fa-user"></i><span>Profile</span></a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot, doc, updateDoc, arrayUnion, arrayRemove, addDoc, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA6Ce7cEDzcxOoEyh5Swl3wFx7ju-Up00k",
        authDomain: "auwalmdtech.firebaseapp.com",
        projectId: "auwalmdtech",
        storageBucket: "auwalmdtech.firebasestorage.app",
        messagingSenderId: "202329584080",
        appId: "1:202329584080:web:e989d7df53d3c3024609d5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const currentUser = JSON.parse(localStorage.getItem('amd_user'));

    // 1. Notification Listener (Bell System)
    if (currentUser) {
        const qNotif = query(collection(db, "notifications"), where("toPhone", "==", currentUser.phone), where("status", "==", "unread"));
        onSnapshot(qNotif, (snap) => {
            const badge = document.getElementById('notifBadge');
            if (snap.size > 0) {
                badge.innerText = snap.size;
                badge.style.display = "block";
            } else {
                badge.style.display = "none";
            }
        });
    }

    // 2. Load TikTok Feed
    const qPosts = query(collection(db, "posts"), orderBy("createdAt", "desc"));
    onSnapshot(qPosts, (snapshot) => {
        const feed = document.getElementById('feedSection');
        feed.innerHTML = "";
        snapshot.forEach((postDoc) => {
            const post = postDoc.data();
            const postId = postDoc.id;
            const isLiked = post.likes && post.likes.includes(currentUser?.phone);

            const media = post.type === 'video' 
                ? `<video src="${post.fileUrl}" class="post-media" loop autoplay muted onclick="this.paused?this.play():this.pause()"></video>`
                : `<img src="${post.fileUrl}" class="post-media">`;

            feed.innerHTML += `
                <div class="post-card">
                    ${media}
                    <div class="side-actions">
                        <div class="action-btn ${isLiked ? 'liked' : ''}" onclick="handleLike('${postId}', ${isLiked}, '${post.phone}')">
                            <i class="fas fa-heart"></i>
                            <small>${post.likes ? post.likes.length : 0}</small>
                        </div>
                        <div class="action-btn">
                            <i class="fas fa-comment-dots"></i>
                            <small>Comment</small>
                        </div>
                        <div class="action-btn">
                            <i class="fas fa-share"></i>
                            <small>Share</small>
                        </div>
                    </div>
                    <div class="post-content">
                        <h6 class="fw-bold">@${post.userName}</h6>
                        <p class="small">${post.caption || ""}</p>
                    </div>
                </div>`;
        });
    });

    // 3. Like & Notification Logic
    window.handleLike = async (postId, currentlyLiked, ownerPhone) => {
        if(!currentUser) return alert("Please Login");
        const postRef = doc(db, "posts", postId);
        
        if (!currentlyLiked) {
            await updateDoc(postRef, { likes: arrayUnion(currentUser.phone) });
            // Send real notification
            if (ownerPhone !== currentUser.phone) {
                await addDoc(collection(db, "notifications"), {
                    toPhone: ownerPhone,
                    fromName: currentUser.name,
                    type: "liked your post",
                    status: "unread",
                    createdAt: serverTimestamp()
                });
            }
        } else {
            await updateDoc(postRef, { likes: arrayRemove(currentUser.phone) });
        }
    };
</script>
</body>
</html>
