<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AMD Chat - Original Build</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --tiktok-red: #fe2c55; --tiktok-blue: #00a2ff; --bg-dark: #050a12; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; overflow: hidden; font-family: sans-serif; }
        
        /* Feed Container */
        #feedSection { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #feedSection::-webkit-scrollbar { display: none; }
        
        .post-card { height: 100vh; width: 100%; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        .post-media { width: 100%; height: 100%; object-fit: contain; z-index: 1; }

        /* Top Bar - Functional Search & Notif */
        .top-nav { position: absolute; top: 0; width: 100%; padding: 45px 20px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 100; background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent); }
        .tabs { display: flex; gap: 15px; font-weight: bold; font-size: 18px; }
        .tabs span { opacity: 0.6; }
        .tabs span.active { opacity: 1; border-bottom: 3px solid white; }
        .top-icons { display: flex; gap: 20px; font-size: 22px; cursor: pointer; }

        /* Sidebar - Interaction Icons */
        .sidebar { position: absolute; right: 12px; bottom: 120px; display: flex; flex-direction: column; align-items: center; gap: 22px; z-index: 100; }
        .profile-btn { position: relative; width: 50px; height: 50px; cursor: pointer; }
        .profile-img { width: 100%; height: 100%; border-radius: 50%; border: 2px solid white; object-fit: cover; }
        .follow-plus { position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); background: var(--tiktok-red); width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid white; font-size: 12px; }

        .action-item { text-align: center; cursor: pointer; }
        .action-item i { font-size: 35px; filter: drop-shadow(0 2px 5px rgba(0,0,0,1)); }
        .action-item span { display: block; font-size: 13px; font-weight: bold; margin-top: 5px; }

        /* Post Info */
        .post-info { position: absolute; bottom: 110px; left: 15px; right: 80px; z-index: 60; text-shadow: 0 1px 4px rgba(0,0,0,0.8); }
        .post-info h6 { font-weight: 800; font-size: 18px; margin-bottom: 5px; }

        /* Bottom Nav - Blue Plus Style */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: var(--bg-dark); border-top: 1px solid #1a222d; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-btn { color: #505d6b; text-decoration: none; text-align: center; font-size: 11px; }
        .nav-btn.active { color: var(--tiktok-blue); }
        .nav-btn i { font-size: 26px; display: block; margin-bottom: 3px; }
        .add-btn { width: 55px; height: 42px; background: var(--tiktok-blue); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; border: 3px solid var(--bg-dark); margin-top: -5px; }
    </style>
</head>
<body>

<div id="loading" class="position-absolute w-100 text-center py-2" style="display:none; z-index:999; top:80px; color:var(--tiktok-blue);"><i class="fas fa-spinner fa-spin"></i> Loading...</div>

<div class="top-nav">
    <i class="fas fa-live fs-4" style="color:#fff"></i>
    <div class="tabs">
        <span>Following</span>
        <span class="active">For You</span>
    </div>
    <div class="top-icons">
        <i class="fas fa-search" onclick="alert('Search feature activated!')"></i>
        <i class="fas fa-bell"></i>
    </div>
</div>

<div id="feedSection">
    </div>

<div class="bottom-nav">
    <a href="dashboard.html" class="nav-btn active"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="friends.html" class="nav-btn"><i class="fas fa-users"></i><span>Friends</span></a>
    <div class="add-btn" onclick="window.location.href='create-post.html'"><i class="fas fa-plus"></i></div>
    <a href="chats.html" class="nav-btn"><i class="fas fa-comment-dots"></i><span>Inbox</span></a>
    <a href="profile.html" class="nav-btn"><i class="fas fa-user"></i><span>Profile</span></a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot, doc, updateDoc, arrayUnion, arrayRemove, getCountFromServer } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyA6Ce7cEDzcxOoEyh5Swl3wFx7ju-Up00k",
        authDomain: "auwalmdtech.firebaseapp.com",
        projectId: "auwalmdtech",
        storageBucket: "auwalmdtech.firebasestorage.app",
        messagingSenderId: "202329584080",
        appId: "1:202329584080:web:e989d7df53d3c3024609d5"
    };

    const db = getFirestore(initializeApp(firebaseConfig));
    const currentUser = JSON.parse(localStorage.getItem('amd_user'));

    // Intersection Observer for Auto-Play/Pause
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(e => {
            const v = e.target.querySelector('video');
            if(v) e.isIntersecting ? v.play() : (v.pause(), v.currentTime=0);
        });
    }, {threshold: 0.7});

    // Main Feed Listener
    onSnapshot(query(collection(db, "posts"), orderBy("createdAt", "desc")), (snap) => {
        const feed = document.getElementById('feedSection');
        feed.innerHTML = "";
        
        if (snap.empty) {
            feed.innerHTML = "<div class='h-100 d-flex align-items-center justify-content-center'><h3>Babu bidiyo tukunna...</h3></div>";
            return;
        }

        snap.forEach(async (pDoc) => {
            const p = pDoc.data();
            const pid = pDoc.id;
            const isLiked = p.likes?.includes(currentUser?.phone);

            // Create Post Element
            const card = document.createElement('div');
            card.className = 'post-card';
            card.innerHTML = `
                <video src="${p.fileUrl}" class="post-media" loop playsinline autoplay muted onclick="this.muted=!this.muted"></video>
                <div class="sidebar">
                    <div class="profile-btn" onclick="window.location.href='profile.html?user=${p.phone}'">
                        <img src="${p.userPhoto || 'logo.jpg'}" class="profile-img">
                        <div class="follow-plus"><i class="fas fa-plus"></i></div>
                    </div>
                    <div class="action-item" onclick="handleLike('${pid}', ${isLiked})">
                        <i class="fas fa-heart" style="color:${isLiked ? '#fe2c55' : 'white'}"></i>
                        <span>${p.likes?.length || 0}</span>
                    </div>
                    <div class="action-item" onclick="alert('Comment box opening...')">
                        <i class="fas fa-comment-dots"></i>
                        <span id="c-${pid}">0</span>
                    </div>
                    <div class="action-item" onclick="handleShare('${p.fileUrl}')">
                        <i class="fas fa-share"></i>
                        <span>Share</span>
                    </div>
                </div>
                <div class="post-info">
                    <h6>@${p.userName || 'User'}</h6>
                    <p>${p.caption || ''}</p>
                </div>
            `;
            feed.appendChild(card);
            observer.observe(card);
            
            // Get Real Comment Count
            const cSnap = await getCountFromServer(collection(db, "posts", pid, "comments"));
            document.getElementById(`c-${pid}`).innerText = cSnap.data().count;
        });
    });

    // Refresh Logic
    let startY = 0;
    document.addEventListener('touchstart', e => startY = e.touches[0].pageY);
    document.addEventListener('touchmove', e => {
        if(e.touches[0].pageY - startY > 150 && window.scrollY === 0) {
            document.getElementById('loading').style.display = 'block';
            setTimeout(() => location.reload(), 1000);
        }
    });

    window.handleLike = async (id, liked) => {
        const ref = doc(db, "posts", id);
        await updateDoc(ref, { likes: liked ? arrayRemove(currentUser.phone) : arrayUnion(currentUser.phone) });
    };

    window.handleShare = (url) => {
        if(navigator.share) navigator.share({title: 'AMD Chat', url});
        else alert("Shared: " + url);
    };
</script>
</body>
</html>
