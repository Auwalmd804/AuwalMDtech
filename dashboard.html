<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Auwal MD Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #0084ff;
            --secondary: #00c6ff;
            /* Wannan kalar ita ce za ta cire bakin kauyen nan */
            --bg-gradient: linear-gradient(180deg, #0f172a 0%, #020617 100%);
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body { 
            background: var(--bg-gradient); 
            color: white; 
            font-family: 'Poppins', sans-serif; 
            margin-bottom: 80px;
            min-height: 100vh;
        }

        /* Header Section */
        .header { 
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(15px); 
            padding: 15px 20px; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .user-pfp-small { 
            width: 42px; height: 42px; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 2px solid var(--primary); 
            box-shadow: 0 0 10px rgba(0, 132, 255, 0.3);
            cursor: pointer;
        }

        /* Modern Search Bar */
        .search-box { 
            background: rgba(255, 255, 255, 0.07); 
            border-radius: 12px; 
            padding: 8px 15px; 
            margin-top: 15px; 
            display: flex; 
            align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .search-box input { 
            background: transparent; border: none; color: white; width: 100%; 
            padding-left: 10px; font-size: 14px; 
        }
        .search-box input::placeholder { color: #64748b; }
        .search-box input:focus { outline: none; }

        /* Empty State (Maimakon baki tsul) */
        .empty-feed {
            height: 60vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #64748b;
        }
        .empty-feed i { font-size: 50px; margin-bottom: 15px; opacity: 0.5; }

        /* Bottom Navigation */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; 
            background: rgba(15, 23, 42, 0.95); 
            backdrop-filter: blur(15px);
            display: flex; justify-content: space-around; 
            padding: 12px 0; border-top: 1px solid rgba(255,255,255,0.1); 
        }
        .nav-btn { color: #64748b; text-decoration: none; text-align: center; transition: 0.3s; }
        .nav-btn i { font-size: 20px; }
        .nav-btn span { display: block; font-size: 10px; margin-top: 4px; font-weight: 500; }
        .nav-btn.active { color: var(--primary); }

        /* Floating Post Button */
        .btn-plus {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            width: 55px; height: 55px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin-top: -30px;
            border: 4px solid #020617;
            box-shadow: 0 10px 20px rgba(0, 132, 255, 0.4);
            color: white; font-size: 24px;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center">
            <img id="myPfp" src="" class="user-pfp-small" onclick="window.location.href='profile.html'">
            <div class="ms-3">
                <small class="text-muted d-block" style="font-size: 10px;">Welcome back,</small>
                <h6 class="fw-bold m-0" id="dashName" style="font-size: 14px;">User</h6>
            </div>
        </div>
        <div class="position-relative">
            <i class="far fa-bell fs-5"></i>
            <span class="position-absolute top-0 start-100 translate-middle p-1 bg-danger border border-light rounded-circle"></span>
        </div>
    </div>
    
    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" placeholder="Search friends or videos...">
    </div>
</div>

<div id="feedSection" class="container mt-3">
    <div class="empty-feed">
        <i class="fas fa-photo-video"></i>
        <p>No posts available yet</p>
        <button class="btn btn-primary btn-sm rounded-pill px-4" onclick="window.location.href='upload.html'">
            Start Posting
        </button>
    </div>
</div>

<div class="bottom-nav">
    <a href="#" class="nav-btn active">
        <i class="fas fa-home"></i><span>Home</span>
    </a>
    <a href="chats.html" class="nav-btn">
        <i class="fas fa-comment-dots"></i><span>Chats</span>
    </a>
    <a href="upload.html" class="nav-btn">
        <div class="btn-plus"><i class="fas fa-plus"></i></div>
    </a>
    <a href="explore.html" class="nav-btn">
        <i class="fas fa-compass"></i><span>Explore</span>
    </a>
    <a href="profile.html" class="nav-btn">
        <i class="fas fa-user"></i><span>Profile</span>
    </a>
</div>

<script>
    // Karanto data
    const user = JSON.parse(localStorage.getItem('amd_user'));
    if(user) {
        document.getElementById('dashName').innerText = user.name;
        // Saka hoton profile ko placeholder
        const pfpImg = user.photo && user.photo !== "https://via.placeholder.com/150" 
            ? user.photo 
            : `https://ui-avatars.com/api/?name=${user.name}&background=0084ff&color=fff`;
        document.getElementById('myPfp').src = pfpImg;
    }
</script>

</body>
</html>
