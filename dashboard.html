<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RetayaX Digital Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f2027; color: white; }
        .nav-logo { height: 50px; }
        .marquee-container { background: #25d366; color: #000; padding: 5px; font-weight: bold; }
        .card { background: #1a2a34; border: 1px solid #2c5364; color: white; transition: 0.3s; }
        .card:hover { transform: scale(1.05); border-color: #25d366; }
        .loader-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#0f2027; z-index:9999; display:flex; justify-content:center; align-items:center; }
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid #25d366; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="loader-overlay" id="loader"><div class="spinner"></div></div>

<div class="d-flex justify-content-between p-3 align-items-center">
    <img src="logo.png" class="nav-logo rounded-circle">
    <div id="userProfile">
        <button class="btn btn-sm btn-outline-light" onclick="window.location.href='profile.html'">Profile</button>
        <button class="btn btn-sm btn-danger" onclick="logout()">Logout</button>
    </div>
</div>

<div class="marquee-container">
    <marquee>The CEO Auwal MD and Shayibu Ali Baba | Site Active 24/7</marquee>
</div>

<div class="container mt-4">
    <div class="row g-3" id="serviceGrid">
        </div>
</div>

<script>
    // Hide Loader
    window.onload = () => document.getElementById('loader').style.display = 'none';

    function logout() {
        localStorage.removeItem('amd_user');
        window.location.href = "index.html";
    }

    // Load User Data
    const user = JSON.parse(localStorage.getItem('amd_user'));
    if(!user) window.location.href = "index.html";
</script>
</body>
</html>
