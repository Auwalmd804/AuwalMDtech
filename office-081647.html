<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMD Chat - Central Admin Console</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --admin-dark: #020617;
            --admin-card: #0f172a;
            --accent: #0084ff;
        }
        body { 
            background: var(--admin-dark); 
            color: white; 
            font-family: 'Inter', sans-serif; 
        }
        .sidebar {
            background: var(--admin-card);
            min-height: 100vh;
            border-right: 1px solid rgba(255,255,255,0.1);
        }
        .stat-card {
            background: var(--admin-card);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .data-table {
            background: var(--admin-card);
            border-radius: 12px;
            overflow: hidden;
        }
        .user-row img {
            width: 35px; height: 35px; border-radius: 50%; object-fit: cover;
        }
        .post-thumb {
            width: 60px; height: 60px; border-radius: 8px; object-fit: cover;
        }
        .btn-danger-custom {
            background: #dc2626; border: none; font-size: 12px; padding: 5px 10px;
        }
        .btn-danger-custom:hover { background: #991b1b; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <main class="col-md-12 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold text-primary"><i class="fas fa-shield-alt"></i> Central Admin Panel</h3>
                <div class="text-end">
                    <small class="text-muted d-block">Admin Logged:</small>
                    <span class="badge bg-primary">08164712102</span>
                </div>
            </div>

            <div class="row g-4 mb-4">
                <div class="col-md-3">
                    <div class="stat-card">
                        <small class="text-muted text-uppercase">Total Users</small>
                        <h2 id="totalUsers">0</h2>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card">
                        <small class="text-muted text-uppercase">Total Posts</small>
                        <h2 id="totalPosts">0</h2>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-4">
                    <div class="data-table p-3">
                        <h5 class="mb-3">User Management</h5>
                        <div id="userContainer" style="max-height: 500px; overflow-y: auto;">
                            </div>
                    </div>
                </div>

                <div class="col-md-6 mb-4">
                    <div class="data-table p-3">
                        <h5 class="mb-3">Content Feed (Post Control)</h5>
                        <div id="postContainer" style="max-height: 500px; overflow-y: auto;">
                            </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA6Ce7cEDzcxOoEyh5Swl3wFx7ju-Up00k",
        authDomain: "auwalmdtech.firebaseapp.com",
        projectId: "auwalmdtech",
        storageBucket: "auwalmdtech.firebasestorage.app",
        messagingSenderId: "202329584080",
        appId: "1:202329584080:web:e989d7df53d3c3024609d5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // SECURITY CHECK: Only your phone number 08164712102 can stay here
    const currentUser = JSON.parse(localStorage.getItem('amd_user'));
    const ADMIN_PHONE = "08164712102";

    if (!currentUser || currentUser.phone !== ADMIN_PHONE) {
        alert("ACCESS DENIED: You are not authorized to view this page.");
        window.location.href = "dashboard.html";
    }

    // Load Users
    onSnapshot(collection(db, "users"), (snapshot) => {
        const container = document.getElementById('userContainer');
        document.getElementById('totalUsers').innerText = snapshot.size;
        container.innerHTML = "";
        snapshot.forEach(d => {
            const u = d.data();
            container.innerHTML += `
                <div class="d-flex align-items-center justify-content-between p-2 border-bottom border-secondary user-row">
                    <div class="d-flex align-items-center">
                        <img src="${u.photo || 'https://ui-avatars.com/api/?name='+u.name}">
                        <div class="ms-2">
                            <div class="small fw-bold">${u.name}</div>
                            <div class="text-muted" style="font-size: 10px;">${u.phone}</div>
                        </div>
                    </div>
                    <button class="btn btn-danger-custom" onclick="deleteUser('${d.id}')">Suspend</button>
                </div>`;
        });
    });

    // Load Posts
    onSnapshot(query(collection(db, "posts"), orderBy("createdAt", "desc")), (snapshot) => {
        const container = document.getElementById('postContainer');
        document.getElementById('totalPosts').innerText = snapshot.size;
        container.innerHTML = "";
        snapshot.forEach(d => {
            const p = d.data();
            const media = p.type === 'video' ? '<div class="post-thumb bg-dark d-flex align-items-center justify-content-center"><i class="fas fa-video"></i></div>' : `<img src="${p.fileUrl}" class="post-thumb">`;
            container.innerHTML += `
                <div class="d-flex align-items-center justify-content-between p-2 border-bottom border-secondary">
                    <div class="d-flex align-items-center">
                        ${media}
                        <div class="ms-2">
                            <div class="small fw-bold">By: ${p.userName}</div>
                            <div class="text-muted text-truncate" style="font-size: 10px; width: 150px;">${p.caption || "No caption"}</div>
                        </div>
                    </div>
                    <button class="btn btn-danger-custom" onclick="deletePost('${d.id}')">Delete Post</button>
                </div>`;
        });
    });

    // Admin Actions
    window.deleteUser = async (id) => {
        if(confirm("Suspend this user permanently?")) {
            await deleteDoc(doc(db, "users", id));
        }
    };

    window.deletePost = async (id) => {
        if(confirm("Remove this content for safety violations?")) {
            await deleteDoc(doc(db, "posts", id));
        }
    };
</script>

</body>
</html>
