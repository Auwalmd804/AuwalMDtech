<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Office - Auwal MD Data</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .admin-header { background: #1a237e; color: white; padding: 20px; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; }
        .user-card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; border-left: 5px solid #1a237e; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .stats-box { background: white; border-radius: 10px; padding: 15px; text-align: center; margin-bottom: 20px; }
        .btn-fund { background: #28a745; color: white; border: none; border-radius: 8px; padding: 5px 15px; font-weight: 600; }
        #auth-lock { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a237e; z-index: 9999; display: flex; align-items: center; justify-content: center; color: white; flex-direction: column; }
    </style>
</head>
<body>

<div id="auth-lock">
    <img src="Image_1.png" style="width: 80px; border-radius: 50%; margin-bottom: 20px;">
    <h4>Admin Access Only</h4>
    <input type="password" id="adminPass" class="form-control w-75 mt-3" placeholder="Enter Admin Password">
    <button class="btn btn-light mt-3" onclick="checkAdmin()">Access Office</button>
</div>

<div class="admin-header">
    <div class="container">
        <h3><i class="fas fa-user-shield"></i> Admin Control Center</h3>
        <p>Manage Users & Financials</p>
    </div>
</div>

<div class="container mt-4">
    <div class="row">
        <div class="col-6">
            <div class="stats-box shadow-sm">
                <h6 class="text-muted">Total Users</h6>
                <h4 id="totalUsers">0</h4>
            </div>
        </div>
        <div class="col-6">
            <div class="stats-box shadow-sm">
                <h6 class="text-muted">Revenue</h6>
                <h4 id="totalRevenue">₦0</h4>
            </div>
        </div>
    </div>

    <h5 class="mb-3">Registered Users</h5>
    <div id="userList">
        <p class="text-center mt-5">Loading users...</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA6Ce7cEDzcxOoEyh5Swl3wFx7ju-Up00k",
        authDomain: "auwalmdtech.firebaseapp.com",
        projectId: "auwalmdtech",
        storageBucket: "auwalmdtech.firebasestorage.app",
        messagingSenderId: "202329584080",
        appId: "1:202329584080:web:e989d7df53d3c3024609d5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 1. Password Protection
    window.checkAdmin = function() {
        const pass = document.getElementById('adminPass').value;
        if(pass === "081647") { // Wannan shine password dinka
            document.getElementById('auth-lock').style.display = 'none';
            loadUsers();
        } else {
            alert("Wrong Admin Password!");
        }
    }

    // 2. Load All Users from Firebase
    function loadUsers() {
        onSnapshot(collection(db, "users"), (snapshot) => {
            const userList = document.getElementById('userList');
            userList.innerHTML = "";
            let total = 0;
            
            snapshot.forEach((userDoc) => {
                const data = userDoc.data();
                total++;
                const card = `
                    <div class="user-card">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="mb-0 fw-bold">${data.name}</h6>
                                <small class="text-muted">${data.phone}</small><br>
                                <span class="badge bg-primary">Balance: ₦${parseFloat(data.balance).toLocaleString()}</span>
                            </div>
                            <button class="btn-fund" onclick="fundUser('${data.phone}')">
                                <i class="fas fa-plus"></i> Fund
                            </button>
                        </div>
                    </div>
                `;
                userList.innerHTML += card;
            });
            document.getElementById('totalUsers').innerText = total;
        });
    }

    // 3. Fund User Wallet Function
    window.fundUser = async function(phone) {
        const amount = prompt("Enter amount to add (e.g 500):");
        if(amount && !isNaN(amount)) {
            const userRef = doc(db, "users", phone);
            try {
                await updateDoc(userRef, {
                    balance: increment(parseFloat(amount))
                });
                alert("₦" + amount + " has been added successfully!");
            } catch (e) {
                alert("Error funding user!");
            }
        }
    }
</script>

</body>
</html>
