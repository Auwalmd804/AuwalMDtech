<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Post - Auwal MD Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #020617; color: white; font-family: 'Poppins', sans-serif; min-height: 100vh; }
        .post-header { background: #0f172a; padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.1); sticky; top: 0; z-index: 100;}
        .preview-box { width: 100%; aspect-ratio: 16/9; background: #1e293b; margin-top: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; border-radius: 10px; cursor: pointer; border: 2px dashed #0084ff; position: relative; }
        .preview-box img, .preview-box video { width: 100%; height: 100%; object-fit: contain; display: none; }
        textarea { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; border-radius: 12px; color: white !important; font-size: 16px; margin-top: 20px; width: 100%; outline: none; resize: none; padding: 15px; }
        .btn-share { background: #0084ff; color: white; font-weight: 600; border-radius: 20px; padding: 5px 25px; border: none; }
        .btn-share:disabled { opacity: 0.5; }
    </style>
</head>
<body>

<div class="post-header">
    <i class="fas fa-times fs-4" onclick="history.back()"></i>
    <h6 class="m-0 fw-bold">New Post</h6>
    <button class="btn-share" id="shareBtn" onclick="uploadPost()">Share</button>
</div>

<div class="container">
    <textarea id="caption" rows="5" placeholder="Me kake tunani? (What's on your mind?)..."></textarea>

    <div class="preview-box" onclick="document.getElementById('postFile').click()">
        <div id="placeholderText" class="text-center">
            <i class="fas fa-photo-video fs-1 mb-2 text-primary"></i>
            <p class="m-0 small text-muted">Zabi Hoto ko Bidiyo (Optional)</p>
        </div>
        <img id="postPreview">
        <video id="videoPreview" controls></video>
    </div>
    <input type="file" id="postFile" hidden accept="image/*,video/*" onchange="previewMedia(event)">
    <p class="text-center text-muted mt-2" style="font-size: 12px;">Zaka iya yin posting rubutu kawai idan baka zabi hoto ba.</p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA6Ce7cEDzcxOoEyh5Swl3wFx7ju-Up00k",
        authDomain: "auwalmdtech.firebaseapp.com",
        projectId: "auwalmdtech",
        storageBucket: "auwalmdtech.firebasestorage.app",
        messagingSenderId: "202329584080",
        appId: "1:202329584080:web:e989d7df53d3c3024609d5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.previewMedia = function(event) {
        const file = event.target.files[0];
        const img = document.getElementById('postPreview');
        const vid = document.getElementById('videoPreview');
        const placeholder = document.getElementById('placeholderText');

        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                if (file.type.startsWith('video')) {
                    vid.src = e.target.result;
                    vid.style.display = 'block';
                    img.style.display = 'none';
                } else {
                    img.src = e.target.result;
                    img.style.display = 'block';
                    vid.style.display = 'none';
                }
                placeholder.style.display = 'none';
            }
            reader.readAsDataURL(file);
        }
    }

    window.uploadPost = async function() {
        const fileInput = document.getElementById('postFile');
        const caption = document.getElementById('caption').value;
        const shareBtn = document.getElementById('shareBtn');
        const user = JSON.parse(localStorage.getItem('amd_user'));

        // Idan babu rubutu kuma babu hoto, kar a barshi ya yi posting
        if (!caption.trim() && !fileInput.files[0]) { 
            alert("Don Allah rubuta wani abu ko ka zabi hoto!"); 
            return; 
        }

        shareBtn.disabled = true;
        shareBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

        try {
            let fileUrl = "";
            let postType = "text"; // Default idan babu media

            if (fileInput.files[0]) {
                const file = fileInput.files[0];
                const isVideo = file.type.startsWith('video');
                postType = isVideo ? 'video' : 'image';

                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', 'ml_default'); 
                const resourceType = isVideo ? 'video' : 'image';

                const res = await fetch(`https://api.cloudinary.com/v1_1/dpxn8b7ao/${resourceType}/upload`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                fileUrl = data.secure_url;
            }

            await addDoc(collection(db, "posts"), {
                userId: user.phone,
                userName: user.name,
                userPhoto: user.photo || "",
                fileUrl: fileUrl,
                caption: caption,
                type: postType,
                createdAt: serverTimestamp()
            });

            window.location.href = "dashboard.html";

        } catch (error) {
            console.error(error);
            alert("An samu matsala! Duba data dinka.");
            shareBtn.disabled = false;
            shareBtn.innerHTML = "Share";
        }
    }
</script>
</body>
</html>
