<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - Auwal MD Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #0084ff;
            --secondary: #00c6ff;
            --bg-gradient: linear-gradient(180deg, #0f172a 0%, #020617 100%);
        }

        body { 
            background: var(--bg-gradient); 
            color: white; 
            font-family: 'Poppins', sans-serif; 
            min-height: 100vh;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px 20px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            margin-top: 20px;
        }

        .user-pfp-large {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            padding: 3px;
            object-fit: cover;
            box-shadow: 0 0 20px rgba(0, 132, 255, 0.4);
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            padding: 15px 10px;
            flex: 1;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .stat-val { font-size: 18px; font-weight: bold; display: block; }
        .stat-label { font-size: 11px; color: #64748b; text-transform: uppercase; }

        .follow-btn {
            width: 100%;
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            transition: 0.3s;
            border: none;
            margin-top: 20px;
        }

        .btn-follow { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; }
        .btn-unfollow { background: transparent; color: #ef4444; border: 1px solid #ef4444; }

        .back-btn {
            font-size: 20px;
            cursor: pointer;
            color: #64748b;
        }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="d-flex align-items-center mb-4">
        <i class="fas fa-chevron-left back-btn" onclick="history.back()"></i>
        <h6 class="m-0 ms-3">User Profile</h6>
    </div>

    <div class="profile-card text-center">
        <img id="uPfp" src="https://ui-avatars.com/api/?name=Loading" class="user-pfp-large">
        <h4 id="uName" class="mt-3 fw-bold mb-0">---</h4>
        <p id="uPhone" class="small text-muted mb-4">@user_loading</p>

        <div class="d-flex gap-2">
            <div class="stat-box">
                <span class="stat-val" id="postCount">0</span>
                <span class="stat-label">Posts</span>
            </div>
            <div class="stat-box">
                <span class="stat-val" id="followerCount">0</span>
                <span class="stat-label">Followers</span>
            </div>
            <div class="stat-box">
                <span class="stat-val" id="followingCount">0</span>
                <span class="stat-label">Following</span>
            </div>
        </div>

        <button id="followBtn" class="follow-btn btn-follow" style="display: none;">Follow</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, onSnapshot, doc, setDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA6Ce7cEDzcxOoEyh5Swl3wFx7ju-Up00k",
        authDomain: "auwalmdtech.firebaseapp.com",
        projectId: "auwalmdtech",
        storageBucket: "auwalmdtech.firebasestorage.app",
        messagingSenderId: "202329584080",
        appId: "1:202329584080:web:e989d7df53d3c3024609d5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const me = JSON.parse(localStorage.getItem('amd_user'));

    // Dauko lambar wayar daga URL
    const urlParams = new URLSearchParams(window.location.search);
    const targetPhone = urlParams.get('phone');

    async function initProfile() {
        if(!targetPhone) return;

        // Idan kai ne ka danna kanka, zai kai ka babban profile dinka
        if(me && targetPhone === me.phone) {
            window.location.href = 'profile.html';
            return;
        }

        // 1. Dauko bayanan User din
        const userQuery = query(collection(db, "users"), where("phone", "==", targetPhone));
        const userSnap = await getDocs(userQuery);
        
        if(!userSnap.empty) {
            const userData = userSnap.docs[0].data();
            document.getElementById('uName').innerText = userData.name;
            document.getElementById('uPhone').innerText = "@" + userData.phone;
            document.getElementById('uPfp').src = userData.photo || `https://ui-avatars.com/api/?name=${userData.name}&background=0084ff&color=fff`;
        }

        // 2. Follow Logic
        if(me) {
            const followBtn = document.getElementById('followBtn');
            followBtn.style.display = 'block';
            const followID = `${me.phone}_${targetPhone}`;

            onSnapshot(doc(db, "follows", followID), (d) => {
                if(d.exists()) {
                    followBtn.innerText = "Unfollow";
                    followBtn.className = "follow-btn btn-unfollow";
                    followBtn.onclick = async () => await deleteDoc(doc(db, "follows", followID));
                } else {
                    followBtn.innerText = "Follow";
                    followBtn.className = "follow-btn btn-follow";
                    followBtn.onclick = async () => {
                        await setDoc(doc(db, "follows", followID), {
                            follower: me.phone,
                            following: targetPhone,
                            timestamp: serverTimestamp()
                        });
                    };
                }
            });
        }

        // 3. Count Stats (Followers & Posts)
        onSnapshot(query(collection(db, "follows"), where("following", "==", targetPhone)), s => {
            document.getElementById('followerCount').innerText = s.size;
        });

        onSnapshot(query(collection(db, "follows"), where("follower", "==", targetPhone)), s => {
            document.getElementById('followingCount').innerText = s.size;
        });

        onSnapshot(query(collection(db, "posts"), where("phone", "==", targetPhone)), s => {
            document.getElementById('postCount').innerText = s.size;
        });
    }

    initProfile();
</script>
</body>
</html>
