<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction History - Auwal MD Tech</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .h-header { background: #0d6efd; color: white; padding: 20px; border-bottom-left-radius: 25px; border-bottom-right-radius: 25px; }
        .history-card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 10px; border-left: 5px solid #0d6efd; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .status-success { color: #198754; font-weight: bold; font-size: 12px; }
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #ddd; display: flex; justify-content: space-around; padding: 10px 0; }
    </style>
</head>
<body>

<div class="h-header shadow">
    <div class="d-flex align-items-center">
        <a href="dashboard.html" class="text-white me-3"><i class="fas fa-arrow-left"></i></a>
        <h4 class="mb-0 fw-bold">Transaction History</h4>
    </div>
</div>

<div class="container mt-4" id="history-list">
    <div id="no-history" class="text-center mt-5">
        <i class="fas fa-history fa-4x text-light mb-3"></i>
        <p class="text-muted">No transactions found yet.</p>
    </div>
</div>

<div class="nav-bottom shadow-lg">
    <a href="dashboard.html" class="text-center text-muted text-decoration-none"><i class="fas fa-home fs-5"></i><div style="font-size: 10px;">Home</div></a>
    <a href="history.html" class="text-center text-primary text-decoration-none"><i class="fas fa-history fs-5"></i><div style="font-size: 10px;">History</div></a>
    <a href="https://wa.me/2349137904300" class="text-center text-muted text-decoration-none"><i class="fas fa-headset fs-5"></i><div style="font-size: 10px;">Support</div></a>
</div>

<script>
    // Load Transactions from LocalStorage
    let txns = JSON.parse(localStorage.getItem('my_txns')) || [];
    let list = document.getElementById('history-list');
    let noHist = document.getElementById('no-history');

    if(txns.length > 0) {
        noHist.style.display = 'none';
        txns.reverse().forEach(t => {
            list.innerHTML += `
                <div class="history-card animate__animated animate__fadeIn">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <h6 class="mb-0 fw-bold text-dark">${t.service}</h6>
                            <small class="text-muted">${t.date} | ${t.time}</small>
                        </div>
                        <div class="text-end">
                            <div class="status-success">SENT <i class="fas fa-check-double"></i></div>
                            <small class="fw-bold text-primary">${t.details}</small>
                        </div>
                    </div>
                </div>
            `;
        });
    }
</script>
</body>
</html>
