<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RetayaX - Coming Soon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body {
            background-color: #0f2027;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .main-container {
            max-width: 420px;
            margin: auto;
            padding: 25px;
            background: #162b36;
            border-radius: 16px;
            border: 1px solid #2c5364;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            width: 90%;
            text-align: center;
        }
        .logo-area img {
            width: 70px;
            height: auto;
            border-radius: 50%;
            margin-bottom: 15px;
        }
        .logo-area h3 {
            color: #25d366;
            font-weight: 700;
        }
        .coming-text {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffffff;
            margin: 15px 0 5px 0;
        }
        .sub-text {
            color: #a0aab0;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
        .btn-green {
            background-color: #25d366;
            color: #000000;
            font-weight: 600;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            transition: 0.2s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-green:hover {
            background-color: #128C7E;
            color: #ffffff;
        }
        .footer-text {
            text-align: center;
            font-size: 0.72rem;
            color: #7b8890;
            margin-top: 15px;
        }
        .wa-btn {
            position: fixed;
            bottom: 30px;
            right: 20px;
            background: #25d366;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 1000;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <a href="https://wa.me/2348164712102" target="_blank" class="wa-btn"><i class="fab fa-whatsapp"></i></a>

    <div class="main-container">
        <div class="logo-area">
            <img src="logo.png" alt="RetayaX Logo">
            <h3>RetayaX</h3>
            
            <div class="coming-text">🚀 Coming Soon</div>
            <p class="sub-text">Ana sauran kwanaki kadan mu kammala wannan tsarin na musamman don hidimar ku.</p>
            
            <button onclick="location.href='dashboard.html'" class="btn btn-green"><i class="fas fa-home me-2"></i> Back to Dashboard</button>
        </div>
        
        <div class="footer-text">
            &copy; 2026 RetayaX - All Rights Reserved
        </div>
    </div>

</body>
</html>
